syntax = "proto3";

package api.vip.service.v1;

import "errors/errors.proto";
option go_package = "github.com/infigaming-com/meepo-api/vip/service/v1;v1";
option java_multiple_files = true;
option java_package = "api.wallet.service.v1";

enum ErrorReason {
  option (errors.default_code) = 500;

  UNSPECIFIED = 0;
  // Claim rejected by risk-service rule (KYC/email/phone/IP/device/same-type).
  BONUS_CLAIM_REJECTED = 170001 [(errors.code) = 403];
  // No claimable VIP rewards found for the user.
  NO_CLAIMABLE_REWARD = 170002 [(errors.code) = 404];
}
