syntax = "proto3";

package api.wallet.service.v1;

import "google/protobuf/timestamp.proto";
import "common/common.proto";

option go_package = "github.com/infigaming-com/meepo-api/wallet/service/v1;v1";
option java_multiple_files = true;
option java_package = "api.wallet.service.v1";

// ============================================
// Shared Reward Types
// ============================================

// Free spin config for deposit reward or promo code
message FreeSpinConfig {
	bool enabled = 1;
	// "cash" or "bonus" (winning credit type)
	string reward_type = 2;
	// Play currency
	string currency = 3;
	int32 spin_count = 4;
	int32 wagering_requirement = 5;
	string max_withdrawal_multiplier = 6;
	// Winning reward validity (ms)
	int64 reward_validity = 7;
	repeated FreeSpinReward rewards = 8;
	message FreeSpinReward {
		string provider_id = 1;
		string game_id = 2;
		int32 level = 3;
		// ms, 0 = no expiration
		int64 free_spin_validity = 4;
	}
}

// Free bet config for deposit reward or promo code
message FreeBetConfig {
	bool enabled = 1;
	// "cash" or "bonus" (winning credit type)
	string reward_type = 2;
	// Settlement currency
	string currency = 3;
	int32 wagering_requirement = 4;
	string max_withdrawal_multiplier = 5;
	// Winning reward validity (ms)
	int64 reward_validity = 6;
	repeated FreeBetReward rewards = 7;
	message FreeBetReward {
		string template_id = 1;
		// Free bet amount (decimal string)
		string amount = 2;
		// ms, 0 = no expiration
		int64 free_bet_validity = 3;
		// Extra data (JSON), optional
		optional bytes extra = 4;
	}
}

// ============================================
// Promo Code Campaign
// ============================================

// Bonus money config for promo code campaign
message PromoCodeBonusMoneyConfig {
	bool enabled = 1;
	string currency = 2;
	// "cash" or "bonus"
	string reward_type = 3;
	// Fixed amount
	string amount = 4;
	int32 wagering_requirement = 5;
	string max_withdrawal_multiplier = 6;
	// ms, 0 = no expiration
	int64 reward_validity = 7;
}

// Campaign reward configs (all optional)
message PromoCodeRewardConfigs {
	optional PromoCodeBonusMoneyConfig bonus_money_config = 1;
	optional FreeSpinConfig free_spin_config = 2;
	optional FreeBetConfig free_bet_config = 3;
}

// Deposit condition for promo code campaign
message DepositCondition {
	// 0 = no time range
	int32 time_range_days = 1;
	bool reporting_currency_aggregate = 2;
	string currency = 3;
	string amount = 4;
}

// Registration time condition for promo code campaign
message RegistrationTimeCondition {
	google.protobuf.Timestamp start_time = 1;
	google.protobuf.Timestamp end_time = 2;
}

// Invitation condition for promo code campaign
message InvitationCondition {
	// 0 = no time range
	int32 time_range_days = 1;
	int32 invitation_count = 2;
}

// Turnover condition for promo code campaign
message TurnoverCondition {
	// 0 = no time range
	int32 time_range_days = 1;
	bool reporting_currency_aggregate = 2;
	string currency = 3;
	string amount = 4;
}

// Referrer condition for promo code campaign
message ReferrerCondition {
	bool only_valid_allowed = 1;
	repeated int64 referrer_ids = 2;
}

// Affiliate condition for promo code campaign
message AffiliateCondition {
	repeated int64 affiliate_ids = 1;
	// Campaign IDs filter (more specific than affiliate_ids)
	// If specified, only users from these campaigns can use the promo code
	// If empty, falls back to affiliate_ids check
	repeated int64 campaign_ids = 2;
}

// Verification status condition for promo code campaign
message VerificationStatusCondition {
	bool email_verified = 1;
	bool phone_verified = 2;
}

// Campaign conditions - all conditions must be satisfied to trigger the reward
message PromoCodeConditions {
	DepositCondition deposit_condition = 1;
	RegistrationTimeCondition registration_time_condition = 2;
	InvitationCondition invitation_condition = 3;
	TurnoverCondition turnover_condition = 4;
	ReferrerCondition referrer_condition = 5;
	AffiliateCondition affiliate_condition = 6;
	VerificationStatusCondition verification_status_condition = 7;
}

message PromoCodeCampaign {
	int64 id = 1;
	api.common.OperatorContext operator_context = 2;
	string name = 3;
	// "one_time" or "universal"
	string code_type = 4;
	// For universal code
	int32 max_usage_limit = 5;
	google.protobuf.Timestamp start_time = 6;
	google.protobuf.Timestamp end_time = 7;
	// "active", "paused", or "disabled"
	string status = 8;
	PromoCodeConditions reward_conditions = 9;
	PromoCodeRewardConfigs reward_configs = 10;
	google.protobuf.Timestamp created_at = 11;
	google.protobuf.Timestamp updated_at = 12;
}

// Create Campaign (status defaults to active)
message CreatePromoCodeCampaignRequest {
	api.common.OperatorContext initiator_operator_context = 1;
	// Target operator must be an operator, not other operator type
	api.common.OperatorContext target_operator_context = 2;
	int64 create_user_id = 3;
	string name = 4;
	string code_type = 5;
	int32 max_usage_limit = 6;
	google.protobuf.Timestamp start_time = 7;
	google.protobuf.Timestamp end_time = 8;
	PromoCodeConditions reward_conditions = 9;
	PromoCodeRewardConfigs reward_configs = 10;
}

message CreatePromoCodeCampaignResponse {
	int64 campaign_id = 1;
}

// Update Campaign - full update (cannot update status or code_type)
message UpdatePromoCodeCampaignRequest {
	api.common.OperatorContext initiator_operator_context = 1;
	api.common.OperatorContext target_operator_context = 2;
	int64 campaign_id = 3;
	string name = 4;
	reserved 5; // was max_usage_limit - immutable after creation
	google.protobuf.Timestamp start_time = 6;
	google.protobuf.Timestamp end_time = 7;
	PromoCodeConditions reward_conditions = 8;
	PromoCodeRewardConfigs reward_configs = 9;
}

message UpdatePromoCodeCampaignResponse {
}

// Update Campaign Status (separate endpoint)
message UpdatePromoCodeCampaignStatusRequest {
	api.common.OperatorContext initiator_operator_context = 1;
	api.common.OperatorContext target_operator_context = 2;
	int64 campaign_id = 3;
	// "active", "paused", or "disabled"
	string status = 4;
}

message UpdatePromoCodeCampaignStatusResponse {
}

// List Campaigns
message ListPromoCodeCampaignsRequest {
	api.common.OperatorContext initiator_operator_context = 1;
	api.common.OperatorContext target_operator_context = 2;
	// "active", "paused", or "disabled"
	optional string status = 3;
	// "one_time" or "universal"
	optional string code_type = 4;
	google.protobuf.Timestamp start_time = 5;
	google.protobuf.Timestamp end_time = 6;
	optional int32 page = 7;
	optional int32 page_size = 8;
}

message PromoCodeCampaignListItem {
	int64 id = 1;
	string name = 2;
	// "one_time" or "universal"
	string code_type = 3;
	// "instant" or "conditional"
	string reward_trigger = 4;
	// "active", "paused", or "disabled"
	string status = 5;
	PromoCodeRewardConfigs reward_configs = 6;
	// Current code usage count
	int32 usage_count = 7;
	// Total codes generated for campaign
	int32 total_codes_generated = 8;
	// Max usage limit
	int32 max_usage_limit = 9;
	google.protobuf.Timestamp created_at = 10;
	google.protobuf.Timestamp start_time = 11;
	google.protobuf.Timestamp end_time = 12;
	google.protobuf.Timestamp updated_at = 13;
	// Campaign reward conditions
	PromoCodeConditions reward_conditions = 14;
}

message ListPromoCodeCampaignsResponse {
	repeated PromoCodeCampaignListItem campaigns = 1;
	int32 total = 2;
	int32 active_count = 3;
	int32 paused_count = 4;
	int32 disabled_count = 5;
	int32 page = 6;
	int32 page_size = 7;
}

// List Campaign Details - codes (for one_time) or usages (for universal)
message ListPromoCodeCampaignDetailsRequest {
	api.common.OperatorContext initiator_operator_context = 1;
	int64 campaign_id = 2;
	optional int64 user_id = 3;
	optional string status = 4;
	optional string code = 5;
	optional int32 page = 6;
	optional int32 page_size = 7;
}

// Code item for one_time campaigns
message PromoCodeListItem {
	string code = 1;
	// "unused" or "used"
	string status = 2;
	int64 used_by_user_id = 3;
	string country_code = 4;
	string vip_level = 5;
	google.protobuf.Timestamp created_at = 6;
	google.protobuf.Timestamp used_at = 7;
	// Same as campaign end_time, used directly from campaign
	google.protobuf.Timestamp expired_at = 8;
}

// Usage item for universal campaigns
message PromoCodeUsageListItem {
	string code = 1;
	int64 user_id = 2;
	string country_code = 3;
	string vip_level = 4;
	google.protobuf.Timestamp created_at = 5;
	google.protobuf.Timestamp used_at = 6;
	// Same as campaign end_time, used directly from campaign
	google.protobuf.Timestamp expired_at = 7;
}

message ListPromoCodeCampaignDetailsResponse {
	// "one_time" or "universal" (indicates which list is populated)
	string code_type = 1;
	// Populated for one_time campaigns
	repeated PromoCodeListItem codes = 2;
	// Populated for universal campaigns
	repeated PromoCodeUsageListItem usages = 3;
	int32 total = 4;
	int32 page = 5;
	int32 page_size = 6;
}

// Generate Codes for Campaign (one_time only)
message GenerateOneTimePromoCodesRequest {
	api.common.OperatorContext initiator_operator_context = 1;
	int64 generated_by_user_id = 2;
	int64 campaign_id = 3;
	// 8, 10, or 12
	int32 code_length = 4;
	// "alphanumeric", "uppercase", or "numeric"
	string code_format = 5;
	// 1 to 10000
	int32 count = 6;
}

message GenerateOneTimePromoCodesResponse {
	int32 generated_count = 1;
}

// Generate Codes for Campaign (universal only)
message GenerateUniversalPromoCodesRequest {
	api.common.OperatorContext initiator_operator_context = 1;
	int64 generated_by_user_id = 2;
	int64 campaign_id = 3;
	repeated string codes = 4;
}

message GenerateUniversalPromoCodesResponse {
	int32 generated_count = 1;
}

// List Universal Code Usages
message ListUniversalCodeUsagesRequest {
	api.common.OperatorContext initiator_operator_context = 1;
	int64 campaign_id = 2;
}

message ListUniversalCodeUsagesResponse {
	repeated UniversalCodeUsage usages = 1;
	message UniversalCodeUsage {
		string code = 1;
		int32 used_count = 2;
		int32 total_count = 3;
	}
}

// ============================================
// User Promo Code APIs
// ============================================

// GetPromoCodeInfo - Query promo code information
message GetPromoCodeInfoRequest {
	string code = 1;
}

message GetPromoCodeInfoResponse {
	string code = 1;
	// "one_time" or "universal"
	string code_type = 2;
	int64 campaign_id = 3;
	string campaign_name = 4;
	// "active", "paused", or "disabled"
	string campaign_status = 5;
	google.protobuf.Timestamp start_time = 6;
	google.protobuf.Timestamp end_time = 7;
	// This code's usage count
	int32 usage_count = 8;
	// Max usage limit (for universal)
	int32 max_usage_limit = 9;
	// Whether current user has already used this promo code campaign
	bool already_used_by_user = 10;
	PromoCodeRewardConfigs reward_configs = 11;
	PromoCodeConditions reward_conditions = 12;
	repeated ConditionValidationResult condition_results = 13;

	// Claimability status
	// Whether the code can be claimed by this user
	bool claimable = 14;
	// Reason why the code cannot be claimed (empty if claimable)
	string unclaimable_reason = 15;
}

// ClaimPromoCode - Claim promo code reward
message ClaimPromoCodeRequest {
	string code = 1;
}

message ClaimPromoCodeResponse {
}

// Condition validation result
message ConditionValidationResult {
	// "deposit", "registration_time", "invitation", "turnover", "referrer", "affiliate", or "verification_status"
	string condition_type = 1;
	bool satisfied = 2;
}
