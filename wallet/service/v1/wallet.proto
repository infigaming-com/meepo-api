// ========== Operator Sub-Account messages ==========

message SubAccountTransferRequest {
	// The operator that owns the sub-account; transfer moves cash between this
	// operator's main wallet (operator_balance) and its sub-account in a single tx.
	api.common.OperatorContext target_operator_context = 1;
	string product_type = 2;
	// currency must equal the rule's Currency for this product_type (e.g. USDC for "prediction").
	string currency = 3;
	// positive amount; direction indicates main->sub or sub->main.
	string cash_amount = 4;
	enum Direction {
		DIRECTION_UNSPECIFIED = 0;
		DIRECTION_TO_SUB_ACCOUNT = 1;
		DIRECTION_FROM_SUB_ACCOUNT = 2;
	}
	Direction direction = 5;
	string memo = 6;
	// Initiator that issued the transfer. Used for mode-aware RBAC at the
	// wallet biz layer (defense-in-depth — BO already gates, but wallet
	// re-checks so an internal RPC caller can't bypass): individual mode
	// requires operator/company; co-operation mode requires system.
	api.common.OperatorContext initiator_operator_context = 7;
}

message SubAccountTransferResponse {
	int64 operator_transaction_id = 1;
	int64 sub_account_transaction_id = 2;
	// Resulting balances after transfer.
	string operator_cash = 3;
	string sub_account_cash = 4;
}

message SubAccountAdjustRequest {
	// The operator whose sub-account is being adjusted. RBAC (system-only) is
	// enforced by the BO layer; wallet-service trusts the caller.
	api.common.OperatorContext target_operator_context = 1;
	string product_type = 2;
	string currency = 3;
	// "sub_account_adjust_credit" or "sub_account_adjust_debit".
	string transaction_type = 4;
	// always positive; direction derived from transaction_type.
	string cash_amount = 5;
	string memo = 6;
}

message SubAccountAdjustResponse {
	int64 transaction_id = 1;
	string cash = 2;
}

message ListOperatorSubAccountsRequest {
	// operator_context scopes the result to this operator's hierarchy.
	api.common.OperatorContext operator_context = 1;
	// empty = no product_type filter (every sub-account in scope is returned).
	optional string product_type = 2;
}

message OperatorSubAccount {
	api.common.OperatorContext operator_context = 1;
	string product_type = 2;
	string currency = 3;
	string cash = 4;
	string lifetime_commission_usd = 5;
	string lifetime_commission_reporting_currency = 6;
	// Current calendar month, UTC.
	string commission_this_month_usd = 7;
	string commission_this_month_reporting_currency = 8;
	google.protobuf.Timestamp created_at = 9;
	google.protobuf.Timestamp updated_at = 10;
}

message ListOperatorSubAccountsResponse {
	repeated OperatorSubAccount sub_accounts = 1;
}

message ListOperatorSubAccountTransactionsRequest {
	api.common.OperatorContext operator_context = 1;
	optional string product_type = 2;
	optional string currency = 3;
	repeated string transaction_types = 4;
	optional google.protobuf.Timestamp start_time = 5;
	optional google.protobuf.Timestamp end_time = 6;
	// default 1
	optional int32 page = 7;
	// default 20
	optional int32 page_size = 8;
}

message OperatorSubAccountTransaction {
	int64 transaction_id = 1;
	// Player-side balance_transaction.id this row is paired with — applies to
	// sub_account_game_debit / game_credit / game_rollback. 0 for transfer/adjust.
	int64 player_transaction_id = 2;
	int64 related_transaction_id = 3;
	api.common.OperatorContext operator_context = 4;
	string product_type = 5;
	// Currency is fixed by the product rule (e.g. USDC for "prediction").
	// There is no separate settlement_currency — the row is always in `currency`.
	string currency = 6;
	// Reporting currency the operator's reports are denominated in (used to
	// interpret cash_amount_reporting_currency / commission_amount_reporting_currency).
	string reporting_currency = 7;
	string transaction_type = 8;
	// Native-currency balance evolution.
	string original_cash = 9;
	string cash = 10;
	string cash_amount = 11;
	// Per-row delta translated into USD and the operator's reporting currency
	// at transaction time. No exchange_rate columns — sub-account currency is
	// fixed to USDC (≈1 USD) and the reporting amount is the canonical figure.
	string cash_amount_usd = 12;
	string cash_amount_reporting_currency = 13;
	// Winning commission attributed to this row (only populated on
	// sub_account_game_credit when payout > bet). cash_amount is NOT reduced —
	// commission is recorded for downstream operator/platform settlement.
	string commission_amount = 14;
	string commission_amount_usd = 15;
	string commission_amount_reporting_currency = 16;
	// commission_rate is a plain ratio (e.g. "0.10" = 10%), NOT a percentage —
	// do not multiply by 100 on display.
	string commission_rate = 17;
	// status: "settled" on insert; updated to "rollbacked" on the original
	// sub_account_game_debit row when a paired GameRollback runs.
	string status = 18;
	string memo = 19;
	google.protobuf.Timestamp created_at = 20;
	google.protobuf.Timestamp updated_at = 21;
}

// OperatorSubAccountAggregates groups the SUM-over-WHERE-clause totals
// returned by ListOperatorSubAccountTransactions. Each metric is exposed
// in both USD and the operator's reporting currency.
//
// total_commission_* / total_transfer_* / total_payouts_* / total_bets_*
// are scoped to the request's WHERE clause. lifetime_commission_* /
// commission_this_month_* are independent: lifetime + current calendar
// month (UTC) across (operator scope + product_type), sourced from
// winning_commission_records.
message OperatorSubAccountAggregates {
	string total_commission_usd = 1;
	string total_commission_reporting_currency = 2;
	string total_transfer_in_usd = 3;
	string total_transfer_in_reporting_currency = 4;
	string total_transfer_out_usd = 5;
	string total_transfer_out_reporting_currency = 6;
	string total_payouts_received_usd = 7;
	string total_payouts_received_reporting_currency = 8;
	string total_bets_placed_usd = 9;
	string total_bets_placed_reporting_currency = 10;
	string lifetime_commission_usd = 11;
	string lifetime_commission_reporting_currency = 12;
	string commission_this_month_usd = 13;
	string commission_this_month_reporting_currency = 14;
}

message ListOperatorSubAccountTransactionsResponse {
	repeated OperatorSubAccountTransaction transactions = 1;
	int32 total = 2;
	int32 page = 3;
	int32 page_size = 4;
	OperatorSubAccountAggregates aggregates = 5;
}

// PredictionSettings captures platform-level configuration for the
// "prediction" sub-account product family (Polymarket today; future
// prediction-market vendors slot in without proto change). v1 ships only
// commission_rate; future product-wide settings (vendor whitelist, fee
// schedule) extend this message.
message PredictionSettings {
	// commission_rate is the share the platform takes from a winning bet's
	// net profit, applied on GameCredit when net_win > 0. Plain ratio
	// (e.g. "0.10" = 10%), NOT a percentage.
	string commission_rate = 1;
	google.protobuf.Timestamp created_at = 2;
