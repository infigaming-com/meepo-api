syntax = "proto3";

package api.wallet.service.v1;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "common/common.proto";
import "wallet/service/v1/promocode.proto";

option go_package = "github.com/infigaming-com/meepo-api/wallet/service/v1;v1";
option java_multiple_files = true;
option java_package = "api.wallet.service.v1";

service Wallet {
	// GetUserBalances returns the balances of all currencies of the user
	rpc GetUserBalances (GetUserBalancesRequest) returns (GetUserBalancesResponse) {
		option (google.api.http) = {
			post: "/v1/wallet/balances/list"
			body: "*"
		};
	}

	// GetUserBalance returns the balance of specific currency of the user
	rpc GetUserBalance (GetUserBalanceRequest) returns (GetUserBalanceResponse) {
	}

	// GetUserBalanceDetails returns the cash and credit details of every credit of the user balance(one currency only)
	rpc GetUserBalanceDetails (GetUserBalanceDetailsRequest) returns (GetUserBalanceDetailsResponse) {
		option (google.api.http) = {
			post: "/v1/wallet/balance/details"
			body: "*"
		};
	}

	rpc Credit (CreditRequest) returns (CreditResponse) {}

	rpc Debit (DebitRequest) returns (DebitResponse) {}

	rpc GameDebit (GameDebitRequest) returns (GameDebitResponse) {}

	rpc GameCredit (GameCreditRequest) returns (GameCreditResponse) {}

	// GameBatchBetAndSettle processes N bets + M wins in a single atomic operation.
	// Reduces lock contention by acquiring one row-level lock instead of N+M separate locks.
	// Designed for instant-settlement games (e.g., Plinko, Dice, Keno) where bet results
	// are determined at bet time.
	rpc GameBatchBetAndSettle (GameBatchBetAndSettleRequest) returns (GameBatchBetAndSettleResponse) {}

	// Freeze is used to freeze the balance of the user
	rpc Freeze (FreezeRequest) returns (FreezeResponse) {}

	// Settle is used to settle the frozen balance of the user
	rpc Settle (SettleRequest) returns (SettleResponse) {}

	// Rollback is used to rollback the frozen balance of the user or game transactions
	rpc Rollback (RollbackRequest) returns (RollbackResponse) {}

	rpc GetWallets (GetWalletsRequest) returns (GetWalletsResponse) {}

	// ListWalletBalanceTransactions provides balance transactions for a specific user.
	// It's called by ListWalletBalanceTransactions in backoffice service for the information in user transactions page.
	rpc ListWalletBalanceTransactions (ListWalletBalanceTransactionsRequest) returns (ListWalletBalanceTransactionsResponse) {}

	rpc GetWalletBalanceTransactionsByIds (GetWalletBalanceTransactionsByIdsRequest) returns (GetWalletBalanceTransactionsByIdsResponse) {}

	rpc GetWalletCreditTransactions (GetWalletCreditTransactionsRequest) returns (GetWalletCreditTransactionsResponse) {}

	rpc GetExchangeRates (GetExchangeRatesRequest) returns (GetExchangeRatesResponse) {}

	rpc GetExchangeRatesWithBaseCurrency (GetExchangeRatesWithBaseCurrencyRequest) returns (GetExchangeRatesWithBaseCurrencyResponse) {
		option (google.api.http) = {
			post: "/v1/wallet/exchange-rates/base-currency"
			body: "*"
		};
	}

	// GetUserTransactionSummary returns the summary of user's transactions 
	// It returns the total deposit, withdraw, deposit minus withdraw, valid bet
	rpc GetUserTransactionSummary (GetUserTransactionSummaryRequest) returns (GetUserTransactionSummaryResponse) {}

	// ListUserTransactionSummaries returns the summaries of user's transactions, mostly for list user transactions page
	rpc ListUserTransactionSummaries (ListUserTransactionSummariesRequest) returns (ListUserTransactionSummariesResponse) {}

	// GetUserOverview returns data for the overview of user's wallet
	rpc GetBackofficeUserOverviewFromWallet (GetBackofficeUserOverviewFromWalletRequest) returns (GetBackofficeUserOverviewFromWalletResponse) {}

	rpc AddCurrency (AddCurrencyRequest) returns (AddCurrencyResponse) {}

	rpc UpdateCurrency (UpdateCurrencyRequest) returns (UpdateCurrencyResponse) {}

	rpc GetCurrencies (GetCurrenciesRequest) returns (GetCurrenciesResponse) {
		option (google.api.http) = {
			post: "/v1/wallet/currencies/get"
			body: "*"
		};
	}

	rpc ListCurrencies (ListCurrenciesRequest) returns (ListCurrenciesResponse) {}

	rpc UpdateOperatorCurrency (UpdateOperatorCurrencyRequest) returns (UpdateOperatorCurrencyResponse) {}

	rpc UpdateUserCurrency (UpdateUserCurrencyRequest) returns (UpdateUserCurrencyResponse) {}

	// List Bottom Operator Balances based on filter
	rpc ListBottomOperatorBalances (ListBottomOperatorBalancesRequest) returns (ListBottomOperatorBalancesResponse) {}

	// List Company Operator Balances based on filter
	rpc ListCompanyOperatorBalances (ListCompanyOperatorBalancesRequest) returns (ListCompanyOperatorBalancesResponse) {}

	// Transfer cash from operator to its company operator
	rpc OperatorTransfer (OperatorTransferRequest) returns (OperatorTransferResponse) {}

	// Swap cash between two balances of the same company's operator
	rpc OperatorSwap (OperatorSwapRequest) returns (OperatorSwapResponse) {}

	// Freeze cash of a balance of an operator
	rpc OperatorFreeze (OperatorFreezeRequest) returns (OperatorFreezeResponse) {}
	
	// Rollback frozen cash of an operator
	rpc OperatorRollback (OperatorRollbackRequest) returns (OperatorRollbackResponse) {}

	// Settle frozen cash of an operator
	rpc OperatorSettle (OperatorSettleRequest) returns (OperatorSettleResponse) {}

	// GetOperatorBalance gets the balances of an operator
	rpc GetOperatorBalance(GetOperatorBalanceRequest) returns (GetOperatorBalanceResponse) {}

	// List Operator Balance Transactions based on filter
	rpc ListOperatorBalanceTransactions (ListOperatorBalanceTransactionsRequest) returns (ListOperatorBalanceTransactionsResponse) {}

	// OperatorDebit is used to debit cash from an operator's balance
	rpc OperatorDebit (OperatorDebitRequest) returns (OperatorDebitResponse) {}

	// OperatorBalanceAdjust manually adjusts an operator or company balance (system-level only)
	// transaction_type determines direction: operator_manual_credit or operator_manual_debit
	rpc OperatorBalanceAdjust (OperatorBalanceAdjustRequest) returns (OperatorBalanceAdjustResponse) {}

	// ========== Operator Sub-Account (custody products: prediction markets, etc.) ==========
	// Sub-accounts are per-(operator, product_type, currency). Product rules live in
	// wallet-service internal/data/sub_account_rules.go — allowed currencies are fixed per product.
	// Lifecycle: row is lazily created on first SubAccountTransfer IN; other entry points
	// (game_debit/credit/rollback/adjust) reject when the row is missing. There is no
	// separate enable/disable RPC.
	// SubAccountTransfer moves balance between the operator's main wallet and the sub-account (both directions).
	rpc SubAccountTransfer (SubAccountTransferRequest) returns (SubAccountTransferResponse) {}
	// SubAccountAdjust manually credits/debits the sub-account (system-only).
	rpc SubAccountAdjust (SubAccountAdjustRequest) returns (SubAccountAdjustResponse) {}
	rpc ListOperatorSubAccounts (ListOperatorSubAccountsRequest) returns (ListOperatorSubAccountsResponse) {}
	rpc ListOperatorSubAccountTransactions (ListOperatorSubAccountTransactionsRequest) returns (ListOperatorSubAccountTransactionsResponse) {}

	// GetPredictionSettings returns the platform-level settings for the
	// "prediction" sub-account product (commission rate today; future
	// product-wide settings slot in here).
	rpc GetPredictionSettings (GetPredictionSettingsRequest) returns (GetPredictionSettingsResponse) {}
	// SetPredictionSettings writes the platform-level prediction settings.
	// System-only at the BO RBAC layer.
	rpc SetPredictionSettings (SetPredictionSettingsRequest) returns (SetPredictionSettingsResponse) {}

	// UpdateOperatorBalance updates an operator balance， now only support update the enabled status
	rpc UpdateOperatorBalance(UpdateOperatorBalanceRequest) returns (UpdateOperatorBalanceResponse) {}

	// GetOperatorTransactionSummary returns the summary of operator's transactions
	rpc GetOperatorTransactionSummary(GetOperatorTransactionSummaryRequest) returns (GetOperatorTransactionSummaryResponse) {}

	// GetCompanyFinancialSummary returns the financial summary of all sub-operators under a company operator
	rpc GetCompanyFinancialSummary(GetCompanyFinancialSummaryRequest) returns (GetCompanyFinancialSummaryResponse) {}

	// BatchGetCompanyFinancialSummaries returns financial summaries for multiple company operators in one call.
	// Designed for list views that don't need max_withdrawable; the company_max_withdrawable_usd and
	// custody_max_withdrawable_usd fields are left empty in the batch response.
	rpc BatchGetCompanyFinancialSummaries(BatchGetCompanyFinancialSummariesRequest) returns (BatchGetCompanyFinancialSummariesResponse) {}

	// GetOperatorBalanceTransactionsByIds returns the balance transactions with specific transaction ids
	rpc GetOperatorBalanceTransactionsByIds(GetOperatorBalanceTransactionsByIdsRequest) returns (GetOperatorBalanceTransactionsByIdsResponse) {}

	// SetDepositRewardSequences sets the deposit reward sequences of a operator currency config
	rpc SetDepositRewardSequences(SetDepositRewardSequencesRequest) returns (SetDepositRewardSequencesResponse) {}

	// DeleteDepositRewardSequences deletes a deposit reward sequence of a operator currency config
	rpc DeleteDepositRewardSequences(DeleteDepositRewardSequencesRequest) returns (DeleteDepositRewardSequencesResponse) {}

	// GetDepositRewardConfig returns the default and custom deposit reward config based on currency and operator context
	rpc GetDepositRewardConfig(GetDepositRewardConfigRequest) returns (GetDepositRewardConfigResponse) {}

	// SetUserSwapEnabled toggles the operator-level user-swap feature flag.
	// Aggregated enable is `AND` across self and all ancestors (surfaced on GetUserSwapConfig).
	rpc SetUserSwapEnabled(SetUserSwapEnabledRequest) returns (SetUserSwapEnabledResponse) {}

	// SetUserSwapTemplate full-replaces the user-swap configuration template for an operator.
	// follow_parent is operator-level: when true, the operator inherits the nearest ancestor's config.
	rpc SetUserSwapTemplate(SetUserSwapTemplateRequest) returns (SetUserSwapTemplateResponse) {}

	// GetUserSwapConfig returns the operator's custom config and the inherited default config from the nearest ancestor with follow_parent=false.
	//
	// Side-effect on first access: wallet-service lazy-inserts the target
	// operator's config row, and player paths additionally lazy-insert the
	// system-level row. Per rollout policy the system row defaults to
	// `user_swap_enabled=true`, so the first access of a fresh deployment flips
	// the system-level aggregate on. Every other level defaults off. Callers
	// treating GET as strictly read-only should be aware.
	rpc GetUserSwapConfig(GetUserSwapConfigRequest) returns (GetUserSwapConfigResponse) {}

	// UserSwap swaps the user's withdrawable cash from source currency to target currency.
	// Player-only endpoint: the caller's user id and operator context are resolved
	// from the auth token (`mctx.UserInfo` / `mctx.GetOperatorContext`). Only the
	// withdrawable portion (credit.cash_turnover >= threshold) may be swapped;
	// produces two balance transactions (swap_out + swap_in) plus corresponding
	// credit transactions. The target credit is created with
	// cash_turnover_threshold=0 (immediately withdrawable).
	rpc UserSwap(UserSwapRequest) returns (UserSwapResponse) {
		option (google.api.http) = {
			post: "/v1/wallet/user-swap"
			body: "*"
		};
	}

	// GetPlayerSwapConfig returns the effective user-swap config for the currently
	// authenticated player — operator resolved from the auth token. Used by the
	// player frontend to render fee / allowed currencies / bonus-clearing notice.
	rpc GetPlayerSwapConfig(GetPlayerSwapConfigRequest) returns (GetPlayerSwapConfigResponse) {
		option (google.api.http) = {
			post: "/v1/wallet/user-swap/player-config"
			body: "*"
		};
	}

	// ListUserSwapHistory returns swap history for the currently authenticated
	// player, paginated and time-range filterable. Each entry pairs the source
	// (`user_balance_swap_out`) and target (`user_balance_swap_in`) legs of one
	// logical swap; fee / exchange rate are sourced from the swap_out row's
	// Extra.Swap so each entry is self-describing.
	rpc ListUserSwapHistory(ListUserSwapHistoryRequest) returns (ListUserSwapHistoryResponse) {
		option (google.api.http) = {
			post: "/v1/wallet/user-swap/history"
			body: "*"
		};
	}

	// SetAppDownloadRewardConfig full-replaces the app download reward config for an operator.
	// All existing country entries are deleted and replaced with the provided list.
	// follow_parent is operator-level: when true, the operator inherits the parent's entire list.
	rpc SetAppDownloadRewardConfig(SetAppDownloadRewardConfigRequest) returns (SetAppDownloadRewardConfigResponse) {}

	// GetAppDownloadRewardConfig returns both the operator's custom config list
	// and the inherited default config list from the parent hierarchy.
	rpc GetAppDownloadRewardConfig(GetAppDownloadRewardConfigRequest) returns (GetAppDownloadRewardConfigResponse) {}

	// ClaimAppDownloadReward claims the app download reward for the current player.
	// The reward is determined by the player's country (from CF-IPCountry header)
	// and the operator's effective app download reward config.
	rpc ClaimAppDownloadReward(ClaimAppDownloadRewardRequest) returns (ClaimAppDownloadRewardResponse) {
		option (google.api.http) = {
			post: "/v1/wallet/app-download-reward/claim"
			body: "*"
		};
	}

	// GetAppDownloadRewardStatus returns whether the current user is eligible
	// for the app download reward and the reward details for their country.
	rpc GetAppDownloadRewardStatus(GetAppDownloadRewardStatusRequest) returns (GetAppDownloadRewardStatusResponse) {
		option (google.api.http) = {
			post: "/v1/wallet/app-download-reward/status"
			body: "*"
		};
	}

	// CreatePromoCodeCampaign creates a new promo code campaign
	rpc CreatePromoCodeCampaign(CreatePromoCodeCampaignRequest) returns (CreatePromoCodeCampaignResponse) {}

	// UpdatePromoCodeCampaign updates an existing promo code campaign (cannot update status or code_type)
	rpc UpdatePromoCodeCampaign(UpdatePromoCodeCampaignRequest) returns (UpdatePromoCodeCampaignResponse) {}

	// UpdatePromoCodeCampaignStatus updates the status of a promo code campaign
	rpc UpdatePromoCodeCampaignStatus(UpdatePromoCodeCampaignStatusRequest) returns (UpdatePromoCodeCampaignStatusResponse) {}

	// ListPromoCodeCampaigns lists all promo code campaigns
	rpc ListPromoCodeCampaigns(ListPromoCodeCampaignsRequest) returns (ListPromoCodeCampaignsResponse) {}

	// ListPromoCodeCampaignDetails lists codes (for one_time) or usages (for universal) by campaign
	rpc ListPromoCodeCampaignDetails(ListPromoCodeCampaignDetailsRequest) returns (ListPromoCodeCampaignDetailsResponse) {}

	// GenerateOneTimePromoCodes generates codes for a one_time campaign
	rpc GenerateOneTimePromoCodes(GenerateOneTimePromoCodesRequest) returns (GenerateOneTimePromoCodesResponse) {}

	// GenerateUniversalPromoCodes generates codes for a universal campaign
	rpc GenerateUniversalPromoCodes(GenerateUniversalPromoCodesRequest) returns (GenerateUniversalPromoCodesResponse) {}

	rpc ListUniversalCodeUsages(ListUniversalCodeUsagesRequest) returns (ListUniversalCodeUsagesResponse) {}

	// ExportPromoCodes exports promo codes (one_time codes or universal usages) for a campaign
	rpc ExportPromoCodes(ExportPromoCodesRequest) returns (ExportPromoCodesResponse) {}

	// GetPromoCodeInfo returns promo code information and validates conditions for the current user
	rpc GetPromoCodeInfo(GetPromoCodeInfoRequest) returns (GetPromoCodeInfoResponse) {
		option (google.api.http) = {
			post: "/v1/wallet/promo-code/info"
			body: "*"
		};
	}

	// ClaimPromoCode claims promo code reward for the current user
	rpc ClaimPromoCode(ClaimPromoCodeRequest) returns (ClaimPromoCodeResponse) {
		option (google.api.http) = {
			post: "/v1/wallet/promo-code/claim"
			body: "*"
		};
	}

	// GetUserDepositRewardSequence returns the current available deposit reward sequence of the user based on the user deposit stats
	rpc GetUserDepositRewardSequence(GetUserDepositRewardSequenceRequest) returns (GetUserDepositRewardSequenceResponse) {
		option (google.api.http) = {
			post: "/v1/wallet/deposit-reward/user-sequence"
			body: "*"
		};
	}

	// GetDepositRewardSequencesPreview returns all currently active welcome/daily reward sequences
	// for the operator+currency. Used by the registration page; operator is resolved from the Origin
	// header and the endpoint does not require authentication.
	rpc GetDepositRewardSequencesPreview(GetDepositRewardSequencesPreviewRequest) returns (GetDepositRewardSequencesPreviewResponse) {
		option (google.api.http) = {
			post: "/v1/wallet/deposit-reward/sequences/preview"
			body: "*"
		};
	}

	// GetOperatorCurrencyConfig returns the currency config and the deduction order config based on currency and operator context
	rpc GetGamificationCurrencyConfig(GetGamificationCurrencyConfigRequest) returns (GetGamificationCurrencyConfigResponse) {}

	// UpdateGamificationCurrencyConfig updates the config of a operator and its currency
	rpc UpdateOperatorCurrencyConfig(UpdateOperatorCurrencyConfigRequest) returns (UpdateOperatorCurrencyConfigResponse) {}

	// PushBetLimitsToBottomOperators syncs System's cash/bonus per-bet limits down to every
	// cooperation-mode bottom operator under the System. Individual-mode operators are
	// independently run and excluded. System-level initiator only. Runs asynchronously via Asynq.
	rpc PushBetLimitsToBottomOperators(PushBetLimitsRequest) returns (PushBetLimitsResponse) {}

	// PullBetLimitsFromSystem syncs a single bottom operator's cash/bonus per-bet limits from System.
	// Synchronous. Initiator must have update permission over target (any tier with management rights).
	rpc PullBetLimitsFromSystem(PullBetLimitsRequest) returns (PullBetLimitsResponse) {}

	// UpdateWalletConfig updates the wallet config based on operator context
	rpc UpdateWalletConfig(UpdateWalletConfigRequest) returns (UpdateWalletConfigResponse) {}

	// BonusTransfer is used to transfer from one credit's bonus to generate a new credit's cash
	rpc BonusTransfer(BonusTransferRequest) returns (BonusTransferResponse) {
		option (google.api.http) = {
			post: "/v1/wallet/bonus-transfer"
			body: "*"
		};
	}

	// AddResponsibleGamblingConfig adds gambling config for a user's currency
	rpc AddResponsibleGamblingConfig(AddResponsibleGamblingConfigRequest) returns (AddResponsibleGamblingConfigResponse) {
		option (google.api.http) = {
			post: "/v1/wallet/responsible-gambling/config/add"
			body: "*"
		};
	}

	// DeleteResponsibleGamblingConfig deletes gambling config for a user's currency
	rpc DeleteResponsibleGamblingConfig(DeleteResponsibleGamblingConfigRequest) returns (DeleteResponsibleGamblingConfigResponse) {
		option (google.api.http) = {
			post: "/v1/wallet/responsible-gambling/config/delete"
			body: "*"
		};
	}

	// ListResponsibleGamblingConfigs lists gambling configs for a user with all currencies
	rpc ListResponsibleGamblingConfigs(ListResponsibleGamblingConfigsRequest) returns (ListResponsibleGamblingConfigsResponse) {
		option (google.api.http) = {
			post: "/v1/wallet/responsible-gambling/configs/list"
			body: "*"
		};
	}

	// GetResponsibleGamblingConfig gets gambling config and statusfor a user's currency
	rpc GetResponsibleGamblingConfig(GetResponsibleGamblingConfigRequest) returns (GetResponsibleGamblingConfigResponse) {
	}

	// ListCustomerRecords lists customer records for all users (with deposit, withdraw, game bet, game win and manual credit(this is not supported yet))
	rpc ListCustomerRecords(ListCustomerRecordsRequest) returns (ListCustomerRecordsResponse) {}

	// ExportCustomerRecords create a task to exports customer records for all users (with deposit, withdraw, game bet, game win and manual credit(this is not supported yet))
	rpc ExportCustomerRecords(ExportCustomerRecordsRequest) returns (ExportCustomerRecordsResponse) {}

	// SetFICAThresholdConfig sets the FICA threshold config for an operator and its specific currency
	rpc SetFICAThresholdConfig(SetFICAThresholdConfigRequest) returns (SetFICAThresholdConfigResponse) {}

	// GetFICAThresholdConfig gets the FICA threshold config for an operator of all currencies
	rpc GetFICAThresholdConfig(GetFICAThresholdConfigRequest) returns (GetFICAThresholdConfigResponse) {}

	// ListFICAThresholdTransactions lists the threshold transactions (with payment_deposit, payment_withdraw_freeze, game_bet, game_win, deposit_reward) for a currency
	rpc ListFICAThresholdTransactions(ListFICAThresholdTransactionsRequest) returns (ListFICAThresholdTransactionsResponse) {}

	// ExportFICAThresholdTransactions create a task to exports FICA threshold transactions for all users (with payment_deposit, payment_withdraw_freeze, game_bet, game_win, deposit_reward)
	rpc ExportFICAThresholdTransactions(ExportFICAThresholdTransactionsRequest) returns (ExportFICAThresholdTransactionsResponse) {}

	rpc ListBalancesByUserIds(ListBalancesByUserIdsRequest) returns (ListBalancesByUserIdsResponse) {}

	rpc ListManualJournalEntries(ListManualJournalEntriesRequest) returns (ListManualJournalEntriesResponse) {}

	rpc ExportManualJournalEntries(ExportManualJournalEntriesRequest) returns (ExportManualJournalEntriesResponse) {}

	rpc ListTimeRangeDepositCredits(ListTimeRangeDepositCreditsRequest) returns (ListTimeRangeDepositCreditsResponse) {}

	rpc ListUserOverview(ListUserOverviewRequest) returns (ListUserOverviewResponse) {}

	// GetUserGameTransactionsSummary returns the summary of user's game transactions, mostly for exactly one game bet
	rpc GetUserGameTransactionsSummary(GetUserGameTransactionsSummaryRequest) returns (GetUserGameTransactionsSummaryResponse) {}

	// CreditFreespinWin credits freespin win amount to user's wallet
	rpc CreditFreespinWin(CreditFreespinWinRequest) returns (CreditFreespinWinResponse) {}

	// CreditFreeBetWin credits freebet win amount to user's wallet
	rpc CreditFreeBetWin(CreditFreeBetWinRequest) returns (CreditFreeBetWinResponse) {}

	// GetOperatorUserFinancialSummary returns the financial summary of all users by an operator
	rpc GetOperatorUserFinancialSummary(GetOperatorUserFinancialSummaryRequest) returns (GetOperatorUserFinancialSummaryResponse) {}

	// GetWalletConfig returns the wallet configuration for the current operator (user-facing)
	//
	// Deprecated: use GetGamificationConfig instead — its response is a strict superset
	// (includes clear_bonus_on_withdrawal) and is backed by the operator-level bundle cache,
	// so switching also fixes a server-side cache miss on every call to this endpoint.
	rpc GetWalletConfig(GetWalletConfigRequest) returns (GetWalletConfigResponse) {
		option deprecated = true;
		option (google.api.http) = {
			post: "/v1/wallet/config/get"
			body: "*"
		};
	}

	// GetGamificationConfig returns the per-currency gamification config (bet limits,
	// bonus rules, wagering requirements) plus the operator-level clear-bonus-on-withdrawal flag.
	// Scoped to the caller's operator context (from middleware). Returns only enabled and
	// non-hidden currencies, matching backoffice behavior.
	rpc GetGamificationConfig(GetGamificationConfigRequest) returns (GetGamificationConfigResponse) {
		option (google.api.http) = {
			post: "/v1/wallet/gamification/config/get"
			body: "*"
		};
	}

	// BatchGetUserFinancialMetrics returns deposit/withdrawal metrics for CRM segment evaluation
	// For balance, use GetWallets; for game metrics, use GetUserGameTransactionsSummary
	rpc BatchGetUserFinancialMetrics(BatchGetUserFinancialMetricsRequest) returns (BatchGetUserFinancialMetricsResponse) {}

	// BatchGetUserGameTransactionsSummary returns aggregated GGR/NGR (USD and reporting
	// currency) for up to 10,000 users, for CRM segment evaluation.
	rpc BatchGetUserGameTransactionsSummary(BatchGetUserGameTransactionsSummaryRequest) returns (BatchGetUserGameTransactionsSummaryResponse) {}

	// ManualAdjustCreditTurnoverField adjusts a credit's turnover or threshold value
	rpc ManualAdjustCreditTurnoverField(ManualAdjustCreditTurnoverFieldRequest) returns (ManualAdjustCreditTurnoverFieldResponse) {}

	// ListUserFreeRewards returns free spin and free bet details for a user
	rpc ListUserFreeRewards(ListUserFreeRewardsRequest) returns (ListUserFreeRewardsResponse) {}

	// ListUserFreeRewardsBO returns free spin and free bet rewards for BO with filters, pagination, and summary
	rpc ListUserFreeRewardsBO(ListUserFreeRewardsBORequest) returns (ListUserFreeRewardsBOResponse) {}

	// ListOperatorWithdrawableAmounts lists withdrawable amounts for operators filtered by hierarchy
	rpc ListOperatorWithdrawableAmounts(ListOperatorWithdrawableAmountsRequest) returns (ListOperatorWithdrawableAmountsResponse) {}

	// GetOperatorWithdrawCheckInfo returns operator financial health data for withdraw approval checks
	rpc GetOperatorWithdrawCheckInfo(GetOperatorWithdrawCheckInfoRequest) returns (GetOperatorWithdrawCheckInfoResponse) {}

	// GetOperatorWithdrawableAmount returns the computed withdrawable amount for a single operator.
	// MW formula (custody - est_cost - invoice - bankroll) is computed by wallet as the single source of truth.
	rpc GetOperatorWithdrawableAmount(GetOperatorWithdrawableAmountRequest) returns (GetOperatorWithdrawableAmountResponse) {}
}

message GetUserBalancesRequest {
	int64 user_id = 1;
}

message GetUserBalancesResponse {
	message Balance {
		string currency = 1;
		string cash = 2;
		string operator_bonus = 3;
		string provider_bonus = 4;
		string withdrawable_cash = 5;
		string transferable_bonus = 6;
	}
	repeated Balance balances = 1;
	// Whether the user is allowed to withdraw, based on operator payment settings (KYC level, no-withdraw-without-deposit)
	bool allow_withdraw = 2;
	// Whether the user is allowed to deposit, based on operator payment settings (KYC level)
	bool allow_deposit = 3;
	// Reasons why withdraw is not allowed, e.g. "kyc_level_insufficient", "no_deposit"
	repeated string withdraw_not_allowed_reasons = 4;
	// Reasons why deposit is not allowed, e.g. "kyc_level_insufficient"
	repeated string deposit_not_allowed_reasons = 5;
}

message GetUserBalanceRequest {
	int64 user_id = 1;
	string currency = 2;
	// optional target currency
	string settlement_currency = 3;
}

message GetUserBalanceResponse {
	// optional exchange rate between currency and target currency
	string exchange_rate = 1;
	string cash = 2;
	string operator_bonus = 3;
	string provider_bonus = 4;
}

// Transaction types for different operations
// Expected values:
// Credit operations:
//   - "payment_deposit"    - Payment deposit transaction
//   - "game_win"          - Game win transaction
//
// Debit operations:
//   - "payment_withdraw"   - Payment withdraw transaction
//   - "game_bet"          - Game bet transaction
//   - "payment_withdraw_freeze" - Payment withdraw freeze transaction
//
// Settlement operations:
//   - "payment_withdraw_settle" - Payment withdraw settlement
//
// Rollback operations:
//   - "game_bet_rollback"            - Game bet transaction rollback
//   - "game_win_rollback"            - Game win transaction rollback
//   - "payment_withdraw_rollback" - Payment withdraw transaction rollback

message CreditRequest {
	int64 user_id = 1;
	string currency = 2;
	string transaction_type = 3;
	string cash_amount = 4;
	string cash_turnover_threshold = 5;
	string operator_bonus_amount = 6;
	string operator_bonus_turnover_threshold = 7;
	string operator_bonus_withdraw_limit = 8;
	string comment = 9;
	optional int64 external_transaction_id = 10;
	api.common.OperatorContext operator_context = 11;
	int64 initiator_user_id = 12;
	string operator_reporting_currency =13;
	api.common.OperatorContext initiator_operator_context = 14;
}

message CreditResponse {
	int64 transaction_id = 1;
}

message DebitRequest {
	int64 user_id = 1;
	string currency = 2;
	string reporting_currency = 3;
	// Valid debit transaction types:
	//   - "manual_debit_cash"   - Manual debit cash transaction
	//   - "manual_debit_bonus"  - Manual debit bonus transaction
	string transaction_type = 4;
	optional int64 transaction_id = 5;
	string amount = 6;
	api.common.OperatorContext operator_context = 7;
	int64 initiator_user_id = 8;
	string comment = 9;
}

message DebitResponse {
	int64 transaction_id = 1;
}

message GameDebitRequest {
	int64 user_id = 1;
	string currency = 2;
	string settlement_currency = 3;
	string reporting_currency = 4;
	string exchange_rate = 5;
	// Valid game debit transaction types:
	//   - "game_bet"          - Game bet transaction
	string transaction_type = 6;
	int64 transaction_id = 7;
	string amount = 8;
	string turnover = 9;
	api.common.OperatorContext operator_context = 10;
	optional bool allow_overdraft = 11;
	int64 round_id = 12;
	string game_id = 13;
	// product_type triggers operator sub-account debit in the same transaction when non-empty.
	// Valid values are defined in wallet-service internal/data/sub_account_rules.go
	// (e.g. "prediction" — covers Polymarket and similar prediction-market products).
	// Wallet computes the sub-account-currency amount itself from `amount` +
	// `settlement_currency` via the same exchange rates it uses for cash_amount_usd —
	// caller does not (and should not) supply it.
	optional string product_type = 14;
}

message AffectedCredit {
	int64 credit_id = 1;
	// currency of the credit
	string settlement_currency = 2;
	// currency amount of the game transaction
	string amount = 3;
	// settlement currency amount of the wallet transaction
	string amount_settlement_currency = 4;
	string amount_usd = 5;
	string amount_reporting_currency = 6;
	string cash_amount = 7; 
	string cash_amount_settlement_currency = 8;
	string cash_amount_usd = 9;
	string cash_amount_reporting_currency = 10;
	string operator_bonus_amount = 11;
	string operator_bonus_amount_settlement_currency = 12;
	string operator_bonus_amount_usd = 13;
	string operator_bonus_amount_reporting_currency = 14;
	string provider_bonus_amount = 15;
	string provider_bonus_amount_settlement_currency = 16;
	string provider_bonus_amount_usd = 17;
	string provider_bonus_amount_reporting_currency = 18;
}

