// Free spin details - all fields from UserFreeSpin DO
message FreeSpinDetail {
	int64 id = 1;
	// "deposit_reward", "promo_code"
	string source_type = 2;
	int64 source_id = 3;

	// Currency info
	// Deposit/settlement currency
	string settlement_currency = 4;
	// Game currency (play currency)
	string currency = 5;
	string reporting_currency = 6;

	// Reward config
	// "cash", "bonus"
	string reward_type = 7;
	// Turnover multiplier
	int32 wagering_requirement = 8;
	string max_withdrawal_multiplier = 9;
	// Validity duration for winnings reward in milliseconds
	int64 reward_validity = 10;
	// Free spin validity (ms), 0 = no expiration. Applies to all rewards uniformly.
	int64 free_spin_validity = 19;

	// Total winnings aggregated across all reward items
	// In settlement currency
	string total_winnings = 11;
	string total_winnings_usd = 12;
	string total_winnings_reporting_currency = 13;

	// Per-game reward details
	repeated FreeSpinRewardDetail rewards = 14;

	int64 created_at = 15;
	int64 updated_at = 16;

	// Freespin usage counts (synced from game service, shared across all games)
	// Rounds already played (aggregated)
	int32 rounds_played = 17;
	// Total rounds available (aggregated)
	int32 total_rounds = 18;
}

// Single free spin reward item - from FreeSpinRewardItem in JSONB
message FreeSpinRewardDetail {
	// Game provider ID
	string provider_id = 1;
	// Game ID
	string game_id = 2;
	// Free spin level
	int32 level = 3;

	// Spin counts
	// Total spin count
	int32 spin_count = 4;
	// Already used count
	int32 used_count = 5;
	// Remaining count (spin_count - used_count)
	int32 remaining_count = 6;

	// Expiration
	// Field 7 was free_spin_validity, moved to FreeSpinDetail.free_spin_validity
	reserved 7;
	reserved "free_spin_validity";
	// Calculated expiration timestamp in milliseconds, 0 means never expires
	int64 expired_at = 8;

	// Winnings for this specific game
	// In settlement currency
	string winnings = 9;
	string winnings_usd = 10;
	string winnings_reporting_currency = 11;

	// Bet amount resolved from (provider_id, game_id, level) via game service.
	// Empty until game service provides the mapping API.
	string bet_amount = 12;
}

// Free bet details - all fields from UserFreeBet DO
message FreeBetDetail {
	int64 id = 1;
	// "deposit_reward", "promo_code"
	string source_type = 2;
	int64 source_id = 3;

	// Currency info
	// Betting currency (settlement currency)
	string currency = 4;
	string reporting_currency = 5;

	// Reward config
	// "cash", "bonus"
	string reward_type = 6;
	// Turnover multiplier
	int32 wagering_requirement = 7;
	string max_withdrawal_multiplier = 8;
	// Validity duration for winnings reward in milliseconds
	int64 reward_validity = 9;

	// Total winnings aggregated across all reward items
	// In settlement currency
	string total_winnings = 10;
	string total_winnings_usd = 11;
	string total_winnings_reporting_currency = 12;

	// Per-template reward details
	repeated FreeBetRewardDetail rewards = 13;

	int64 created_at = 14;
	int64 updated_at = 15;
}

// Single free bet reward item - from FreeBetRewardItem in JSONB
message FreeBetRewardDetail {
	// External template reference
	string template_id = 1;
	// Free bet amount (decimal string)
	string amount = 2;

	// Usage status
	// Usage count (typically 0 or 1)
	int32 used_count = 3;
	// Whether the free bet has been used
	bool is_used = 4;

	// Expiration
	// Configured validity duration in milliseconds
	int64 free_bet_validity = 5;
	// Calculated expiration timestamp in milliseconds, 0 means never expires
	int64 expired_at = 6;

	// Winnings for this specific free bet
	// In settlement currency
	string winnings = 7;
	string winnings_usd = 8;
	string winnings_reporting_currency = 9;

	// Optional extra data
	optional bytes extra = 10;
}

// ============================================
// App Download Reward Config
// ============================================

// Bonus money configuration for app download reward.
// Structurally identical to PromoCodeBonusMoneyConfig but kept separate
// to allow independent evolution.
message AppDownloadBonusMoneyConfig {
	// Whether this bonus money reward is active.
	bool enabled = 1;
	// Currency code for the reward. e.g. "USD", "BRL"
	string currency = 2;
	// Credit type the reward is issued as. "cash" | "bonus"
	string reward_type = 3;
	// Fixed reward amount (decimal string). e.g. "10.00"
	string amount = 4;
	// Wagering multiplier the player must meet before withdrawal. 0-100.
	int32 wagering_requirement = 5;
	// Max withdrawal = multiplier x bonus amount. e.g. "3" means 3x the bonus.
	string max_withdrawal_multiplier = 6;
	// Reward validity in milliseconds. 0 = no expiration.
	int64 reward_validity = 7;
}

// Composite reward configuration for an app download reward entry.
// All three sub-configs are optional; at least one should be enabled.
message AppDownloadRewardConfigs {
	optional AppDownloadBonusMoneyConfig bonus_money_config = 1;
	optional FreeSpinConfig free_spin_config = 2;
	optional FreeBetConfig free_bet_config = 3;
}

// A single country entry in the app download reward config list.
message AppDownloadRewardConfigItem {
	// ISO 3166-1 alpha-2 country code, or "Global" for the fallback entry.
	string country = 1;
	// Whether to show a forced download popup to users in this country.
	bool force_download_popup = 2;
	// The reward configuration for this country.
	AppDownloadRewardConfigs reward_configs = 3;
	google.protobuf.Timestamp created_at = 4;
	google.protobuf.Timestamp updated_at = 5;
}

// Full replacement of all app download reward config entries for an operator.
// Existing entries are deleted and replaced with the provided list.
message SetAppDownloadRewardConfigRequest {
	api.common.OperatorContext initiator_operator_context = 1;
	api.common.OperatorContext target_operator_context = 2;
	int64 user_id = 3;
	// Operator-level toggle. When true, the operator inherits the parent's config list.
	optional bool follow_parent = 4;
	// Full list of country entries. Replaces all existing entries for this operator.
	repeated AppDownloadRewardConfigItem configs = 5;
}
message SetAppDownloadRewardConfigResponse {}

// Returns both custom (operator's own) and default (inherited from parent) config lists.
message GetAppDownloadRewardConfigRequest {
	api.common.OperatorContext initiator_operator_context = 1;
	api.common.OperatorContext target_operator_context = 2;
}
message GetAppDownloadRewardConfigResponse {
	// Operator-level follow_parent toggle. true = using parent's list.
	bool follow_parent = 1;
	// Operator's own config entries.
	repeated AppDownloadRewardConfigItem custom_configs = 2;
	// Inherited config entries from the nearest ancestor with follow_parent=false.
	repeated AppDownloadRewardConfigItem default_configs = 3;
	// The ancestor operator context that default_configs come from.
	api.common.OperatorContext inherited_operator_context = 4;
	// Display name of the ancestor operator.
	string inherited_from_operator_name = 5;
}

message ClaimAppDownloadRewardRequest {}
message ClaimAppDownloadRewardResponse {}

message GetAppDownloadRewardStatusRequest {
	// login method of the user
	string login_method = 1;
}
message GetAppDownloadRewardStatusResponse {
	// true if user can claim the reward
	bool eligible = 1;
	// true if user already claimed the reward
	bool already_claimed = 2;
	// resolved from CF-IPCountry header
	string country = 3;
	// reward available for the user's country (nil if not eligible)
	AppDownloadRewardConfigs reward_configs = 4;
	// whether to force showing the download popup
	bool force_download_popup = 5;
}

message GetCompanyFinancialSummaryRequest {
	api.common.OperatorContext operator_context = 1;
	optional google.protobuf.Timestamp start_time = 2;
	optional google.protobuf.Timestamp end_time = 3;
}

message GetCompanyFinancialSummaryResponse {
	CompanyFinancialSummary summary = 1;
}

message BatchGetCompanyFinancialSummariesRequest {
	api.common.OperatorContext operator_context = 1;
	// company operator ids to fetch summaries for. Hard-capped at 200 entries server-side.
	repeated int64 company_operator_ids = 2;
	optional google.protobuf.Timestamp start_time = 3;
	optional google.protobuf.Timestamp end_time = 4;
}

message BatchGetCompanyFinancialSummariesResponse {
	// keyed by company_operator_id. company_max_withdrawable_usd and custody_max_withdrawable_usd
	// are NOT computed in the batch response (left empty); use the single-company GetCompanyFinancialSummary
	// when MW is needed.
	map<int64, CompanyFinancialSummary> summaries = 1;
}

message CompanyFinancialSummary {
	// [NOT time-filtered] Total wallet balance of all sub-operators under this company, converted to USD using real-time exchange rates
	string custody_balance_usd = 1;
	// [Time-filtered] Total amount deposited to sub-operators from backoffice (operator_payment_credit), absolute value in USD
	string internal_deposits_usd = 2;
	// [Time-filtered] Total amount credited to sub-operators when their players deposit (operator_user_credit), absolute value in USD
	string user_deposits_usd = 3;
	// [Time-filtered] Total amount debited from sub-operators when their players withdraw (settled operator_user_withdraw_freeze), absolute value in USD
	string player_withdraw_usd = 4;
	// [Time-filtered] Settled amount withdrawn from sub-operators by company (settled operator_payment_withdraw_freeze on sub-operators), absolute value in USD
	string custody_company_withdraw_usd = 5;
	// [Time-filtered] Total amount transferred from sub-operators to this company (operator_balance_transfer out), absolute value in USD
	string transfer_usd = 6;
	// [Time-filtered] Pending amount frozen from sub-operators when their players withdraw but not yet settled (operator_user_withdraw_freeze with no status), absolute value in USD
	string pending_player_withdraw_usd = 7;
	// [Time-filtered] Pending amount frozen from sub-operators by company-initiated withdrawals but not yet settled (operator_payment_withdraw_freeze with no status on sub-operators), absolute value in USD
	string custody_pending_company_withdraw_usd = 8;
	// [Time-filtered] Pending amount frozen from sub-operators by system balance freeze but not yet settled (operator_balance_freeze with no status), absolute value in USD
	string pending_balance_freeze_usd = 9;
	// [Time-filtered] Settled amount frozen from sub-operators by system balance freeze (operator_balance_freeze with status settled), absolute value in USD
	string settled_balance_freeze_usd = 10;
	// [Time-filtered] Net swap amount across all sub-operators (operator_balance_swap), representing swap fee loss in USD
	string swap_fee_usd = 11;
	// [NOT time-filtered] Pending amount frozen from company's own wallet for payment withdrawals (operator_payment_withdraw_freeze with no status on company operator), absolute value in USD
	string company_pending_withdraw_usd = 12;
	// [NOT time-filtered] Pending amount frozen from company's own wallet for affiliate withdrawals (legacy: operator_affiliate_withdraw_freeze on company operator), absolute value in USD
	string company_pending_affiliate_withdraw_usd = 13;
	// [Time-filtered] Total manual credit to sub-operators (operator_manual_credit), absolute value in USD
	string manual_credit_usd = 14;
	// [Time-filtered] Total manual debit from sub-operators (operator_manual_debit), absolute value in USD
	string manual_debit_usd = 15;
	// [NOT time-filtered] Total bankroll amount of sub-operators in USD
	string bankroll_usd = 16;
	// [Time-filtered] Pending amount frozen from sub-operators for affiliate withdrawals (operator_affiliate_withdraw_freeze with no status on sub-operators), absolute value in USD
	string custody_pending_affiliate_withdraw_usd = 17;
	// [Time-filtered] Settled affiliate withdrawals from sub-operators (operator_affiliate_withdraw_freeze with status settled on sub-operators), absolute value in USD
	string custody_affiliate_withdraw_usd = 18;
	// [NOT time-filtered] Settled affiliate withdrawals from company's own wallet (legacy: operator_affiliate_withdraw_freeze with status settled on company operator), absolute value in USD
	string company_affiliate_withdraw_usd = 19;
	// [NOT time-filtered] Settled company's own payment withdrawals (operator_payment_withdraw_freeze with status settled on company operator), absolute value in USD
	string company_withdraw_usd = 20;
	// [NOT time-filtered] Company operator's own max withdrawable (MW = custody - est_cost - invoice, bankroll=0 for company level)
	string company_max_withdrawable_usd = 21;
	// [NOT time-filtered] Sum of all sub-operator max withdrawable amounts (each computed as custody - est_cost - invoice - bankroll)
	string custody_max_withdrawable_usd = 22;
	// [NOT time-filtered] Total deposits to company's own wallet (operator_payment_credit on company operator), absolute value in USD
	string company_deposit_usd = 23;
}

// ============================================================================
// GameBatchBetAndSettle - batch bet and settle in a single atomic operation
// ============================================================================

message GameBatchBetAndSettleRequest {
	int64 user_id = 1;
	string currency = 2;
	string settlement_currency = 3;
	string reporting_currency = 4;
	string exchange_rate = 5;
	api.common.OperatorContext operator_context = 6;
	optional bool allow_overdraft = 7;
	repeated BatchBetItem bets = 8;
	repeated BatchWinItem wins = 9;
}

message BatchBetItem {
	// Unique transaction ID for this bet (used for idempotency)
	int64 transaction_id = 1;
	// Bet amount in player currency
	string amount = 2;
	// Turnover amount for wagering requirements
	string turnover = 3;
	// Game round id; used by wallet-side reverse lookup when matching pure-win callbacks
	int64 round_id = 4;
	// Game identifier (e.g., provider game code); used by wallet-side reverse lookup fallback
	string game_id = 5;
}

message BatchWinItem {
	// Unique transaction ID for this win (used for idempotency)
	int64 transaction_id = 1;
	// Win amount in player currency ("0" if player lost)
	string amount = 2;
	// References the bet's transaction_id that this win settles
	int64 original_transaction_id = 3;
	// Transaction type of the original bet (e.g., "game_bet")
	optional string original_transaction_type = 4;
	// Turnover amount from the original bet for credit turnover tracking
	string original_transaction_turnover = 5;
	// Game round id; used by wallet-side reverse lookup when original_transaction_id is missing
	int64 round_id = 6;
	// Game identifier; used by wallet-side reverse lookup fallback
	string game_id = 7;
}

message GameBatchBetAndSettleResponse {
	string exchange_rate = 1;
	// Final balance after all bets and wins applied (in player currency)
	string cash = 2;
	string operator_bonus = 3;
	string provider_bonus = 4;
	// Per-bet transaction results
	repeated BatchTransactionResult bet_results = 5;
	// Per-win transaction results
	repeated BatchTransactionResult win_results = 6;
	// Aggregated credit impact from all bets
	repeated AffectedCredit bet_affected_credits = 7;
	// Aggregated credit impact from all wins
	repeated AffectedCredit win_affected_credits = 8;
}

message BatchTransactionResult {
	int64 transaction_id = 1;
	string cash_amount = 2;
	string operator_bonus_amount = 3;
	string provider_bonus_amount = 4;
	string cash_amount_usd = 5;
	string operator_bonus_amount_usd = 6;
	string provider_bonus_amount_usd = 7;
	string cash_amount_reporting_currency = 8;
	string operator_bonus_amount_reporting_currency = 9;
	string provider_bonus_amount_reporting_currency = 10;
}

// ============================================
// Operator Withdrawable Amount
// ============================================

message ListOperatorWithdrawableAmountsRequest {
	api.common.OperatorContextFilters operator_context_filters = 1;
	api.common.OperatorContext operator_context = 2;
	// default 1
	optional int32 page = 3;
	// default 20
	optional int32 page_size = 4;
	// if nil, pagination is true
	optional bool pagination = 5;
}

message OperatorWithdrawableAmount {
	api.common.OperatorContext operator_context = 1;
	string retailer_operator_name = 2;
	string company_operator_name = 3;
	string operator_name = 4;
	// Individual / Co-Operation
	string operator_mode = 5;
	string custody_usd = 6;
	string est_cost_usd = 7;
	string est_rs_to_sys_usd = 8;
	string locked_for_pending_invoices_usd = 9;
	string transferable_amount_usd = 10;
	string withdrawable_amount_usd = 11;
	// aggregated pending freeze in USD (sum of the 4 breakdown fields below)
	string operator_pending_freeze_usd = 14;
	// bankroll amount in USD (for co-operation mode operators)
	string bankroll_usd = 15;
	// breakdown of operator_pending_freeze_usd by transaction type (absolute values)
	string operator_pending_user_withdraw_freeze_usd = 16;
	string operator_pending_affiliate_withdraw_freeze_usd = 17;
	string operator_pending_payment_withdraw_freeze_usd = 18;
	// operator_balance_freeze (System-initiated manual freeze)
	string operator_balance_freeze_usd = 19;
	// reserved: 12 was user_balance_usd, 20 was pending_bets_usd (removed from MW formula)
}

message ListOperatorWithdrawableAmountsResponse {
	repeated OperatorWithdrawableAmount items = 1;
	int32 total = 2;
	int32 page = 3;
	int32 page_size = 4;
}

// WithdrawScenario identifies the caller context so wallet can apply the right MW formula.
// Bankroll (operator MinLaunchBalance, co-operation mode only) constrains operator
// self-withdrawals but not player/affiliate withdrawals — wallet branches on this value.
enum WithdrawScenario {
	// Default — treated as OPERATOR for backward compatibility during rollout.
	WITHDRAW_SCENARIO_UNSPECIFIED = 0;
	// Player withdrawal: bankroll NOT deducted from MW.
	WITHDRAW_SCENARIO_PLAYER = 1;
	// Affiliate withdrawal: bankroll NOT deducted from MW.
	WITHDRAW_SCENARIO_AFFILIATE = 2;
	// Operator self-withdrawal: bankroll deducted from MW.
	WITHDRAW_SCENARIO_OPERATOR = 3;
}

message GetOperatorWithdrawCheckInfoRequest {
	api.common.OperatorContext operator_context = 1;
	string currency = 2;
	// Caller scenario. Wallet uses this to decide whether bankroll is deducted from MW.
	// UNSPECIFIED is accepted for rollout compat and treated as OPERATOR.
	WithdrawScenario withdraw_scenario = 3;
}

message GetOperatorWithdrawCheckInfoResponse {
	// Raw components (USD) - callers compute MW formula from these building blocks
	// operator total balance across all currencies in USD
	string custody_usd = 1;
	// estimated cost in USD (includes RevShare)
	string est_cost_usd = 2;
	// amount locked for pending invoices in USD
	string locked_for_pending_invoices_usd = 3;
	// pending freeze from operator_balance_transaction in USD (absolute value)
	string operator_pending_freeze_usd = 4;
	// reserved: 5 was user_balance_usd, 12 was pending_bets_usd (removed from MW formula)
	// bankroll amount in USD (for co-operation mode operators); informational — wallet
	// already applies it (or not) to the computed MW based on withdraw_scenario.
	string bankroll_usd = 13;

	// Currency-specific data
	// operator balance in the requested currency
	string operator_balance_in_currency = 6;
	// pending freeze from operator_balance_transaction in the requested currency (absolute value)
	string operator_pending_freeze_in_currency = 7;

	// Metadata
	// decimal places for the requested currency (from system-level config)
	int32 currency_decimal_places = 8;
	// decimal places for USD (from system-level config)
	int32 usd_decimal_places = 9;

	// Computed MW (wallet is the single source of truth for the formula).
	// For OPERATOR (and UNSPECIFIED): transferable = custody - est_cost - bankroll.
	// For PLAYER / AFFILIATE:        transferable = custody - est_cost.
	string transferable_amount_usd = 10;
	// withdrawable = transferable - locked_for_pending_invoices
	string withdrawable_amount_usd = 11;
}

// GetOperatorWithdrawableAmount — single operator MW query
message GetOperatorWithdrawableAmountRequest {
	api.common.OperatorContext operator_context = 1;
}

message GetOperatorWithdrawableAmountResponse {
	string custody_usd = 1;
	string est_cost_usd = 2;
	string est_rs_to_sys_usd = 3;
	string locked_for_pending_invoices_usd = 4;
	// transferable = custody - est_cost - bankroll
	string transferable_amount_usd = 5;
	// withdrawable = transferable - locked_for_pending_invoices (this is the MW)
	string withdrawable_amount_usd = 6;
	// bankroll in USD (only for co-operation mode site-level operators, 0 otherwise)
	string bankroll_usd = 7;
}

// ========== ListUserFreeRewardsBO Messages ==========

message ListUserFreeRewardsBORequest {
	int64 user_id = 1;
	// Filter by reward type: "free_spin", "free_bet"
	repeated string types = 2;
	// Filter by derived status: "active", "used", "expired", "revoked"
	repeated string statuses = 3;
	// Filter by source: "deposit_reward", "promo_code", "app_download_reward"
	repeated string source_types = 4;
	// If true, only return rewards expiring within 7 days
	optional bool expiring_soon = 5;
	// Default 1
	optional int32 page = 6;
	// Default 20
	optional int32 page_size = 7;
	// Initiator's operator context — used to verify the target user belongs to this operator hierarchy
	api.common.OperatorContext initiator_operator_context = 8;
}

message ListUserFreeRewardsBOResponse {
	repeated FreeRewardBOItem items = 1;
	int32 total = 2;
	int32 page = 3;
	int32 page_size = 4;
	// Summary stats for the user, NOT affected by list filters
	FreeRewardSummary summary = 5;
}

// Summary cards for BO free reward page
message FreeRewardSummary {
	// Remaining active free spin count
	int32 active_free_spins = 1;
	// Remaining active free bet count
	int32 active_free_bets = 2;
	// Count of rewards expiring within 7 days
	int32 expiring_soon_count = 3;
	// All-time total granted count (spins + bets)
	int32 total_granted_count = 4;
	// All-time total used count
	int32 total_used_count = 5;
}

// A single free reward grant (either free spin or free bet) for BO display
message FreeRewardBOItem {
	int64 id = 1;
	// "free_spin" or "free_bet"
	string type = 2;
	// Derived status: "active", "used", "expired", "revoked"
	string status = 3;
	// "deposit_reward", "promo_code", "app_download_reward"
	string source_type = 4;
	int64 source_id = 5;

	// Settlement/deposit currency
	string settlement_currency = 6;
	// Game currency (free_spin) or betting currency (free_bet)
	string currency = 7;

	// Aggregated counts.
	// For free_spin: from record-level rounds_played/total_rounds (synced from game service).
	// For free_bet: from rewards JSONB used_count.
	int32 total_count = 8;
	int32 remaining_count = 9;
	int32 used_count = 10;

	// Expandable sub-rows: populated based on type
	repeated FreeSpinRewardDetail free_spin_rewards = 11;
	repeated FreeBetRewardDetail free_bet_rewards = 12;

	// Earliest expiration timestamp (ms) across all sub-rewards, 0 = never expires
	int64 expired_at = 13;

	// Total winnings in settlement currency
	string total_winnings = 14;
	string total_winnings_usd = 15;

	// Reward config
	// "cash" or "bonus" — what winnings become
	string reward_type = 16;
	int32 wagering_requirement = 17;
	string max_withdrawal_multiplier = 18;
	// Winning reward validity in milliseconds
	int64 reward_validity = 19;

	// Timestamps
	int64 created_at = 20;
	int64 updated_at = 21;
	// When fully used/expired/revoked (for History tab)
	int64 completed_at = 22;
	// When revoked, 0 = not revoked (reserved for future revoke feature)
	int64 revoked_at = 23;
}

// ─── User Swap ──────────────────────────────────────────────────────────────

// UserSwapConfig is the operator-level template inherited by descendants when follow_parent=true.
message UserSwapConfig {
	// When true, swapping cash forfeits all bonuses (operator + provider) of the source currency.
	bool bonuses_cleared_on_swap = 1;
	// Default swap fee rate as a decimal string. Deducted from the source cash.
	string default_swap_fee = 2;
	// Per-source-currency overrides on top of default_swap_fee.
	// Key: source currency code. Value: fee rate as decimal string (e.g. "0.01" = 1%, range [0, 1)).
	map<string, string> fee_overrides = 3;
	// Currencies allowed as swap source. Empty list = none allowed.
	repeated string allowed_swap_out = 4;
	// Currencies allowed as swap target. Empty list = none allowed.
	repeated string allowed_swap_in = 5;
	int64 created_at = 6;
	int64 updated_at = 7;
}

message SetUserSwapEnabledRequest {
	api.common.OperatorContext initiator_operator_context = 1;
	api.common.OperatorContext target_operator_context = 2;
	bool enabled = 3;
}

message SetUserSwapEnabledResponse {
	bool enabled = 1;
	// Aggregated result after applying self + ancestors.
	bool aggregated_enabled = 2;
}

message SetUserSwapTemplateRequest {
	api.common.OperatorContext initiator_operator_context = 1;
	api.common.OperatorContext target_operator_context = 2;
	// Operator-level toggle. When true, the operator inherits the parent's config.
	optional bool follow_parent = 3;
	UserSwapConfig config = 4;
}

message SetUserSwapTemplateResponse {}

message GetUserSwapConfigRequest {
	api.common.OperatorContext initiator_operator_context = 1;
	api.common.OperatorContext target_operator_context = 2;
}

message GetUserSwapConfigResponse {
	// Operator-level follow_parent toggle. true = using parent's config.
	bool follow_parent = 1;
	// Operator's own config (empty fields when follow_parent=true and never customized).
	UserSwapConfig custom_config = 2;
	// Inherited config from the nearest ancestor with follow_parent=false.
	UserSwapConfig default_config = 3;
	// The ancestor operator context that default_config comes from.
	api.common.OperatorContext inherited_operator_context = 4;
	// Display name of the ancestor operator.
	string inherited_from_operator_name = 5;
	// The operator's own user-swap feature flag (maps to operator_wallet_configs.user_swap_enabled).
	bool enabled = 6;
	// AND of self and all ancestors — the flag the backend actually enforces.
	bool aggregated_enabled = 7;
	// AND of ancestors only (excludes self). Lets the BO UI distinguish
	// "self is off" from "some ancestor is off" without re-deriving it from
	// `enabled` and `aggregated_enabled`.
	bool parent_enabled = 8;
}

message UserSwapRequest {
	// Source currency (must be in effective config.allowed_swap_out).
	string source_currency = 1;
	// Target currency (must be in effective config.allowed_swap_in).
	string target_currency = 2;
	// Amount of source cash to swap. Must not exceed the user's withdrawable cash in source currency.
	string cash_amount = 3;
}

message UserSwapResponse {
	// Source balance after swap.
	string source_cash = 1;
	// Target balance after swap.
	string target_cash = 2;
	// Actual fee deducted from source cash (in source currency).
	string fee_amount = 3;
	// Exchange rate used (source → target, applied after fee).
	string exchange_rate = 4;
	// Net amount credited to target (cash_amount - fee, converted at exchange_rate).
	string target_cash_amount = 5;
	// Two linked balance transaction ids (swap_out / swap_in).
	int64 source_balance_transaction_id = 6;
	int64 target_balance_transaction_id = 7;
}

message GetPlayerSwapConfigRequest {}

message GetPlayerSwapConfigResponse {
	// Effective swap config (inherited through the operator hierarchy).
	// Empty/zero-valued when no operator in the chain has a config with follow_parent=false.
	UserSwapConfig config = 1;
	// Aggregated user-swap feature flag — AND across self + all ancestors.
	// When false the frontend should hide the swap entry point entirely.
	bool aggregated_enabled = 2;
}

message ListUserSwapHistoryRequest {
	// 1-based; default 1.
	optional int32 page = 1;
	// Default 20, capped at 100.
	optional int32 page_size = 2;
	optional google.protobuf.Timestamp start_time = 3;
	optional google.protobuf.Timestamp end_time = 4;
	// Filter by source (from) currency; matches the swap_out row's settlement_currency.
	optional string source_currency = 5;
}

message ListUserSwapHistoryResponse {
	repeated UserSwapHistoryEntry entries = 1;
	int32 total = 2;
	int32 page = 3;
	int32 page_size = 4;
}

// One logical swap: source leg + target leg + shared swap-level fields.
message UserSwapHistoryEntry {
	// Mirror of source_leg.created_at; included at the top level for sort/display convenience.
	google.protobuf.Timestamp created_at = 1;
	// user_balance_swap_out side.
	SwapLeg source_leg = 2;
	// user_balance_swap_in side.
	SwapLeg target_leg = 3;
	// Effective fee rate at swap time (decimal string).
	string fee_rate = 4;
	// Fee deducted from the source cash, in source currency.
	string fee_amount = 5;
	// source -> target rate, applied to (source_amount - fee).
	string exchange_rate = 6;
	// True when the swap forfeited bonuses (V1: always false; populated in a follow-up).
	bool bonus_forfeited = 7;
}

message SwapLeg {
	int64 transaction_id = 1;
	google.protobuf.Timestamp created_at = 2;
	string currency = 3;
	// Signed change to total balance: negative on the source (out) leg, positive on the target (in) leg.
	string cash_amount = 4;
	// cash + operator_bonus + provider_bonus before the leg was applied.
	string before_balance = 5;
	// cash + operator_bonus + provider_bonus after the leg was applied.
	string after_balance = 6;
}
