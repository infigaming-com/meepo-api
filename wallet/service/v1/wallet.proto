	string game_id = 14;
	// product_type triggers operator sub-account credit in the same transaction when non-empty.
	// Must match the product_type used in the paired GameDebit. Wallet computes
	// the sub-account-currency payout itself from `amount` + `settlement_currency`
	// — caller does not (and should not) supply it.
	optional string product_type = 15;
}

message GameCreditResponse {
	int64 transaction_id = 1;
	string exchange_rate = 2;
	string cash = 3;
	string operator_bonus = 4;
	string provider_bonus = 5;
	string cash_amount = 6;
	string operator_bonus_amount = 7;
	string provider_bonus_amount = 8;
	string cash_amount_usd = 9;
	string operator_bonus_amount_usd = 10;
	string provider_bonus_amount_usd = 11;
	string cash_amount_reporting_currency = 12;
	string operator_bonus_amount_reporting_currency = 13;
	string provider_bonus_amount_reporting_currency = 14;
	repeated AffectedCredit affected_credits = 15;
	// Winning commission deducted from the player's incoming amount (only set
	// when product_type triggers commission and net_win > 0). Player's
	// cash_amount above already reflects the deduction. Caller may use these
	// fields for audit/logs; the authoritative ledger is winning_commission_records.
	string winning_commission_amount = 16;
	string winning_commission_amount_usd = 17;
	// winning_commission_rate is a plain ratio (e.g. "0.10" = 10%), NOT a
	// percentage — do not multiply by 100 on display.
	string winning_commission_rate = 18;
}

