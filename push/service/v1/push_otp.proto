syntax = "proto3";

package api.push.service.v1;

import "common/common.proto";

option go_package = "github.com/infigaming-com/meepo-api/push/service/v1;v1";
option java_multiple_files = true;
option java_package = "api.push.service.v1";

// PushOTP service for OTP delivery, provider/template management, and send logs.
//
// ## Architecture (3-layer model)
//
// The OTP system uses a decoupled 3-layer model:
//
//   Provider  — Third-party service credentials & config (e.g., EngageLab account).
//               Created once, reusable across multiple countries and operators.
//               Identified by owner_operator_id (who created it).
//
//   Binding   — Maps a Provider to an operator+country for routing.
//               Controls enabled/disabled, priority, and phone prefix filtering.
//               One provider can have multiple bindings (different countries/operators).
//               Multiple bindings per (operator, country) are allowed, ordered by priority.
//
//   Template  — Message content bound to a Provider, per business scenario.
//               Scoped to (operator, country, template_type, language).
//
// ## Routing chain (when SendOTP is called for a phone number)
//
// The system resolves a provider binding using this fallback chain (first match wins):
//   For each level: operator → company_operator → retailer_operator → system_operator:
//     1. (level_id, user's country, enabled=true) ORDER BY priority ASC
//     2. (level_id, "global",       enabled=true) ORDER BY priority ASC
//   Within each binding, phone_prefixes are checked (empty = match all).
//   The first binding whose phone prefix matches (or is empty) wins.
//
// Template resolution follows a similar chain with additional language fallback:
//   For each level: operator → company_operator → retailer_operator → system_operator:
//     1. (level_id, country, template_type, language)
//     2. (level_id, country, template_type, "en")
//     3. (level_id, "global", template_type, language)
//     4. (level_id, "global", template_type, "en")
service PushOTP {
  // ====== Inter-service: OTP delivery ======
  rpc SendOTP(SendOTPRequest) returns (SendOTPResponse) {}

  // ====== Backoffice: Provider CRUD ======
  rpc CreateOTPProvider(CreateOTPProviderRequest) returns (CreateOTPProviderResponse) {}
  rpc UpdateOTPProvider(UpdateOTPProviderRequest) returns (UpdateOTPProviderResponse) {}
  rpc DeleteOTPProvider(DeleteOTPProviderRequest) returns (DeleteOTPProviderResponse) {}
  rpc GetOTPProvider(GetOTPProviderRequest) returns (GetOTPProviderResponse) {}
  rpc ListOTPProviders(ListOTPProvidersRequest) returns (ListOTPProvidersResponse) {}

  // ====== Backoffice: Provider Binding CRUD ======
  rpc CreateOTPProviderBinding(CreateOTPProviderBindingRequest) returns (CreateOTPProviderBindingResponse) {}
  rpc UpdateOTPProviderBinding(UpdateOTPProviderBindingRequest) returns (UpdateOTPProviderBindingResponse) {}
  rpc DeleteOTPProviderBinding(DeleteOTPProviderBindingRequest) returns (DeleteOTPProviderBindingResponse) {}
  rpc ListOTPProviderBindings(ListOTPProviderBindingsRequest) returns (ListOTPProviderBindingsResponse) {}
  // ListOTPBindingCountries returns the distinct countries that have provider bindings
  // for a given operator. Useful for building country selector UIs or checking coverage.
  rpc ListOTPBindingCountries(ListOTPBindingCountriesRequest) returns (ListOTPBindingCountriesResponse) {}

  // CheckOTPBindingCountry checks whether an operator has at least one enabled provider
  // binding for a specific country. Useful for pre-flight validation before calling SendOTP.
  rpc CheckOTPBindingCountry(CheckOTPBindingCountryRequest) returns (CheckOTPBindingCountryResponse) {}

  // ====== Backoffice: Template CRUD ======
  rpc CreateOTPTemplate(CreateOTPTemplateRequest) returns (CreateOTPTemplateResponse) {}
  rpc UpdateOTPTemplate(UpdateOTPTemplateRequest) returns (UpdateOTPTemplateResponse) {}
  rpc DeleteOTPTemplate(DeleteOTPTemplateRequest) returns (DeleteOTPTemplateResponse) {}
  rpc GetOTPTemplate(GetOTPTemplateRequest) returns (GetOTPTemplateResponse) {}
  rpc ListOTPTemplates(ListOTPTemplatesRequest) returns (ListOTPTemplatesResponse) {}
  rpc SyncOTPTemplateStatus(SyncOTPTemplateStatusRequest) returns (SyncOTPTemplateStatusResponse) {}

  // ====== Backoffice: Send logs ======
  rpc ListOTPSendLogs(ListOTPSendLogsRequest) returns (ListOTPSendLogsResponse) {}

  // ====== SMS Channel Rate CRUD ======
  rpc CreateSMSChannelRate(CreateSMSChannelRateRequest) returns (CreateSMSChannelRateResponse) {}
  rpc UpdateSMSChannelRate(UpdateSMSChannelRateRequest) returns (UpdateSMSChannelRateResponse) {}
  rpc DeleteSMSChannelRate(DeleteSMSChannelRateRequest) returns (DeleteSMSChannelRateResponse) {}
  rpc ListSMSChannelRates(ListSMSChannelRatesRequest) returns (ListSMSChannelRatesResponse) {}
  rpc BatchCreateSMSChannelRates(BatchCreateSMSChannelRatesRequest) returns (BatchCreateSMSChannelRatesResponse) {}
}

// ============ Enums ============

enum OTPChannel {
  OTP_CHANNEL_UNSPECIFIED = 0;
  OTP_CHANNEL_SMS = 1;
  OTP_CHANNEL_WHATSAPP = 2;
  OTP_CHANNEL_VOICE = 3;
  OTP_CHANNEL_EMAIL = 4;
}

// OTPProviderType enumerates the supported third-party OTP delivery providers.
// New providers should be added here as the platform integrates them.
enum OTPProviderType {
  OTP_PROVIDER_TYPE_UNSPECIFIED = 0;
  OTP_PROVIDER_TYPE_ENGAGELAB = 1;   // EngageLab (SMS, WhatsApp, Voice)
}

// OTPSendChannelStrategy defines the channel delivery order for an OTP provider.
// The system tries channels left-to-right; if the first channel fails, it falls back to the next.
enum OTPSendChannelStrategy {
  OTP_SEND_CHANNEL_STRATEGY_UNSPECIFIED = 0;
  OTP_SEND_CHANNEL_STRATEGY_SMS = 1;                   // SMS only
  OTP_SEND_CHANNEL_STRATEGY_WHATSAPP_SMS = 2;           // WhatsApp first, fallback to SMS
  OTP_SEND_CHANNEL_STRATEGY_WHATSAPP_SMS_VOICE = 3;     // WhatsApp → SMS → Voice
}

enum OTPTemplateType {
  OTP_TEMPLATE_TYPE_UNSPECIFIED = 0;
  OTP_TEMPLATE_TYPE_EMAIL_VERIFICATION = 1;
  OTP_TEMPLATE_TYPE_LOGIN_OTP = 2;
  OTP_TEMPLATE_TYPE_PASSWORD_RESET = 3;
  OTP_TEMPLATE_TYPE_WITHDRAWAL_CONFIRM = 4;
  OTP_TEMPLATE_TYPE_PHONE_VERIFICATION = 5;
}

// OTPTemplateReviewStatus represents the approval state of a template on the external provider.
//
// Some providers (e.g., EngageLab WhatsApp) require templates to be reviewed before use.
// SMS templates typically do not require review and will return LOCAL_ONLY.
//
// Lifecycle:
//   1. Template created locally → LOCAL_ONLY (can be used for SMS immediately)
//   2. Template submitted to provider for review → PENDING
//   3. Provider approves → APPROVED (can be used for WhatsApp)
//   4. Provider rejects → REJECTED (cannot be used; fix and resubmit on provider platform)
//
// Use SyncOTPTemplateStatus to pull the latest status from the provider.
enum OTPTemplateReviewStatus {
  OTP_TEMPLATE_REVIEW_STATUS_UNSPECIFIED = 0;  // Default zero value, should not appear in practice
  OTP_TEMPLATE_REVIEW_STATUS_LOCAL_ONLY = 1;   // Template exists only locally, no external review needed (e.g., SMS)
  OTP_TEMPLATE_REVIEW_STATUS_PENDING = 2;      // Submitted to provider, awaiting review (e.g., WhatsApp template)
  OTP_TEMPLATE_REVIEW_STATUS_APPROVED = 3;     // Approved by provider, ready for use
  OTP_TEMPLATE_REVIEW_STATUS_REJECTED = 4;     // Rejected by provider, cannot be used until fixed and resubmitted
}

// ============ SendOTP (inter-service) ============

message SendOTPRequest {
  string recipient = 1;                       // E.164 phone number or email
  string code = 2;                            // OTP code generated by caller
  OTPTemplateType template_type = 3;          // Business scenario
  int64 operator_id = 4;
  int64 company_operator_id = 5;
  int64 retailer_operator_id = 6;
  int64 user_id = 7;
  string country = 8;                         // ISO 3166-1 alpha-2
  string language = 9;                        // Template language (e.g., "en", "pt")
  string ip_address = 10;                     // For rate limiting
  map<string, string> extra_params = 11;      // Extra template parameters
  optional OTPChannel preferred_channel = 12; // Preferred delivery channel
}

message SendOTPResponse {
  string message_id = 1;
  string external_message_id = 2;
  string channel_used = 3;
  string provider_name = 4;
}

// ============ Provider CRUD ============

// OTPProviderInfo represents a third-party OTP delivery provider configuration.
//
// A Provider holds the API credentials and channel strategy for a third-party service
// (e.g., EngageLab). It is decoupled from country routing — use OTPProviderBinding to
// assign a provider to specific operator+country combinations.
//
// Key fields:
//   - owner_operator_id: The operator who created this provider. Only the owner and
//     their ancestors can modify or delete it.
//   - supported_countries: Restricts which countries this provider can be bound to.
//     Empty array means the provider supports all countries.
//   - has_credentials: Indicates whether credentials are configured. Actual credential
//     values are NEVER exposed in responses.
message OTPProviderInfo {
  int64 id = 1;
  // Deprecated: use operator_context. Kept during transition; equals operator_context.real_operator_id.
  int64 owner_operator_id = 2;
  // Third-party provider type (e.g., OTP_PROVIDER_TYPE_ENGAGELAB)
  OTPProviderType provider_type = 3;
  // Human-readable display name
  string name = 4;
  // Whether credentials are configured. Actual credentials are never returned.
  bool has_credentials = 5;
  // JSON string of non-sensitive config (e.g., base_url, timeout_seconds)
  string config = 6;
  // Channel delivery order (e.g., WhatsApp → SMS → Voice)
  OTPSendChannelStrategy send_channel_strategy = 7;
  // Countries this provider supports. Empty = all countries.
  // Used to validate when creating bindings — a binding's country must be in this list
  // (or the list must be empty). Does NOT affect routing directly.
  repeated string supported_countries = 8;
  int64 created_at = 9;
  int64 updated_at = 10;
  // Hierarchy that owns this provider (operator, company, retailer, system).
  // Used together with OperatorContextFilters for visibility control.
  common.OperatorContext operator_context = 11;
}

// CreateOTPProviderRequest registers an OTP delivery provider.
//
// ## What is an OTP Provider?
// A Provider is a connection to a third-party service (e.g., EngageLab) that can
// deliver OTP codes via SMS, WhatsApp, or Voice. Each record stores:
//   - The provider's API credentials (encrypted at rest, never returned in responses)
//   - Which delivery channels to use and in what order (send_channel_strategy)
//   - Which countries are supported (for binding validation)
//
// Credentials are configured once per provider. To assign the provider to specific
// operator+country combinations for routing, use CreateOTPProviderBinding.
//
// ## Errors
// - OTP_PROVIDER_ALREADY_EXISTS: duplicate provider
// - SEND_OTP_NO_PROVIDER: credentials_json is missing or invalid
message CreateOTPProviderRequest {
  // Deprecated: use operator_context. Kept for backward compatibility.
  int64 owner_operator_id = 1;
  // Third-party provider type: OTP_PROVIDER_TYPE_ENGAGELAB (SMS, WhatsApp, Voice)
  OTPProviderType provider_type = 2;
  // Human-readable display name
  string name = 3;
  // Plain JSON with provider-specific credentials. Encrypted (AES-256-GCM) before storage.
  // EngageLab example: {"dev_key":"xxx","dev_secret":"yyy"}
  string credentials_json = 4;
  // JSON string of non-sensitive config (base_url, timeouts). Optional.
  string config = 5;
  // Channel delivery order (e.g., OTP_SEND_CHANNEL_STRATEGY_WHATSAPP_SMS)
  OTPSendChannelStrategy send_channel_strategy = 6;
  // Countries this provider supports (e.g., ["BR", "JP"]). Empty = all countries.
  // When creating a binding, the binding's country must be in this list (or list is empty).
  repeated string supported_countries = 7;
  // Caller hierarchy. Required: drives ownership assignment on the new record.
  common.OperatorContext operator_context = 8;
}

message CreateOTPProviderResponse {
  OTPProviderInfo provider = 1;
}

// UpdateOTPProviderRequest partially updates an existing OTP provider.
// Only fields present in the request are updated; omitted fields remain unchanged.
//
// Common use cases:
//   - Rotate credentials: set credentials_json with new keys
//   - Change channel strategy: e.g., switch from WhatsApp-first to SMS-only
//   - Update supported countries: set supported_countries to new list
//   - Clear supported countries (support all): set clear_supported_countries=true
//
// ## Errors
// - OTP_PROVIDER_NOT_FOUND: no provider with the given ID
message UpdateOTPProviderRequest {
  int64 id = 1;
  // New display name (optional)
  optional string name = 2;
  // New credentials, will be re-encrypted before storage (optional)
  optional string credentials_json = 3;
  // New non-sensitive config JSON (optional)
  optional string config = 4;
  // New channel delivery strategy (optional)
  optional OTPSendChannelStrategy send_channel_strategy = 5;
  // New supported countries list. Ignored if empty and clear_supported_countries is false.
  repeated string supported_countries = 6;
  // Set to true to clear supported_countries (provider will support all countries).
  // Takes precedence over supported_countries field.
  optional bool clear_supported_countries = 7;
  // Visibility scope. If set, the update only affects a row whose owner tuple is in scope;
  // 0 rows affected means not-found-or-forbidden.
  common.OperatorContextFilters operator_context_filters = 8;
}

message UpdateOTPProviderResponse {}

// DeleteOTPProviderRequest permanently removes an OTP provider.
//
// WARNING: Deleting a provider that still has bindings or templates bound to it will cause
// those bindings to become orphaned — routing will skip them because the provider
// credentials are gone. Best practice: delete bindings and templates first, or use a
// different provider in their bindings.
//
// ## Errors
// - OTP_PROVIDER_NOT_FOUND: no provider with the given ID
message DeleteOTPProviderRequest {
  int64 id = 1;
  // Visibility scope. See UpdateOTPProviderRequest.operator_context_filters.
  common.OperatorContextFilters operator_context_filters = 2;
}

message DeleteOTPProviderResponse {}

// GetOTPProviderRequest retrieves a single OTP provider by ID.
// Returns all provider fields except credentials (has_credentials=true/false is returned instead).
//
// ## Errors
// - OTP_PROVIDER_NOT_FOUND: no provider with the given ID
message GetOTPProviderRequest {
  int64 id = 1;
  // Visibility scope. If set, returns NOT_FOUND when the row's owner tuple is out of scope.
  common.OperatorContextFilters operator_context_filters = 2;
}

message GetOTPProviderResponse {
  OTPProviderInfo provider = 1;
}

// ListOTPProvidersRequest lists OTP providers with optional filters and pagination.
// Results are scoped to the owner_operator_id.
message ListOTPProvidersRequest {
  // Deprecated: visibility is now driven by operator_context_filters. Kept during transition.
  int64 owner_operator_id = 1;
  // Filter by provider type (optional)
  optional OTPProviderType provider_type = 2;
  // Filter by supported country: returns providers whose supported_countries includes
  // this country OR whose supported_countries is empty (supports all). Optional.
  optional string country = 3;
  // Page number (1-based, default 1)
  int32 page = 4;
  // Items per page (default 20, max 100)
  int32 page_size = 5;
  // Visibility scope. Only rows whose owner tuple matches are returned.
  common.OperatorContextFilters operator_context_filters = 6;
}

message ListOTPProvidersResponse {
  repeated OTPProviderInfo providers = 1;
  int32 total = 2;
  int32 page = 3;
  int32 page_size = 4;
}

// ============ Provider Binding CRUD ============

// OTPProviderBindingInfo represents a binding between a provider and an operator+country.
//
// A Binding controls OTP routing: it maps a Provider to a specific (operator_id, country)
// combination with priority ordering and optional phone prefix filtering.
//
// Key concepts:
//   - One provider can be bound to multiple countries/operators (reuse credentials)
//   - Multiple bindings per (operator, country) are allowed — ordered by priority ASC
//   - phone_prefixes enables number-segment routing (e.g., +5511 → Provider A, +5531 → Provider B)
//   - Lower-level operators can override upper-level config by creating their own bindings
//     (operator-level bindings take precedence over company/retailer/system-level ones)
//
// ## Routing example (same country, multiple providers + phone prefix)
//   Binding 1: provider=100, country="BR", priority=0, phone_prefixes=["+5511","+5521"]
//   Binding 2: provider=200, country="BR", priority=1, phone_prefixes=[]
//   → +5511xxx → matches Binding 1 (prefix match, higher priority)
//   → +5531xxx → skips Binding 1 (prefix mismatch), matches Binding 2 (no prefix = catch-all)
//
// ## Override example (lower-level operator overrides upper-level)
//   System binding: operator_id=0, provider=100, country="BR"
//   Operator 5001 creates: operator_id=5001, provider=200, country="BR"
//   → Users of operator 5001 use provider 200 (operator-level checked first)
//   → Other operators fall through to system binding with provider 100
message OTPProviderBindingInfo {
  int64 id = 1;
  // Routing target: the operator level this binding applies to (can be 0 for "any operator"
  // at the owner level when the owner is system/retailer/company).
  // Historically named "operator_id"; renamed to avoid collision with the owner tuple.
  int64 target_operator_id = 2;
  // The provider this binding references
  int64 provider_id = 3;
  // ISO 3166-1 alpha-2 country code, or "global" for default fallback
  string country = 4;
  // Whether this binding is active for routing. Disabled bindings are skipped.
  bool enabled = 5;
  // Routing priority within same (target_operator_id, country). Lower value = higher priority.
  int32 priority = 6;
  // Phone number prefix filter. If set, this binding only matches phone numbers
  // starting with one of these prefixes. Empty = matches all phone numbers.
  repeated string phone_prefixes = 7;
  int64 created_at = 8;
  int64 updated_at = 9;
  // Inline provider info for convenience (populated by the server on read operations)
  OTPProviderInfo provider = 10;
  // Operator ID of the creator's level (0 = unknown/legacy)
  int64 created_by_operator_id = 11;
  // Operator name of the creator's level
  string created_by_operator_name = 12;
  // Operator type of the creator's level (system, retailer, company, operator)
  string created_by_operator_type = 13;
  // Hierarchy that owns this binding. Used together with OperatorContextFilters for visibility.
  common.OperatorContext operator_context = 14;
}

// CreateOTPProviderBindingRequest binds a provider to an operator+country for routing.
//
// ## Prerequisites
// - The provider (provider_id) must exist
// - The binding's country must be in the provider's supported_countries
//   (or supported_countries must be empty, meaning the provider supports all countries)
//
// ## Constraint
// UNIQUE(operator_id, provider_id, country): one binding per provider per operator+country.
// To change priority or phone_prefixes, use UpdateOTPProviderBinding.
//
// ## Errors
// - OTP_PROVIDER_NOT_FOUND: provider_id does not exist
// - OTP_PROVIDER_BINDING_ALREADY_EXISTS: duplicate (operator_id, provider_id, country)
// - OTP_PROVIDER_BINDING_INVALID_COUNTRY: country not in provider's supported_countries
message CreateOTPProviderBindingRequest {
  // Routing target (historically "operator_id"). The operator this binding applies to.
  int64 target_operator_id = 1;
  // Provider to bind (must exist)
  int64 provider_id = 2;
  // ISO 3166-1 alpha-2 (e.g., "BR"), or "global" for default fallback
  string country = 3;
  // Whether this binding is active for routing
  bool enabled = 4;
  // Routing priority within same (target_operator_id, country). Lower = higher priority.
  int32 priority = 5;
  // Phone number prefix filter. e.g., ["+5511", "+5521"]. Empty = matches all numbers.
  repeated string phone_prefixes = 6;
  // Operator ID of the creator's level
  int64 created_by_operator_id = 7;
  // Operator name of the creator's level
  string created_by_operator_name = 8;
  // Operator type of the creator's level (system, retailer, company, operator)
  string created_by_operator_type = 9;
  // Caller hierarchy. Required: drives ownership assignment on the new record.
  common.OperatorContext operator_context = 10;
}

message CreateOTPProviderBindingResponse {
  OTPProviderBindingInfo binding = 1;
}

// UpdateOTPProviderBindingRequest partially updates an existing provider binding.
// Only fields present in the request are updated; omitted fields remain unchanged.
//
// Common use cases:
//   - Temporarily disable a binding: set enabled=false (routing will skip it)
//   - Change routing priority: set priority to new value
//   - Add phone prefix filter: set phone_prefixes to desired prefixes
//   - Remove phone prefix filter (match all): set clear_phone_prefixes=true
//
// ## Errors
// - OTP_PROVIDER_BINDING_NOT_FOUND: no binding with the given ID
message UpdateOTPProviderBindingRequest {
  // Binding ID to update
  int64 id = 1;
  // Enable/disable for routing (optional)
  optional bool enabled = 2;
  // New routing priority (optional)
  optional int32 priority = 3;
  // New phone prefix filter. Ignored if empty and clear_phone_prefixes is false.
  repeated string phone_prefixes = 4;
  // Set to true to clear phone_prefixes (match all numbers).
  // Takes precedence over phone_prefixes field.
  optional bool clear_phone_prefixes = 5;
  // Visibility scope. Only rows whose owner tuple matches may be updated.
  common.OperatorContextFilters operator_context_filters = 6;
}

message UpdateOTPProviderBindingResponse {}

// DeleteOTPProviderBindingRequest permanently removes a provider binding.
//
// After deletion, routing will no longer consider this binding. If it was the only
// binding for an operator+country, the system falls back to the next level in the
// routing chain (e.g., company → retailer → system → "global").
//
// ## Errors
// - OTP_PROVIDER_BINDING_NOT_FOUND: no binding with the given ID
message DeleteOTPProviderBindingRequest {
  int64 id = 1;
  // Visibility scope. Only rows whose owner tuple matches may be deleted.
  common.OperatorContextFilters operator_context_filters = 2;
}

message DeleteOTPProviderBindingResponse {}

// ListOTPProviderBindingsRequest lists provider bindings with optional filters and pagination.
// Results are scoped to the operator_id.
message ListOTPProviderBindingsRequest {
  // Filter by routing target operator ID (optional; 0 means no target filter).
  // Historically named "operator_id".
  int64 target_operator_id = 1;
  // Filter by country code (e.g., "BR") or "global" (optional)
  optional string country = 2;
  // Filter by associated provider ID (optional)
  optional int64 provider_id = 3;
  // Filter by enabled status (optional)
  optional bool enabled = 4;
  // Page number (1-based, default 1)
  int32 page = 5;
  // Items per page (default 20, max 100)
  int32 page_size = 6;
  // Visibility scope. Only rows whose owner tuple matches are returned.
  common.OperatorContextFilters operator_context_filters = 7;
}

message ListOTPProviderBindingsResponse {
  repeated OTPProviderBindingInfo bindings = 1;
  int32 total = 2;
  int32 page = 3;
  int32 page_size = 4;
}

// ListOTPBindingCountriesRequest returns the distinct countries configured
// for an operator via provider bindings.
message ListOTPBindingCountriesRequest {
  // Routing target operator ID (historically "operator_id").
  int64 target_operator_id = 1;
  // If set, only count bindings with this enabled status
  optional bool enabled = 2;
  // Visibility scope. Only rows whose owner tuple matches contribute to the result.
  common.OperatorContextFilters operator_context_filters = 3;
}

message ListOTPBindingCountriesResponse {
  // Distinct country codes (e.g., ["BR", "JP", "global"])
  repeated string countries = 1;
  // Number of distinct countries
  int32 total = 2;
}

// CheckOTPBindingCountryRequest checks whether an operator has at least one
// enabled provider binding for a specific country.
message CheckOTPBindingCountryRequest {
  // Routing target operator ID (historically "operator_id").
  int64 target_operator_id = 1;
  string country = 2;
  // Visibility scope. Only rows whose owner tuple matches are considered.
  common.OperatorContextFilters operator_context_filters = 3;
}

message CheckOTPBindingCountryResponse {
  // true if at least one enabled binding exists for this operator+country
  bool configured = 1;
}

// ============ Template CRUD ============

// OTPTemplateInfo represents an OTP message template configuration.
//
// A Template defines the message content sent to the end-user. It is bound to a
// specific OTP Provider and scoped to a business scenario (template_type).
// Templates are resolved per (operator, country, template_type, language) with
// fallback to "global" country and "en" language.
message OTPTemplateInfo {
  int64 id = 1;
  // Owner operator ID (single-column, legacy). Equals operator_context.real_operator_id.
  int64 operator_id = 2;
  // ISO 3166-1 alpha-2 country code, or "global"
  string country = 3;
  // Provider this template belongs to
  int64 provider_id = 4;
  // Human-readable display name
  string name = 5;
  // Business scenario this template serves
  OTPTemplateType template_type = 6;
  // Template ID from the third-party provider's platform (e.g., EngageLab template ID)
  string external_template_id = 7;
  // BCP-47 language code (e.g., "en", "pt")
  string language = 8;
  // Brand name injected into OTP messages as template variable
  string brand_name = 9;
  // OTP code length, informational only (actual code generated by caller)
  int32 code_length = 10;
  // OTP code TTL in seconds, informational only (actual TTL enforced by caller)
  int32 code_ttl_seconds = 11;
  // JSON string of additional template variables passed to the provider
  string extra_params = 12;
  // Review status from external provider (relevant for WhatsApp templates)
  OTPTemplateReviewStatus review_status = 13;
  // Whether this template is active for routing
  bool enabled = 14;
  int64 created_at = 15;
  int64 updated_at = 16;
  // Hierarchy that owns this template. Used with OperatorContextFilters for visibility.
  common.OperatorContext operator_context = 17;
}

// CreateOTPTemplateRequest creates a message template bound to a specific OTP provider.
//
// ## What is external_template_id?
// This is the template ID assigned by the third-party provider (e.g., EngageLab).
// You must first create the template on the provider's platform, then copy the ID here.
//
// ### How to get it (EngageLab):
//   1. Log in to EngageLab console → OTP → Template Management
//   2. Create a new template (choose SMS or WhatsApp channel)
//   3. After creation (and approval for WhatsApp), copy the template ID
//   4. Use that ID as external_template_id when calling this API
//
// ## Template Variables by Provider
//
// ### EngageLab (OTP_PROVIDER_TYPE_ENGAGELAB)
//
// Supported channels: SMS, WhatsApp, Voice.
//
// | Variable    | Source          | Description |
// |-------------|-----------------|-------------|
// | code        | auto            | OTP code, auto-injected by EngageLab |
// | brand_name  | brand_name field| Brand name displayed in the message |
// | custom keys | extra_params    | Any additional key-value pairs |
//
// ## Constraint
// UNIQUE(operator_id, country, template_type, language): one template per scenario per language.
//
// ## Errors
// - OTP_TEMPLATE_ALREADY_EXISTS: duplicate (operator_id, country, template_type, language)
message CreateOTPTemplateRequest {
  // Deprecated: use operator_context. Kept for backward compatibility;
  // ignored when operator_context is set.
  int64 operator_id = 1;
  // ISO 3166-1 alpha-2 (e.g., "BR"), or "global" for default fallback
  string country = 2;
  // ID of the OTP provider this template belongs to
  int64 provider_id = 3;
  // Human-readable display name (e.g., "Brazil Login OTP - Portuguese")
  string name = 4;
  // Business scenario: EMAIL_VERIFICATION, LOGIN_OTP, PASSWORD_RESET, WITHDRAWAL_CONFIRM
  OTPTemplateType template_type = 5;
  // Template ID from the provider's platform
  string external_template_id = 6;
  // BCP-47 language code (e.g., "en", "pt", "zh")
  string language = 7;
  // Brand name injected into OTP messages (e.g., "BetBrazil")
  string brand_name = 8;
  // OTP code length, informational only (default 6)
  int32 code_length = 9;
  // OTP code TTL in seconds, informational only (default 900)
  int32 code_ttl_seconds = 10;
  // JSON string of additional template variables (e.g., '{"app_name":"Meepo"}')
  string extra_params = 11;
  // Whether this template is active for routing
  bool enabled = 12;
  // Caller hierarchy. Required: drives ownership assignment on the new record.
  common.OperatorContext operator_context = 13;
}

message CreateOTPTemplateResponse {
  OTPTemplateInfo template = 1;
}

// UpdateOTPTemplateRequest partially updates an existing OTP template.
// Only fields present in the request are updated; omitted fields remain unchanged.
//
// Common use cases:
//   - Switch to a new external template: set external_template_id
//   - Update the brand name displayed in OTP messages: set brand_name
//   - Disable a template temporarily: set enabled=false (routing will skip it)
//
// ## Errors
// - OTP_TEMPLATE_NOT_FOUND: no template with the given ID
message UpdateOTPTemplateRequest {
  int64 id = 1;
  optional string name = 2;
  optional string external_template_id = 3;
  optional string language = 4;
  optional string brand_name = 5;
  optional int32 code_length = 6;
  optional int32 code_ttl_seconds = 7;
  optional string extra_params = 8;
  optional bool enabled = 9;
  // Visibility scope. Only rows whose owner tuple matches may be updated.
  common.OperatorContextFilters operator_context_filters = 10;
}

message UpdateOTPTemplateResponse {}

// DeleteOTPTemplateRequest permanently removes an OTP template.
//
// If the deleted template was the only match for a given (operator, country, type, language),
// the system will fall back to the next level in the routing chain.
// If no template matches at all, SendOTP will return an OTP_TEMPLATE_NOT_FOUND error.
//
// ## Errors
// - OTP_TEMPLATE_NOT_FOUND: no template with the given ID
message DeleteOTPTemplateRequest {
  int64 id = 1;
  // Visibility scope. Only rows whose owner tuple matches may be deleted.
  common.OperatorContextFilters operator_context_filters = 2;
}

message DeleteOTPTemplateResponse {}

// GetOTPTemplateRequest retrieves a single OTP template by ID.
// Returns all template fields including review_status.
//
// ## Errors
// - OTP_TEMPLATE_NOT_FOUND: no template with the given ID
message GetOTPTemplateRequest {
  int64 id = 1;
  // Visibility scope. If set, returns NOT_FOUND when the row's owner tuple is out of scope.
  common.OperatorContextFilters operator_context_filters = 2;
}

message GetOTPTemplateResponse {
  OTPTemplateInfo template = 1;
}

// ListOTPTemplatesRequest lists OTP templates with optional filters and pagination.
message ListOTPTemplatesRequest {
  // Deprecated: visibility is now driven by operator_context_filters. Kept during transition.
  int64 operator_id = 1;
  // Filter by country code (e.g., "BR") or "global" (optional)
  optional string country = 2;
  // Filter by associated provider ID (optional)
  optional int64 provider_id = 3;
  // Filter by business scenario (optional)
  optional OTPTemplateType template_type = 4;
  // Filter by enabled status (optional)
  optional bool enabled = 5;
  // Page number (1-based, default 1)
  int32 page = 6;
  // Items per page (default 20, max 100)
  int32 page_size = 7;
  // Visibility scope. Only rows whose owner tuple matches are returned.
  common.OperatorContextFilters operator_context_filters = 8;
}

message ListOTPTemplatesResponse {
  repeated OTPTemplateInfo templates = 1;
  int32 total = 2;
  int32 page = 3;
  int32 page_size = 4;
}

// SyncOTPTemplateStatusRequest requests a review status sync from the external provider.
//
// Some providers (e.g., EngageLab WhatsApp) require templates to be reviewed and approved
// before they can be used. This RPC calls the provider's API to check the current status
// and updates the local record's review_status field.
//
// ## When to call?
// After creating a new WhatsApp template on the provider's platform, call this periodically
// until the status changes to APPROVED. SMS templates typically don't require review.
//
// ## Errors
// - OTP_TEMPLATE_NOT_FOUND: no template with the given ID
// - SEND_OTP_FAILED: failed to query the provider's API
message SyncOTPTemplateStatusRequest {
  int64 id = 1;  // Template ID to sync status for
}

// SyncOTPTemplateStatusResponse returns the updated review status after syncing with the provider.
message SyncOTPTemplateStatusResponse {
  OTPTemplateReviewStatus review_status = 1;
}

// ============ Send Logs ============

// OTPSendLogInfo represents a single OTP delivery attempt record.
// Logs are immutable (append-only) and used for auditing, debugging, and statistics.
message OTPSendLogInfo {
  int64 id = 1;
  int64 operator_id = 2;
  int64 company_operator_id = 3;
  int64 retailer_operator_id = 4;
  int64 provider_id = 5;
  int64 template_id = 6;
  string recipient_masked = 7;   // Masked: "+1***5678", "t***@example.com"
  string channel_used = 8;       // "sms", "whatsapp", "voice", "email"
  string external_message_id = 9;
  string status = 10;            // "sent" or "failed"
  string error_message = 11;
  int64 user_id = 12;
  string ip_address = 13;
  int64 created_at = 14;
}

// ListOTPSendLogsRequest queries OTP delivery history with filters and pagination.
//
// ## Use cases
//   - Debug a user's OTP delivery failure: filter by user_id + status="failed"
//   - Audit all WhatsApp OTPs in the last 24h: filter by channel_used + time range
//   - Monitor delivery success rate: aggregate by status over a time range
message ListOTPSendLogsRequest {
  int64 operator_id = 1;
  // Filter by end-user ID (optional)
  optional int64 user_id = 2;
  // Filter by delivery channel: "sms", "whatsapp", "voice", "email" (optional)
  optional string channel_used = 3;
  // Filter by delivery status: "sent", "failed" (optional)
  optional string status = 4;
  // Start of time range (Unix milliseconds, inclusive)
  int64 start_time = 5;
  // End of time range (Unix milliseconds, inclusive)
  int64 end_time = 6;
  // Page number (1-based, default 1)
  int32 page = 7;
  // Items per page (default 20, max 100)
  int32 page_size = 8;
}

message ListOTPSendLogsResponse {
  repeated OTPSendLogInfo logs = 1;
  int32 total = 2;
  int32 page = 3;
  int32 page_size = 4;
}

// ============ SMS Channel Rate CRUD ============

// SMSChannelRate represents the per-message cost for a specific provider+country+channel combination.
// Used to track and calculate SMS/WhatsApp/Voice delivery costs.
message SMSChannelRate {
  int64 id = 1;
  int64 provider_id = 2;
  string provider_name = 3;       // Read-only, populated from join
  string country = 4;             // ISO 2-letter code or "global" as fallback
  string channel = 5;             // "sms", "whatsapp", "voice"
  string unit_price = 6;          // Decimal string (e.g., "0.05")
  string currency = 7;
  bool enabled = 8;
  int64 created_at = 9;
  int64 updated_at = 10;
}

message CreateSMSChannelRateRequest {
  int64 provider_id = 1;
  string country = 2;
  string channel = 3;
  string unit_price = 4;
  string currency = 5;
}

message CreateSMSChannelRateResponse {
  SMSChannelRate rate = 1;
}

message UpdateSMSChannelRateRequest {
  int64 id = 1;
  optional string unit_price = 2;
  optional string currency = 3;
  optional bool enabled = 4;
}

message UpdateSMSChannelRateResponse {
  SMSChannelRate rate = 1;
}

message DeleteSMSChannelRateRequest {
  int64 id = 1;
}

message DeleteSMSChannelRateResponse {}

message ListSMSChannelRatesRequest {
  optional int64 provider_id = 1;
  optional string country = 2;
  optional string channel = 3;
  int32 page = 4;
  int32 page_size = 5;
}

message ListSMSChannelRatesResponse {
  repeated SMSChannelRate rates = 1;
  int32 total = 2;
}

message BatchCreateSMSChannelRatesRequest {
  repeated CreateSMSChannelRateRequest rates = 1;
}

message BatchCreateSMSChannelRatesResponse {
  repeated SMSChannelRate rates = 1;
}
