syntax = "proto3";

package api.push.service.v1;

import "google/api/annotations.proto";

option go_package = "github.com/infigaming-com/meepo-api/push/service/v1;v1";
option java_multiple_files = true;
option java_package = "api.push.service.v1";

service Push {
	rpc SendEmail(SendEmailRequest) returns (SendEmailResponse) {}

	// Get notification statistics for specified operators within a time range
	// Returns notification counts grouped by operator ID
	rpc GetNotificationStats(GetNotificationStatsRequest) returns (GetNotificationStatsResponse) {}

	// Get third-party fee statistics (EMAIL + SMS/WhatsApp/Voice) for billing
	rpc GetThirdPartyFeeStats(GetThirdPartyFeeStatsRequest) returns (GetThirdPartyFeeStatsResponse) {}

	// BetTicker Config APIs
	rpc UpdateBetTickerConfig(UpdateBetTickerConfigRequest) returns (UpdateBetTickerConfigResponse) {}
	rpc ListBetTickerConfig(ListBetTickerConfigRequest) returns (ListBetTickerConfigResponse) {}

	// Web Push APIs
	// SendWebPush is gRPC-only (called internally by other services).
	rpc SendWebPush(SendWebPushRequest) returns (SendWebPushResponse) {}

	// GetWebPushConfig returns the Firebase JS SDK configuration for the current
	// environment. The frontend calls this once on init and caches it in
	// sessionStorage so the Service Worker never needs hardcoded credentials.
	rpc GetWebPushConfig(GetWebPushConfigRequest) returns (GetWebPushConfigResponse) {
		option (google.api.http) = {
			post: "/v1/push/web-push/config"
			body: "*"
		};
	}

	rpc RegisterWebPushDevice(RegisterWebPushDeviceRequest) returns (RegisterWebPushDeviceResponse) {
		option (google.api.http) = {
			post: "/v1/push/web-push/device/register"
			body: "*"
		};
	}

	rpc UnregisterWebPushDevice(UnregisterWebPushDeviceRequest) returns (UnregisterWebPushDeviceResponse) {
		option (google.api.http) = {
			post: "/v1/push/web-push/device/unregister"
			body: "*"
		};
	}
}

message EmailAttachment {
	string name = 1;
	string contentType = 2;
	string data = 3; // Base64 encoded attachment data
}

message SendEmailRequest {
	string from = 1;
	repeated string to = 2;
	string subject = 3;
	string text = 4;
	string html = 5;
	repeated EmailAttachment attachments = 6;
	int64 operatorId = 7;
	int64 companyOperatorId = 8;
	int64 retailerOperatorId = 9;
	int64 userId = 10;
	optional bool use_system_default = 11; // default true, if false use operator binding
}

message SendEmailResponse {
	int64 messageId = 1;
}

// Time range filter for notifications
// startTime: inclusive (>=), endTime: exclusive (<)
message TimeRange {
	int64 startTime = 1;
	int64 endTime = 2;
}


// Filter by time range and optionally by operator IDs
// At most one of operatorIds, companyOperatorIds, or retailerOperatorIds should be provided
// If all three parameters are empty, returns statistics for all operators
message GetNotificationStatsRequest {
	TimeRange timeRange = 1;
	repeated int64 operatorIds = 2;
	repeated int64 companyOperatorIds = 3;
	repeated int64 retailerOperatorIds = 4;
}

// Response containing notification statistics grouped by operator
message GetNotificationStatsResponse {
	// Statistics for a single operator
	message OperatorNotificationStats {
		int64 operatorId = 1;
		int64 companyOperatorId = 2;
		int64 retailerOperatorId = 3;
		int32 count = 4; // Number of notifications for this operator
	}
	repeated OperatorNotificationStats operatorStats = 1;
}

// ============== Third Party Fee Stats ==============

message GetThirdPartyFeeStatsRequest {
	TimeRange timeRange = 1;
	repeated int64 operatorIds = 2;
	repeated int64 companyOperatorIds = 3;
	repeated int64 retailerOperatorIds = 4;
}

message GetThirdPartyFeeStatsResponse {
	message FeeStatItem {
		int64 operatorId = 1;
		int64 companyOperatorId = 2;
		int64 retailerOperatorId = 3;
		string serviceType = 4;       // "EMAIL", "OTP_SMS", "OTP_WHATSAPP", "OTP_VOICE"
		string providerName = 5;      // Provider name (for SMS types, empty for EMAIL)
		string country = 6;           // Country code (for SMS types, empty for EMAIL)
		int64 quantity = 7;           // Number of messages sent
		string totalAmount = 8;       // Total cost (decimal string, pre-calculated)
		string currency = 9;
	}
	repeated FeeStatItem items = 1;
}

// ============== BetTicker Config Messages ==============

message BettingFilterConfig {
	repeated string bet_category = 1;
	float mini_odds = 2;
	repeated string currencies = 3;
	bool enable = 4;
	optional bool masking_enabled = 5;
	optional string masking_rule = 6;
}

message UpdateBetTickerConfigRequest {
	message Item {
		string country = 1;
		optional BettingFilterConfig all_bet = 2;
		optional BettingFilterConfig high_wins = 3;
	}
	repeated Item list = 1;
	// enable is optional. Server-side semantics:
	//   - omitted: preserve the existing value for the (operator, country)
	//     row, or default to true when no such row exists yet.
	//   - explicit true/false: written to the DB as-is.
	// This avoids the proto3 zero-value silently disabling the ticker when a
	// caller only wants to update other fields (e.g. global_ticker_enabled).
	optional bool enable = 2;
	int64 operator_id = 3;
	optional bool global_ticker_enabled = 4;
}

message UpdateBetTickerConfigResponse {}

message ListBetTickerConfigRequest {
	int64 operator_id = 1;
}

message ListBetTickerConfigResponse {
	message Item {
		string country = 1;
		BettingFilterConfig all_bet = 2;
		BettingFilterConfig high_wins = 3;
	}
	repeated Item list = 1;
	bool enable = 2;
	bool global_ticker_enabled = 3;
}

// ============== Web Push Messages ==============

// GetWebPushConfig — returns the Firebase JS SDK config for the running
// environment. The VAPID key (public half only) is also included so the
// frontend can call getToken() without a separate round-trip.
message GetWebPushConfigRequest {}

message GetWebPushConfigResponse {
	string api_key              = 1;
	string auth_domain          = 2;
	string project_id           = 3;
	string storage_bucket       = 4;
	string messaging_sender_id  = 5;
	string app_id               = 6;
	string vapid_key            = 7;
}

message SendWebPushRequest {
	string title = 1;
	string body = 2;
	string url = 3;                         // click-through URL
	string icon = 4;
	string image = 5;
	map<string, string> data = 6;           // custom key-value payload
	int64 user_id = 7;                      // target user
	int64 operator_id = 8;
	int64 company_operator_id = 9;
	int64 retailer_operator_id = 10;
	repeated string fcm_tokens = 11;        // optional: direct token targeting (bypass user_id lookup)
	string topic = 12;                      // optional: FCM topic targeting
}

message SendWebPushResponse {
	int64 message_id = 1;                   // internal notification ID
	int32 success_count = 2;
	int32 failure_count = 3;
}

message RegisterWebPushDeviceRequest {
	int64 user_id = 1;
	int64 operator_id = 2;
	string fcm_token = 3;
	string platform = 4;                    // "chrome", "firefox", "safari", "edge"
}

message RegisterWebPushDeviceResponse {
	int64 device_id = 1;
}

message UnregisterWebPushDeviceRequest {
	string fcm_token = 1;
}

message UnregisterWebPushDeviceResponse {}