syntax = "proto3";

package api.user.service.v1;

import "common/common.proto";

option go_package = "github.com/infigaming-com/meepo-api/user/service/v1;v1";
option java_multiple_files = true;
option java_package = "api.user.service.v1";

// User service provides authentication and user management functionality.
service UserEvent {
	rpc Event (EventRequest) returns (EventResponse) {}	
}

message EventRequest {
	string subscription_id = 1;
	bytes event_data = 2;
	string message_id = 3;
}

message EventResponse {}

// AddUserEvent is emitted when a player user is created.
message AddUserEvent {
	int64 user_id = 1;
	int64 operator_id = 2;
	int64 company_operator_id = 3;
	int64 retailer_operator_id = 4;
	int64 system_operator_id = 5;
	string username = 6;
	string email = 7;
	string mobile = 8;
	int64 role_id = 9;
	optional string registration_url = 10; // combined both campaign url and referral code
	string country = 11;
	int64 registered_at = 12;
	string default_currency = 13; // passed from frontend, related to country
}

// AddOperatorEvent is emitted when a operator is created.
message AddOperatorEvent {
	int64 real_operator_id = 1;
	int64 operator_id = 2;
	int64 company_operator_id = 3;
	int64 retailer_operator_id = 4;
	int64 system_operator_id = 5;
	string operator_type = 6;
	string operator_name = 7;
	string reporting_currency = 8;
	repeated string supporting_currencies = 9;
}

// UserStatusUpdateEvent is emitted when user status fields are updated.
// Fields: login_banned, withdraw_banned, game_banned, locked, kyc_level
message UserStatusUpdateEvent {
	int64 user_id = 1;
	api.common.OperatorContext operator_context = 2;
	string field = 3;  // field name that was updated
	string old_value = 4;
	string new_value = 5;
	int64 updated_at = 6;
}

// UserFieldChange carries one before/after of a single user profile field,
// grouped inside UserProfileUpdateEvent.
message UserFieldChange {
	// Canonical field name agreed between publisher and subscribers.
	// Currently published: "email", "mobile".
	string field = 1;
	string old_value = 2;
	string new_value = 3;
}

// UserProfileUpdateEvent is emitted when one or more of a user's profile
// fields (email, mobile, and future additions like firstname, address, dob)
// change in a single user-service transaction.
//
// The `changes` list batches every field that was updated in that transaction,
// so subscribers observe them atomically — a partial publish is impossible
// (either the entire batch lands or none does). Extensible: new fields just
// add new entries to the list without any proto change.
//
// Field domains are disjoint from UserStatusUpdateEvent (login_banned,
// withdraw_banned, game_banned, locked, kyc_level), so subscribers only need
// to handle the events they care about without worrying about overlap.
//
// Not emitted on registration (AddUserEvent is the seed). Subscribers must
// use updated_at for last-write-wins to defend against out-of-order or
// duplicate delivery.
message UserProfileUpdateEvent {
	int64 user_id = 1;
	api.common.OperatorContext operator_context = 2;
	repeated UserFieldChange changes = 3;
	int64 updated_at = 4;
}

// UserIdentitySubmitEvent is emitted when a user submits identity documents for KYC Level 3 verification.
message UserIdentitySubmitEvent {
	int64 user_id = 1;
	int64 operator_id = 2;
	int64 company_operator_id = 3;
	int64 retailer_operator_id = 4;
	int64 system_operator_id = 5;
	string operator_name = 6;
	string id_type = 7;         // e.g. "passport", "south_african_id"
	string id_number = 8;
	int64 created_at = 9;
}
