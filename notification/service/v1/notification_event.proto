syntax = "proto3";

package api.notification.service.v1;

option go_package = "github.com/infigaming-com/meepo-api/notification/service/v1;v1";
option java_multiple_files = true;
option java_package = "api.notification.service.v1";

import "common/common.proto";

// BusinessAlertEvent is the single payload type for the Meepo
// business-notification pipeline. Business services publish this event
// to topic "notifications.business_alert"; meepo-push-service is the
// sole subscriber and handles dedup, template rendering, sending,
// retry, dead-letter, and audit.
//
// See meepo-api/pkg/notification/README.md for the contract,
// forbidden patterns, and the 3-PR process for adding a new template.
message BusinessAlertEvent {
	// template is a constant from meepo-api/pkg/notification (e.g.
	// notification.TemplateSubAccountBalanceAlert). Do not inline the
	// literal — the constant is the single source of truth that pairs
	// with push-service's internal template registry.
	string template = 1;
	// params provides single-curly placeholder values for the template
	// files. Every placeholder declared by the template MUST be present;
	// missing keys are passed through verbatim and surface in the
	// rendered email (push-service logs a warning).
	map<string, string> params = 2;

	// to is the recipient list. The business side resolves recipients
	// itself in v1 — there is no resolver abstraction in this proto.
	repeated string to = 3;

	// from is an optional sender override. Empty means push-service
	// chooses based on use_system_default + operator_context binding.
	string from = 4;
	// operator_context is used by push-service for sender-binding
	// selection and audit. Mirrors push.SendEmailRequest's
	// operator_id / company_operator_id / retailer_operator_id /
	// system_operator_id / real_operator_id fields.
	api.common.OperatorContext operator_context = 5;
	// user_id is independent from operator_context's identifiers and
	// is used for per-user audit / binding. 0 when not applicable.
	int64 user_id = 6;
	// use_system_default mirrors push.SendEmailRequest.use_system_default.
	// When unset, push-service treats it as true.
	optional bool use_system_default = 7;

	// dedup_key is the business identity of "one alert occurrence".
	// Include every dimension that should fire independently (operator,
	// product, currency, ...); exclude time and changing values
	// (balance, amount, percentage) which would defeat dedup. Empty
	// dedup_key OR UNSPECIFIED dedup_window means no dedup.
	string dedup_key = 8;
	// dedup_window selects how long the key stays claimed.
	// push-service uses claim-on-attempt semantics (SET NX EX before
	// sending), so one send attempt per window per key.
	DedupWindow dedup_window = 9;
}

enum DedupWindow {
	DEDUP_WINDOW_UNSPECIFIED = 0;
	DEDUP_WINDOW_FIVE_MINUTES = 1;
	DEDUP_WINDOW_ONE_HOUR = 2;
	// Resets at next 00:00 UTC. Matches operator-service's existing
	// daily alert behavior pre-migration.
	DEDUP_WINDOW_UNTIL_UTC_MIDNIGHT = 3;
	DEDUP_WINDOW_SLIDING_24H = 4;
}
