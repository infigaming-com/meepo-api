    - name: BackofficeNotification
      description: |-
        Notification channel and rule management service for backoffice.
         Provides CRUD APIs for managing notification channels (Telegram, Slack) and
         configuring notification rules that determine when and how alerts are sent
         (e.g., large deposits, withdrawals, bets, wins).

         ## Concepts

         - **Channel**: A configured delivery endpoint (Telegram bot or Slack webhook) that receives notifications.
         - **Rule**: A condition attached to a channel that defines which message types trigger a notification
           and optional currency/amount thresholds.
         - **Message Type**: The event category (withdraw, deposit, large deposit, large bet, large win).

         ## Enums

         **ChannelType**:
         | Value | Name |
         |-------|------|
         | 0 | CHANNEL_TYPE_UNSPECIFIED |
         | 1 | CHANNEL_TYPE_TELEGRAM |
         | 2 | CHANNEL_TYPE_SLACK |

         **MessageType**:
         | Value | Name | Description |
         |-------|------|-------------|
         | 0 | MESSAGE_TYPE_UNSPECIFIED | |
         | 1 | MESSAGE_TYPE_WITHDRAW_NOTIFICATION | Withdrawal event |
         | 2 | MESSAGE_TYPE_DEPOSIT_NOTIFICATION | Deposit event |
         | 3 | MESSAGE_TYPE_LARGE_DEPOSIT | Deposit exceeding threshold |
         | 4 | MESSAGE_TYPE_LARGE_BET | Bet exceeding threshold |
         | 5 | MESSAGE_TYPE_LARGE_WIN | Win exceeding threshold |

         **RuleType**:
         | Value | Name | Description |
         |-------|------|-------------|
         | 0 | RULE_TYPE_UNSPECIFIED | |
         | 1 | RULE_TYPE_GENERIC | Simple on/off rule, no amount filter |
         | 2 | RULE_TYPE_CURRENCY_THRESHOLD | Rule with per-currency amount thresholds |
