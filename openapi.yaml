    /v1/backoffice/notification/channel/create:
        post:
            tags:
                - BackofficeNotification
            description: |-
                Create a new notification channel.

                 Creates a Telegram or Slack channel that can receive notification messages.
                 After creation, use SaveChannelRules to attach notification rules to this channel.

                 ## Request body

                 | Field | Type | Required | Description |
                 |-------|------|----------|-------------|
                 | target_operator_context | OperatorContext | No | Target operator. Defaults to logged-in operator |
                 | name | string | Yes | Display name for the channel |
                 | channel_type | ChannelType | Yes | `CHANNEL_TYPE_TELEGRAM` (1) or `CHANNEL_TYPE_SLACK` (2) |
                 | config | ChannelConfig | Yes | Channel-specific configuration (see below) |
                 | enabled | bool | No | Whether the channel is active. Default: false |

                 ### ChannelConfig

                 Provide **one of** the following based on `channel_type`:

                 **Telegram** (`config.telegram`):
                 | Field | Type | Description |
                 |-------|------|-------------|
                 | bot_token | string | Telegram Bot API token |
                 | chat_id | string | Target chat/group ID |

                 **Slack** (`config.slack`):
                 | Field | Type | Description |
                 |-------|------|-------------|
                 | webhook_url | string | Slack incoming webhook URL |

                 ## Response

                 | Field | Type | Description |
                 |-------|------|-------------|
                 | channel | NotificationChannel | The created channel with generated `id` and timestamps |

                 ## Example

                 ```json
                 // Request
                 {
                   "name": "Risk Alerts - Telegram",
                   "channel_type": 1,
                   "config": {
                     "telegram": {
                       "bot_token": "123456:ABC-DEF...",
                       "chat_id": "-1001234567890"
                     }
                   },
                   "enabled": true
                 }

                 // Response
                 {
                   "channel": {
                     "id": 42,
                     "name": "Risk Alerts - Telegram",
                     "channel_type": 1,
                     "config": {
                       "telegram": {
                         "bot_token_masked": "123***DEF...",
                         "chat_id": "-1001234567890"
                       }
                     },
                     "enabled": true,
                     "created_at": 1710000000,
                     "updated_at": 1710000000,
                     "is_inherited": false
                   }
                 }
                 ```
            operationId: BackofficeNotification_CreateNotificationChannel
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/api.push.service.v1.CreateNotificationChannelRequest'
                required: true
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/api.push.service.v1.CreateNotificationChannelResponse'
    /v1/backoffice/notification/channel/delete:
        post:
            tags:
                - BackofficeNotification
            description: |-
                Delete a notification channel and all its associated rules.

                 ## Request body

                 | Field | Type | Required | Description |
                 |-------|------|----------|-------------|
                 | target_operator_context | OperatorContext | No | Target operator. Defaults to logged-in operator |
                 | channel_id | int64 | Yes | Channel ID to delete |

                 ## Response

                 Empty on success.
            operationId: BackofficeNotification_DeleteNotificationChannel
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/api.push.service.v1.DeleteNotificationChannelRequest'
                required: true
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/api.push.service.v1.DeleteNotificationChannelResponse'
