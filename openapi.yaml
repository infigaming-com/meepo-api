            type: object
            properties:
                targetOperatorContext:
                    allOf:
                        - $ref: '#/components/schemas/api.common.OperatorContext'
                    description: Target operator context for permission check.
                id:
                    type: string
                    description: Execution ID
            description: Get a single execution record by ID.
        api.backoffice.service.v1.GetCrmCampaignExecutionStepsRequest:
            type: object
            properties:
                targetOperatorContext:
                    allOf:
                        - $ref: '#/components/schemas/api.common.OperatorContext'
                    description: Target operator context for permission check.
                executionId:
                    type: string
                    description: Execution ID to get steps for
            description: |-
                Get the step-by-step execution log for a specific execution.
                 Each step corresponds to a workflow node that was executed, with its input/output data, status, and duration.
                 Useful for debugging failed executions or auditing campaign behavior.

                 ## Example Response

                 ```json
                 {
                   "steps": [
                     {
                       "node_id": "check_deposit_amount",
                       "node_type": "condition",
                       "status": "EXECUTION_STATUS_COMPLETED",
                       "input_data": { "expression": "trigger.amount >= 100", "trigger.amount": 250 },
                       "output_data": { "result": true },
                       "duration_ms": 1
                     },
                     {
                       "node_id": "send_bonus_email",
                       "node_type": "action",
                       "status": "EXECUTION_STATUS_COMPLETED",
                       "input_data": { "action_type": "send_email", "asset_id": 444444444 },
                       "output_data": { "email_sent": true, "recipient": "user@example.com" },
                       "duration_ms": 320
                     }
                   ]
                 }
                 ```
        api.backoffice.service.v1.GetCrmCampaignRequest:
            type: object
            properties:
                targetOperatorContext:
                    allOf:
