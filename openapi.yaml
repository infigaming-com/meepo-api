        api.backoffice.service.v1.RenderAssetRequest:
            type: object
            properties:
                targetOperatorContext:
                    allOf:
                        - $ref: '#/components/schemas/api.common.OperatorContext'
                    description: Target operator context for permission check and variable scoping.
                assetId:
                    type: string
                    description: Asset ID to render
                country:
                    type: string
                    description: Country code to select the version. Falls back to `"global"` if not found.
                playerData:
                    type: object
                    description: Player profile data (e.g. `username`, `email`, `vip_level`). Keys match variable_name in the registry.
                walletData:
                    type: object
                    description: Wallet data (e.g. `balance`, `deposit_amount`, `ggr`). Typically fetched real-time from wallet service.
                campaignData:
                    type: object
                    description: Campaign-specific data (e.g. `bonus_amount`, `promo_code`). Arbitrary key-value pairs.
                customData:
                    type: object
                    description: 'Custom runtime overrides — highest priority, overrides all other sources. Common: `brand_name`, `site_url`, `unsubscribe_url`.'
            description: |-
                Render an asset version with provided data for preview or campaign execution.
                 Resolves all `{{variable_name}}` placeholders. Unresolved variables remain as-is
                 and are listed in `unresolved_variables`.

                 ## Example

                 **Request:**

                 ```json
                 {
                   "asset_id": 42,
                   "country": "US",
                   "player_data": { "username": "john_doe", "email": "john@example.com" },
                   "wallet_data": { "balance": 150.50 },
                   "campaign_data": { "bonus_amount": "100" },
                   "custom_data": { "brand_name": "MySite", "site_url": "https://mysite.com" }
                 }
                 ```

                 **Response:**

                 ```json
                 {
                   "subject": "Hello john_doe, claim your 100 bonus!",
                   "content": "<h1>Welcome to MySite!</h1><p>Your balance: 150.50</p>",
                   "content_type": "text/html",
                   "country": "US",
                   "resolved_variables": { "username": "john_doe", "balance": "150.50", "bonus_amount": "100" },
                   "unresolved_variables": []
                 }
                 ```
