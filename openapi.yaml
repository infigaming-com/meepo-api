                userId:
                    type: string
                ipAddress:
                    type: string
                createdAt:
                    type: string
            description: |-
                OTPSendLogInfo represents a single OTP delivery attempt record.
                 Logs are immutable (append-only) and used for auditing, debugging, and statistics.
        api.push.service.v1.OTPTemplateInfo:
            type: object
            properties:
                id:
                    type: string
                operatorId:
                    type: string
                country:
                    type: string
                    description: ISO 3166-1 alpha-2 country code, or "global"
                providerId:
                    type: string
                    description: Provider this template belongs to
                name:
                    type: string
                    description: Human-readable display name
                templateType:
                    enum:
                        - OTP_TEMPLATE_TYPE_UNSPECIFIED
                        - OTP_TEMPLATE_TYPE_EMAIL_VERIFICATION
                        - OTP_TEMPLATE_TYPE_LOGIN_OTP
                        - OTP_TEMPLATE_TYPE_PASSWORD_RESET
                        - OTP_TEMPLATE_TYPE_WITHDRAWAL_CONFIRM
                        - OTP_TEMPLATE_TYPE_PHONE_VERIFICATION
                    type: string
                    description: Business scenario this template serves
                    format: enum
                externalTemplateId:
                    type: string
                    description: Template ID from the third-party provider's platform (e.g., EngageLab template ID)
                language:
                    type: string
                    description: BCP-47 language code (e.g., "en", "pt")
                brandName:
                    type: string
                    description: Brand name injected into OTP messages as template variable
                codeLength:
                    type: integer
                    description: OTP code length, informational only (actual code generated by caller)
                    format: int32
                codeTtlSeconds:
                    type: integer
                    description: OTP code TTL in seconds, informational only (actual TTL enforced by caller)
                    format: int32
                extraParams:
                    type: string
                    description: JSON string of additional template variables passed to the provider
                reviewStatus:
                    enum:
                        - OTP_TEMPLATE_REVIEW_STATUS_UNSPECIFIED
                        - OTP_TEMPLATE_REVIEW_STATUS_LOCAL_ONLY
                        - OTP_TEMPLATE_REVIEW_STATUS_PENDING
                        - OTP_TEMPLATE_REVIEW_STATUS_APPROVED
                        - OTP_TEMPLATE_REVIEW_STATUS_REJECTED
                    type: string
                    description: Review status from external provider (relevant for WhatsApp templates)
                    format: enum
                enabled:
                    type: boolean
                    description: Whether this template is active for routing
                createdAt:
                    type: string
                updatedAt:
                    type: string
            description: |-
                OTPTemplateInfo represents an OTP message template configuration.

                 A Template defines the message content sent to the end-user. It is bound to a
                 specific OTP Provider and scoped to a business scenario (template_type).
                 Templates are resolved per (operator, country, template_type, language) with
                 fallback to "global" country and "en" language.
        api.push.service.v1.SMSChannelRate:
            type: object
            properties:
                id:
                    type: string
                providerId:
                    type: string
                providerName:
                    type: string
                country:
                    type: string
                channel:
                    type: string
                unitPrice:
                    type: string
                currency:
                    type: string
                enabled:
                    type: boolean
                createdAt:
                    type: string
                updatedAt:
                    type: string
            description: |-
                SMSChannelRate represents the per-message cost for a specific provider+country+channel combination.
                 Used to track and calculate SMS/WhatsApp/Voice delivery costs.
        api.push.service.v1.SaveChannelRulesRequest:
