syntax = "proto3";

package api.backoffice.service.v1;

import "google/api/annotations.proto";
import "common/common.proto";
import "gamification/service/v1/gamification.proto";

option go_package = "github.com/infigaming-com/meepo-api/backoffice/service/v1;v1";
option java_multiple_files = true;
option java_package = "api.backoffice.service.v1";

// Gamification rules management for backoffice.
// Proxies the gamification-service admin APIs with operator context validation,
// HTTP bindings, and the inheritance shape used by other backoffice-side
// hierarchical configs (see BackofficeWallet.GetDepositRewardConfig,
// GetAppDownloadRewardConfig).
//
// Only admin CRUD operations are exposed here. Runtime APIs
// (CheckClaimEligibility, CheckGameRestriction, RecordClaim) are called
// directly by wallet-service and game-service and are NOT proxied.
service BackofficeGamification {
  // === Claim Rules ===
  rpc CreateClaimRule(BackofficeCreateClaimRuleRequest) returns (api.gamification.service.v1.CreateClaimRuleResponse) {
    option (google.api.http) = {
      post: "/v1/backoffice/gamification/claim-rule/create"
      body: "*"
    };
  }

  rpc UpdateClaimRule(BackofficeUpdateClaimRuleRequest) returns (api.gamification.service.v1.UpdateClaimRuleResponse) {
    option (google.api.http) = {
      post: "/v1/backoffice/gamification/claim-rule/update"
      body: "*"
    };
  }

  rpc DeleteClaimRule(BackofficeDeleteClaimRuleRequest) returns (api.gamification.service.v1.DeleteClaimRuleResponse) {
    option (google.api.http) = {
      post: "/v1/backoffice/gamification/claim-rule/delete"
      body: "*"
    };
  }

  // Lists claim rules visible at the target operator level after hierarchy
  // resolution. The response includes the follow_parent toggle state so the
  // admin UI can show the rules AND the inheritance switch on the same page.
  rpc ListClaimRules(BackofficeListClaimRulesRequest) returns (BackofficeListClaimRulesResponse) {
    option (google.api.http) = {
      post: "/v1/backoffice/gamification/claim-rule/list"
      body: "*"
    };
  }

  rpc GetClaimRule(BackofficeGetClaimRuleRequest) returns (api.gamification.service.v1.GetClaimRuleResponse) {
    option (google.api.http) = {
      post: "/v1/backoffice/gamification/claim-rule/get"
      body: "*"
    };
  }

  rpc UpdateClaimRulePriority(BackofficeUpdateClaimRulePriorityRequest) returns (api.gamification.service.v1.UpdateClaimRulePriorityResponse) {
    option (google.api.http) = {
      post: "/v1/backoffice/gamification/claim-rule/priority/update"
      body: "*"
    };
  }

  rpc UpdateClaimRuleStatus(BackofficeUpdateClaimRuleStatusRequest) returns (api.gamification.service.v1.UpdateClaimRuleStatusResponse) {
    option (google.api.http) = {
      post: "/v1/backoffice/gamification/claim-rule/status/update"
      body: "*"
    };
  }

  // Sets the follow_parent toggle for claim rules at the target operator level.
  // When follow_parent=true the operator inherits its parent's effective claim
  // rule set; when false, only the operator's own rules apply.
  rpc SetClaimRuleFollowParent(BackofficeSetClaimRuleFollowParentRequest) returns (BackofficeSetClaimRuleFollowParentResponse) {
    option (google.api.http) = {
      post: "/v1/backoffice/gamification/claim-rule/follow-parent/set"
      body: "*"
    };
  }

  // === Game Restriction Rules ===
  rpc CreateGameRestrictionRule(BackofficeCreateGameRestrictionRuleRequest) returns (api.gamification.service.v1.CreateGameRestrictionRuleResponse) {
    option (google.api.http) = {
      post: "/v1/backoffice/gamification/game-restriction-rule/create"
      body: "*"
    };
  }

  rpc UpdateGameRestrictionRule(BackofficeUpdateGameRestrictionRuleRequest) returns (api.gamification.service.v1.UpdateGameRestrictionRuleResponse) {
    option (google.api.http) = {
      post: "/v1/backoffice/gamification/game-restriction-rule/update"
      body: "*"
    };
  }

  rpc DeleteGameRestrictionRule(BackofficeDeleteGameRestrictionRuleRequest) returns (api.gamification.service.v1.DeleteGameRestrictionRuleResponse) {
    option (google.api.http) = {
      post: "/v1/backoffice/gamification/game-restriction-rule/delete"
      body: "*"
    };
  }

  rpc ListGameRestrictionRules(BackofficeListGameRestrictionRulesRequest) returns (BackofficeListGameRestrictionRulesResponse) {
    option (google.api.http) = {
      post: "/v1/backoffice/gamification/game-restriction-rule/list"
      body: "*"
    };
  }

  rpc GetGameRestrictionRule(BackofficeGetGameRestrictionRuleRequest) returns (api.gamification.service.v1.GetGameRestrictionRuleResponse) {
    option (google.api.http) = {
      post: "/v1/backoffice/gamification/game-restriction-rule/get"
      body: "*"
    };
  }

  rpc UpdateGameRestrictionRulePriority(BackofficeUpdateGameRestrictionRulePriorityRequest) returns (api.gamification.service.v1.UpdateGameRestrictionRulePriorityResponse) {
    option (google.api.http) = {
      post: "/v1/backoffice/gamification/game-restriction-rule/priority/update"
      body: "*"
    };
  }

  rpc UpdateGameRestrictionRuleStatus(BackofficeUpdateGameRestrictionRuleStatusRequest) returns (api.gamification.service.v1.UpdateGameRestrictionRuleStatusResponse) {
    option (google.api.http) = {
      post: "/v1/backoffice/gamification/game-restriction-rule/status/update"
      body: "*"
    };
  }

  rpc SetGameRestrictionRuleFollowParent(BackofficeSetGameRestrictionRuleFollowParentRequest) returns (BackofficeSetGameRestrictionRuleFollowParentResponse) {
    option (google.api.http) = {
      post: "/v1/backoffice/gamification/game-restriction-rule/follow-parent/set"
      body: "*"
    };
  }

  // === Bonus Buy Config ===
  rpc GetBonusBuyConfig(BackofficeGetBonusBuyConfigRequest) returns (api.gamification.service.v1.GetBonusBuyConfigResponse) {
    option (google.api.http) = {
      post: "/v1/backoffice/gamification/bonus-buy-config/get"
      body: "*"
    };
  }

  rpc UpdateBonusBuyConfig(BackofficeUpdateBonusBuyConfigRequest) returns (api.gamification.service.v1.UpdateBonusBuyConfigResponse) {
    option (google.api.http) = {
      post: "/v1/backoffice/gamification/bonus-buy-config/update"
      body: "*"
    };
  }
}

// === Claim Rule Requests ===

message BackofficeCreateClaimRuleRequest {
  api.common.OperatorContext target_operator_context = 1;
  api.gamification.service.v1.ClaimRule rule = 2;
}

message BackofficeUpdateClaimRuleRequest {
  api.common.OperatorContext target_operator_context = 1;
  api.gamification.service.v1.ClaimRule rule = 2;
}

message BackofficeDeleteClaimRuleRequest {
  api.common.OperatorContext target_operator_context = 1;
  int64 rule_id = 2;
}

message BackofficeListClaimRulesRequest {
  api.common.OperatorContext target_operator_context = 1;
  int32 page = 2;
  int32 page_size = 3;
}

// Mirrors the BackofficeWallet inheritance-shape (see GetDepositRewardConfigResponse):
// the caller's own operator context, the follow_parent toggle, and the page of
// rules. Each rule already carries `inherited_from_level` indicating whether
// it was defined at this level or inherited from an ancestor.
message BackofficeListClaimRulesResponse {
  api.common.OperatorContext custom_operator_context = 1;
  bool follow_parent = 2;
  repeated api.gamification.service.v1.ClaimRule rules = 3;
  int32 total = 4;
  int32 page = 5;
  int32 page_size = 6;
}

message BackofficeGetClaimRuleRequest {
  api.common.OperatorContext target_operator_context = 1;
  int64 rule_id = 2;
}

message BackofficeUpdateClaimRulePriorityRequest {
  api.common.OperatorContext target_operator_context = 1;
  int64 rule_id = 2;
  int32 priority = 3;
}

message BackofficeUpdateClaimRuleStatusRequest {
  api.common.OperatorContext target_operator_context = 1;
  int64 rule_id = 2;
  api.gamification.service.v1.RuleStatus status = 3;
}

message BackofficeSetClaimRuleFollowParentRequest {
  api.common.OperatorContext target_operator_context = 1;
  bool follow_parent = 2;
}

message BackofficeSetClaimRuleFollowParentResponse {
}

// === Game Restriction Rule Requests ===

message BackofficeCreateGameRestrictionRuleRequest {
  api.common.OperatorContext target_operator_context = 1;
  api.gamification.service.v1.GameRestrictionRule rule = 2;
}

message BackofficeUpdateGameRestrictionRuleRequest {
  api.common.OperatorContext target_operator_context = 1;
  api.gamification.service.v1.GameRestrictionRule rule = 2;
}

message BackofficeDeleteGameRestrictionRuleRequest {
  api.common.OperatorContext target_operator_context = 1;
  int64 rule_id = 2;
}

message BackofficeListGameRestrictionRulesRequest {
  api.common.OperatorContext target_operator_context = 1;
  int32 page = 2;
  int32 page_size = 3;
}

message BackofficeListGameRestrictionRulesResponse {
  api.common.OperatorContext custom_operator_context = 1;
  bool follow_parent = 2;
  repeated api.gamification.service.v1.GameRestrictionRule rules = 3;
  int32 total = 4;
  int32 page = 5;
  int32 page_size = 6;
}

message BackofficeGetGameRestrictionRuleRequest {
  api.common.OperatorContext target_operator_context = 1;
  int64 rule_id = 2;
}

message BackofficeUpdateGameRestrictionRulePriorityRequest {
  api.common.OperatorContext target_operator_context = 1;
  int64 rule_id = 2;
  int32 priority = 3;
}

message BackofficeUpdateGameRestrictionRuleStatusRequest {
  api.common.OperatorContext target_operator_context = 1;
  int64 rule_id = 2;
  api.gamification.service.v1.RuleStatus status = 3;
}

message BackofficeSetGameRestrictionRuleFollowParentRequest {
  api.common.OperatorContext target_operator_context = 1;
  bool follow_parent = 2;
}

message BackofficeSetGameRestrictionRuleFollowParentResponse {
}

// === Bonus Buy Config Requests ===

message BackofficeGetBonusBuyConfigRequest {
  api.common.OperatorContext target_operator_context = 1;
}

message BackofficeUpdateBonusBuyConfigRequest {
  api.common.OperatorContext target_operator_context = 1;
  bool enabled = 2;
}
