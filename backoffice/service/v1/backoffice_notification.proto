syntax = "proto3";

package api.backoffice.service.v1;

import "google/api/annotations.proto";
import "common/common.proto";
import "push/service/v1/push_notification.proto";

option go_package = "github.com/infigaming-com/meepo-api/backoffice/service/v1;v1";
option java_multiple_files = true;
option java_package = "api.backoffice.service.v1";

// Notification channel and rule management service for backoffice.
// Provides CRUD APIs for managing notification channels (Telegram, Slack) and
// configuring notification rules that determine when and how alerts are sent
// (e.g., large deposits, withdrawals, bets, wins).
//
// ## Concepts
//
// - **Channel**: A configured delivery endpoint (Telegram bot or Slack webhook) that receives notifications.
// - **Rule**: A condition attached to a channel that defines which message types trigger a notification
//   and optional currency/amount thresholds.
// - **Message Type**: The event category (withdraw, deposit, large deposit, large bet, large win).
//
// ## Enums
//
// **ChannelType**:
// | Value | Name |
// |-------|------|
// | 0 | CHANNEL_TYPE_UNSPECIFIED |
// | 1 | CHANNEL_TYPE_TELEGRAM |
// | 2 | CHANNEL_TYPE_SLACK |
//
// **MessageType**:
// | Value | Name | Description |
// |-------|------|-------------|
// | 0 | MESSAGE_TYPE_UNSPECIFIED | |
// | 1 | MESSAGE_TYPE_WITHDRAW_NOTIFICATION | Withdrawal event |
// | 2 | MESSAGE_TYPE_DEPOSIT_NOTIFICATION | Deposit event |
// | 3 | MESSAGE_TYPE_LARGE_DEPOSIT | Deposit exceeding threshold |
// | 4 | MESSAGE_TYPE_LARGE_BET | Bet exceeding threshold |
// | 5 | MESSAGE_TYPE_LARGE_WIN | Win exceeding threshold |
//
// **RuleType**:
// | Value | Name | Description |
// |-------|------|-------------|
// | 0 | RULE_TYPE_UNSPECIFIED | |
// | 1 | RULE_TYPE_GENERIC | Simple on/off rule, no amount filter |
// | 2 | RULE_TYPE_CURRENCY_THRESHOLD | Rule with per-currency amount thresholds |
service BackofficeNotification {
  // ============ Channel Management ============

  // Create a new notification channel.
  //
  // Creates a Telegram or Slack channel that can receive notification messages.
  // After creation, use SaveChannelRules to attach notification rules to this channel.
  //
  // ## Request body
  //
  // | Field | Type | Required | Description |
  // |-------|------|----------|-------------|
  // | target_operator_context | OperatorContext | No | Target operator. Defaults to logged-in operator |
  // | name | string | Yes | Display name for the channel |
  // | channel_type | ChannelType | Yes | `CHANNEL_TYPE_TELEGRAM` (1) or `CHANNEL_TYPE_SLACK` (2) |
  // | config | ChannelConfig | Yes | Channel-specific configuration (see below) |
  // | enabled | bool | No | Whether the channel is active. Default: false |
  //
  // ### ChannelConfig
  //
  // Provide **one of** the following based on `channel_type`:
  //
  // **Telegram** (`config.telegram`):
  // | Field | Type | Description |
  // |-------|------|-------------|
  // | bot_token | string | Telegram Bot API token |
  // | chat_id | string | Target chat/group ID |
  //
  // **Slack** (`config.slack`):
  // | Field | Type | Description |
  // |-------|------|-------------|
  // | webhook_url | string | Slack incoming webhook URL |
  //
  // ## Response
  //
  // | Field | Type | Description |
  // |-------|------|-------------|
  // | channel | NotificationChannel | The created channel with generated `id` and timestamps |
  //
  // ## Example
  //
  // ```json
  // // Request
  // {
  //   "name": "Risk Alerts - Telegram",
  //   "channel_type": 1,
  //   "config": {
  //     "telegram": {
  //       "bot_token": "123456:ABC-DEF...",
  //       "chat_id": "-1001234567890"
  //     }
  //   },
  //   "enabled": true
  // }
  //
  // // Response
  // {
  //   "channel": {
  //     "id": 42,
  //     "name": "Risk Alerts - Telegram",
  //     "channel_type": 1,
  //     "config": {
  //       "telegram": {
  //         "bot_token_masked": "123***DEF...",
  //         "chat_id": "-1001234567890"
  //       }
  //     },
  //     "enabled": true,
  //     "created_at": 1710000000,
  //     "updated_at": 1710000000,
  //     "is_inherited": false
  //   }
  // }
  // ```
  rpc CreateNotificationChannel(api.push.service.v1.CreateNotificationChannelRequest) returns (api.push.service.v1.CreateNotificationChannelResponse) {
    option (google.api.http) = {
      post: "/v1/backoffice/notification/channel/create"
      body: "*"
    };
  }

  // List notification channels with pagination.
  //
  // Returns channels owned by or inherited to the current operator.
  // Supports filtering by channel type and enabled status.
  //
  // ## Request body
  //
  // | Field | Type | Required | Description |
  // |-------|------|----------|-------------|
  // | target_operator_context | OperatorContext | No | Target operator. Defaults to logged-in operator |
  // | channel_type | ChannelType | No | Filter by type (omit for all) |
  // | enabled | bool | No | Filter by enabled status (omit for all) |
  // | include_inherited | bool | No | If true, include channels from parent levels |
  // | page | int32 | No | Page number, starting from 1 |
  // | page_size | int32 | No | Items per page |
  //
  // ## Response
  //
  // | Field | Type | Description |
  // |-------|------|-------------|
  // | channels | NotificationChannel[] | List of channels |
  // | total | int32 | Total count matching filters |
  // | page | int32 | Current page |
  // | page_size | int32 | Items per page |
  rpc ListNotificationChannels(api.push.service.v1.ListNotificationChannelsRequest) returns (api.push.service.v1.ListNotificationChannelsResponse) {
    option (google.api.http) = {
      post: "/v1/backoffice/notification/channel/list"
      body: "*"
    };
  }

  // Get a specific notification channel by ID.
  //
  // ## Request body
  //
  // | Field | Type | Required | Description |
  // |-------|------|----------|-------------|
  // | target_operator_context | OperatorContext | No | Target operator. Defaults to logged-in operator |
  // | channel_id | int64 | Yes | Channel ID to retrieve |
  //
  // ## Response
  //
  // | Field | Type | Description |
  // |-------|------|-------------|
  // | channel | NotificationChannel | The channel details. Sensitive fields (bot_token, webhook_url) are masked |
  rpc GetNotificationChannel(api.push.service.v1.GetNotificationChannelRequest) returns (api.push.service.v1.GetNotificationChannelResponse) {
    option (google.api.http) = {
      post: "/v1/backoffice/notification/channel/get"
      body: "*"
    };
  }

  // Partially update a notification channel. Only provided fields are updated.
  //
  // ## Request body
  //
  // | Field | Type | Required | Description |
  // |-------|------|----------|-------------|
  // | target_operator_context | OperatorContext | No | Target operator. Defaults to logged-in operator |
  // | channel_id | int64 | Yes | Channel ID to update |
  // | name | string | No | New display name |
  // | config | ChannelConfig | No | New channel config (replaces existing) |
  // | enabled | bool | No | Enable or disable |
  //
  // ## Response
  //
  // Empty on success.
  rpc UpdateNotificationChannel(api.push.service.v1.UpdateNotificationChannelRequest) returns (api.push.service.v1.UpdateNotificationChannelResponse) {
    option (google.api.http) = {
      post: "/v1/backoffice/notification/channel/update"
      body: "*"
    };
  }

  // Delete a notification channel and all its associated rules.
  //
  // ## Request body
  //
  // | Field | Type | Required | Description |
  // |-------|------|----------|-------------|
  // | target_operator_context | OperatorContext | No | Target operator. Defaults to logged-in operator |
  // | channel_id | int64 | Yes | Channel ID to delete |
  //
  // ## Response
  //
  // Empty on success.
  rpc DeleteNotificationChannel(api.push.service.v1.DeleteNotificationChannelRequest) returns (api.push.service.v1.DeleteNotificationChannelResponse) {
    option (google.api.http) = {
      post: "/v1/backoffice/notification/channel/delete"
      body: "*"
    };
  }

  // Test a notification channel by sending a test message.
  //
  // Sends a test message through the channel to verify configuration is correct.
  // Does not require the channel to be enabled.
  //
  // ## Request body
  //
  // | Field | Type | Required | Description |
  // |-------|------|----------|-------------|
  // | target_operator_context | OperatorContext | No | Target operator. Defaults to logged-in operator |
  // | channel_id | int64 | Yes | Channel ID to test |
  // | test_message | string | No | Custom message to send. If empty, a default test message is used |
  //
  // ## Response
  //
  // | Field | Type | Description |
  // |-------|------|-------------|
  // | success | bool | Whether the test message was delivered successfully |
  // | error_message | string | Error details if delivery failed |
  rpc TestNotificationChannel(api.push.service.v1.TestNotificationChannelRequest) returns (api.push.service.v1.TestNotificationChannelResponse) {
    option (google.api.http) = {
      post: "/v1/backoffice/notification/channel/test"
      body: "*"
    };
  }

  // ============ Rule Management ============

  // Save all rules for a channel (batch create/update/delete).
  //
  // This is a full replacement operation for a channel's rules:
  // - Rules with `id = 0` are created as new rules
  // - Rules with `id > 0` are updated
  // - Existing rules NOT included in the request are deleted
  //
  // ## Request body
  //
  // | Field | Type | Required | Description |
  // |-------|------|----------|-------------|
  // | target_operator_context | OperatorContext | No | Target operator. Defaults to logged-in operator |
  // | channel_id | int64 | Yes | Channel to save rules for |
  // | rules | NotificationRuleInput[] | Yes | Full list of rules for this channel |
  //
  // ### NotificationRuleInput
  //
  // | Field | Type | Required | Description |
  // |-------|------|----------|-------------|
  // | id | int64 | No | `0` = create new, `>0` = update existing |
  // | name | string | Yes | Display name for the rule |
  // | message_type | MessageType | Yes | Event type to match (see enum above) |
  // | rule_type | RuleType | Yes | `RULE_TYPE_GENERIC` (1) or `RULE_TYPE_CURRENCY_THRESHOLD` (2) |
  // | currency_conditions | CurrencyCondition[] | No | Required when `rule_type = RULE_TYPE_CURRENCY_THRESHOLD` |
  // | enabled | bool | No | Whether the rule is active |
  //
  // ### CurrencyCondition
  //
  // | Field | Type | Description |
  // |-------|------|-------------|
  // | currency | string | Currency code, e.g. `"USD"`, `"BTC"`, or `"*"` (wildcard for all) |
  // | min_amount | string | Minimum amount threshold (decimal string, e.g. `"1000.00"`) |
  // | min_odds | string | Minimum odds threshold (for `MESSAGE_TYPE_LARGE_WIN` only) |
  //
  // ## Response
  //
  // | Field | Type | Description |
  // |-------|------|-------------|
  // | rules | NotificationRule[] | The saved rules with generated IDs and timestamps |
  //
  // ## Example
  //
  // ```json
  // // Request — set up large deposit + withdrawal alerts for a channel
  // {
  //   "channel_id": 42,
  //   "rules": [
  //     {
  //       "id": 0,
  //       "name": "Large USD Deposits",
  //       "message_type": 3,
  //       "rule_type": 2,
  //       "currency_conditions": [
  //         { "currency": "USD", "min_amount": "5000.00" },
  //         { "currency": "EUR", "min_amount": "4500.00" }
  //       ],
  //       "enabled": true
  //     },
  //     {
  //       "id": 0,
  //       "name": "All Withdrawals",
  //       "message_type": 1,
  //       "rule_type": 1,
  //       "enabled": true
  //     }
  //   ]
  // }
  // ```
  rpc SaveChannelRules(api.push.service.v1.SaveChannelRulesRequest) returns (api.push.service.v1.SaveChannelRulesResponse) {
    option (google.api.http) = {
      post: "/v1/backoffice/notification/rule/save"
      body: "*"
    };
  }

  // List notification rules with pagination.
  //
  // Returns rules matching the given filters. Supports filtering by message type,
  // enabled status, and channel.
  //
  // ## Request body
  //
  // | Field | Type | Required | Description |
  // |-------|------|----------|-------------|
  // | target_operator_context | OperatorContext | No | Target operator. Defaults to logged-in operator |
  // | message_type | MessageType | No | Filter by message type (omit for all) |
  // | enabled | bool | No | Filter by enabled status (omit for all) |
  // | include_inherited | bool | No | If true, include rules from parent levels |
  // | channel_id | int64 | No | Filter by channel (0 = all channels) |
  // | page | int32 | No | Page number, starting from 1 |
  // | page_size | int32 | No | Items per page |
  //
  // ## Response
  //
  // | Field | Type | Description |
  // |-------|------|-------------|
  // | rules | NotificationRule[] | List of rules |
  // | total | int32 | Total count matching filters |
  // | page | int32 | Current page |
  // | page_size | int32 | Items per page |
  rpc ListNotificationRules(api.push.service.v1.ListNotificationRulesRequest) returns (api.push.service.v1.ListNotificationRulesResponse) {
    option (google.api.http) = {
      post: "/v1/backoffice/notification/rule/list"
      body: "*"
    };
  }

  // Get supported message types for frontend dropdown.
  //
  // Returns the list of all available message types with display names,
  // useful for building UI dropdowns/selectors.
  //
  // ## Request body
  //
  // Empty — no parameters required.
  //
  // ## Response
  //
  // | Field | Type | Description |
  // |-------|------|-------------|
  // | message_types | MessageTypeInfo[] | List of supported message types |
  //
  // ### MessageTypeInfo
  //
  // | Field | Type | Description |
  // |-------|------|-------------|
  // | value | MessageType | Enum value |
  // | name | string | Enum name (e.g. `"MESSAGE_TYPE_LARGE_DEPOSIT"`) |
  // | display_name | string | Human-readable name (e.g. `"Large Deposit"`) |
  rpc GetSupportedMessageTypes(api.push.service.v1.GetSupportedMessageTypesRequest) returns (api.push.service.v1.GetSupportedMessageTypesResponse) {
    option (google.api.http) = {
      post: "/v1/backoffice/notification/message-types"
      body: "*"
    };
  }
}
