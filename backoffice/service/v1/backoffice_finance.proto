syntax = "proto3";

package api.backoffice.service.v1;
import "common/common.proto";
import "game/service/v1/game.proto";
import "google/api/annotations.proto";

option go_package = "github.com/infigaming-com/meepo-api/backoffice/service/v1;v1";
option java_multiple_files = true;
option java_package = "api.backoffice.service.v1";

service BackofficeFinance {
	rpc ListInvoices(ListInvoicesRequest) returns (ListInvoicesResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/finance/invoices/list"
			body: "*"
		};
	}

	rpc GetInvoiceDetail(GetInvoiceDetailRequest) returns (GetInvoiceDetailResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/finance/invoice/detail"
			body: "*"
		};
	}

	rpc ListOperatorRevenueShare(ListOperatorRevenueShareRequest) returns (ListOperatorRevenueShareResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/finance/revenue-shares/list"
			body: "*"
		};
	}

	rpc ListThirdPartyFees(ListThirdPartyFeesRequest) returns (ListThirdPartyFeesResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/finance/third-party-fees/list"
			body: "*"
		};
	}

	rpc ListAdjustments(ListAdjustmentsRequest) returns (ListAdjustmentsResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/finance/adjustments/list"
			body: "*"
		};
	}

	rpc ListMonthlyRevenueShare(ListMonthlyRevenueShareRequest) returns (ListMonthlyRevenueShareResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/finance/monthly-revenue-shares/list"
			body: "*"
		};
	}

	rpc AddAdjustment(AddAdjustmentRequest) returns (AddAdjustmentResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/finance/adjustment/add"
			body: "*"
		};
	}

	rpc ListAdjustmentConfigs(ListAdjustmentConfigsRequest) returns (ListAdjustmentConfigsResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/finance/adjustment-configs/list"
			body: "*"
		};
	}

	rpc CreateAdjustmentConfig(CreateAdjustmentConfigRequest) returns (CreateAdjustmentConfigResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/finance/adjustment-configs/create"
			body: "*"
		};
	}

	rpc UpdateAdjustmentConfig(UpdateAdjustmentConfigRequest) returns (UpdateAdjustmentConfigResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/finance/adjustment-configs/update"
			body: "*"
		};
	}

	rpc DeleteAdjustmentConfig(DeleteAdjustmentConfigRequest) returns (DeleteAdjustmentConfigResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/finance/adjustment-configs/delete"
			body: "*"
		};
	}

	rpc DeleteAdjustment(DeleteAdjustmentRequest) returns (DeleteAdjustmentResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/finance/adjustment/delete"
			body: "*"
		};
	}

	rpc UpdateAdjustment(UpdateAdjustmentRequest) returns (UpdateAdjustmentResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/finance/adjustments/update"
			body: "*"
		};
	}

	rpc SendInvoices(SendInvoicesRequest) returns (SendInvoicesResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/finance/invoices/send"
			body: "*"
		};
	}

	rpc PayInvoice(PayInvoiceRequest) returns (PayInvoiceResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/finance/invoice/pay"
			body: "*"
		};
	}

	rpc GetInvoiceSummary(GetInvoiceSummaryRequest) returns (GetInvoiceSummaryResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/finance/invoices/summary"
			body: "*"
		};
	}

	rpc GetBalanceSummary(GetBalanceSummaryRequest) returns (GetBalanceSummaryResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/finance/balance/summary"
			body: "*"
		};
	}

	rpc GetBalancesSummary(GetBalancesSummaryRequest) returns (GetBalancesSummaryResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/finance/balances/summary"
			body: "*"
		};
	}

	rpc ListBillingPeriods(ListBillingPeriodsRequest) returns (ListBillingPeriodsResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/finance/billing-periods/list"
			body: "*"
		};
	}

	rpc ListBalanceMonthlyRevenueShares(ListBalanceMonthlyRevenueSharesRequest) returns (ListBalanceMonthlyRevenueSharesResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/finance/balance/monthly-revenue-shares/list"
			body: "*"
		};
	}

	rpc ListBalancesSummary(ListBalancesSummaryRequest) returns (ListBalancesSummaryResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/finance/balances/summary/list"
			body: "*"
		};
	}

	rpc GetTaxReportConfig(GetTaxReportConfigRequest) returns (GetTaxReportConfigResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/finance/tax-report-configs/get"
			body: "*"
		};
	}

	rpc UpdateTaxReportConfig(UpdateTaxReportConfigRequest) returns (UpdateTaxReportConfigResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/finance/tax-report-configs/update"
			body: "*"
		};
	}

	rpc ListTaxReports(ListTaxReportsRequest) returns (ListTaxReportsResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/finance/tax-reports/list"
			body: "*"
		};
	}

	rpc ExportTaxReports(ExportTaxReportsRequest) returns (game.service.v1.ExportTaxReportsResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/finance/tax-reports/export"
			body: "*"
		};
	}

	rpc UpdateTaxReport(UpdateTaxReportRequest) returns (UpdateTaxReportResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/finance/tax-reports/update"
			body: "*"
		};
	}

	rpc ListRevenueShareRateConfigs(ListRevenueShareRateConfigsRequest) returns (ListRevenueShareRateConfigsResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/finance/revenue-share-rate-configs/list"
			body: "*"
		};
	}

	rpc ListPaymentChannelFees(ListPaymentChannelFeesRequest) returns (ListPaymentChannelFeesResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/finance/payment-channel-fees/list"
			body: "*"
		};
	}
}

message ListInvoicesRequest {
	api.common.OperatorContextFilters operator_context_filters = 1;
	optional string month = 2;
	optional int64 invoice_id = 3;
	
	// Filter by payment status
	enum PaymentStatus {
		PAYMENT_STATUS_PAID = 0;
		PAYMENT_STATUS_NOT_PAID = 1;
	}
	optional PaymentStatus payment_status = 4;
	
	// Pagination
	optional int32 page = 5;
	optional int32 page_size = 6;
}

message ListInvoicesResponse {
	message Invoice {
		// Invoice ID
		int64 invoice_id = 1;
		
		// Operator information
		int64 operator_id = 2;
		string operator_name = 3;

		// Retailer information
		int64 retailer_operator_id = 4;
		string retailer_operator_name = 5;

		// Company information
		int64 company_operator_id = 6;
		string company_operator_name = 7;
		
		// Invoice details
		string month = 8;
		
		// Financial information
		string due_amount = 9;
		string total_amount = 10;
		string amount_paid = 11;
		
		// Payment status
		enum PaymentStatus {
			PAYMENT_STATUS_PAID = 0;
			PAYMENT_STATUS_NOT_PAID = 1;
		}
		PaymentStatus payment_status = 12;
		
		// Dates
		string invoice_date = 13; // Format: YYYY-MM-DD
		string due_date = 14; // Format: YYYY-MM-DD
		// Operator mode: individual, co-operation
		string operator_mode = 15;
	}

	repeated Invoice invoices = 1;
	
	int32 total_count = 2;
	int32 page = 3;
	int32 page_size = 4;
	int32 total_paid_count = 5;
	int32 total_not_paid_count = 6;
}

message GetInvoiceDetailRequest {
	int64 invoice_id = 1;
}

message GetInvoiceDetailResponse {
	message InvoiceDetail {
		// Basic invoice information
		int64 invoice_id = 1;
		
		// Payment status
		enum PaymentStatus {
			PAYMENT_STATUS_PAID = 0;
			PAYMENT_STATUS_NOT_PAID = 1;
		}
		PaymentStatus payment_status = 2;
		
		// Dates
		string invoice_date = 3; // Format: YYYY-MM-DD
		string due_date = 4; // Format: YYYY-MM-DD
		string month = 5; // Format: YYYY-MM
		
		// Invoice details
		string game_provider_revenue_share = 6;
		string third_party_cost = 7;
		string feature_subscription = 8;
		string revenue_share_system = 9;
		string revenue_share_operator = 10;
		string adjustments = 11; // pre-calculation adjustments total

		// Financial summary
		string total_amount = 12; // Total invoice amount
		string amount_paid = 13; // Amount already paid
		string due_amount = 14; // Remaining amount due

		// Retailer information
		int64 retailer_operator_id = 15;
		string retailer_operator_name = 16;

		// Company information
		int64 company_operator_id = 17;
		string company_operator_name = 18;

		// Operator information
		int64 operator_id = 19;
		string operator_name = 20;
		string post_calc_adjustments = 21; // post-calculation adjustments total
	}
	
	InvoiceDetail invoice = 1;
}

message ListOperatorRevenueShareRequest {
	api.common.OperatorContextFilters operator_context_filters = 1;
	optional int64 invoice_id = 2;
	
	// Pagination
	optional int32 page = 3;
	optional int32 page_size = 4;
	optional string period_key = 5;
}

message ListOperatorRevenueShareResponse {
	message RevenueShareItem {
		// Basic information
		int64 operator_id = 1;
		string operator_name = 2;
		string game_provider_id = 3;
		string game_provider_name = 4;
		string fee_group = 5;
		string currency = 6;
	
		// Gaming statistics
		string total_bet = 7; // Total bet amount
		string total_payout = 8; // Total payout amount
		int32 bets_count = 9; // Number of bets
		string ngr = 10; // Net Gaming Revenue
		string ggr = 11; // Gross Gaming Revenue
		
		// Revenue share calculation
		string rate = 12; // Revenue share rate (e.g., "7.50%")
		string amount = 13; // Revenue share amount in original currency
		string fx_rate = 14; // Foreign exchange rate
		string amount_usd = 15; // Revenue share amount in USD
		int64 id = 16;
	}
	
	repeated RevenueShareItem items = 1;
	
	// Summary
	string subtotal = 2; // Total amount
	
	// Pagination information
	int32 total_count = 3;
	int32 page = 4;
	int32 page_size = 5;
	int32 total_pages = 6;
}

message ListThirdPartyFeesRequest {
	api.common.OperatorContextFilters operator_context_filters = 1;
	optional int64 invoice_id = 2;
	
	// Pagination
	optional int32 page = 3;
	optional int32 page_size = 4;
	optional string period_key = 5;
}

message ListThirdPartyFeesResponse {
	message ThirdPartyFeeItem {
		// Basic information
		int64 operator_id = 1;
		string operator_name = 2;
		string service = 3;
		
		// Fee details
		string quantity = 4; // Quantity as string to preserve formatting
		string amount = 5; // Amount as string to preserve precision
		string description = 6; // Description of the fee
		int64 id = 7;
	}
	
	repeated ThirdPartyFeeItem items = 1;
	
	// Summary
	string subtotal = 2; // Total amount
	
	// Pagination information
	int32 total_count = 3;
	int32 page = 4;
	int32 page_size = 5;
}

message ListMonthlyRevenueShareRequest {
	api.common.OperatorContextFilters operator_context_filters = 1;
	optional int64 invoice_id = 2;
	
	// Pagination
	optional int32 page = 3;
	optional int32 page_size = 4;
	optional string period_key = 5;
}

message ListMonthlyRevenueShareResponse {
	message RevenueShareItem{
		// Basic information
		int64 operator_id = 1;
		string operator_name = 2;
		string operator_mode = 3; // Individual, Co-Operation, Co-Operation (Self-Managed Payment)
		string retailer_operator_id = 4;
		string retailer_operator_name = 5;
		string company_operator_id = 6;
		string company_operator_name = 7;
		
		// Financial data
		string deposits = 8; // Deposit amounts
		string withdrawals = 9; // Withdrawal amounts
		string balance = 10; // Current balance
		string ngr = 11; // Net Gaming Revenue
		string ggr = 12; // Gross Gaming Revenue
		
		// Revenue breakdown
		string game_provider_rs = 13; // Game Provider Revenue Share
		string third_party_fees = 14; // Other 3rd-Party Fees
		string adjustments = 15; // Adjustments
		string net_profit = 16; // Net Profit
		
		// Revenue share details
		string rs_rate = 17; // Revenue Share Rate (e.g., "80%")
		string revenue_share_system = 18; // Revenue Share System
		string revenue_share_operator = 19; // Revenue Share Operator
		string est_costs = 20; // Est. Costs
		int64 id = 21;
	}
	
	repeated RevenueShareItem items = 1;
	
	// Summary totals
	message Summary {
		string subtotal = 1;
		string revenue_share_system_total = 2;
		string revenue_share_operator_total = 3;
		string est_costs_total = 4;
	}
	Summary summary = 2;
	
	// Pagination information
	int32 total_count = 3;
	int32 page = 4;
	int32 page_size = 5;
}

message AddAdjustmentRequest {
	string item = 1;
	api.common.OperatorContext target_operator_context = 2;
	string applied_date = 3;
	string currency = 4;
	string amount = 5;
	string description = 6;
	string period_key = 7;
	string adjustment_type = 8;
}

message AddAdjustmentResponse {
}

message ListAdjustmentConfigsRequest {
	// Pagination
	optional int32 page = 1;
	optional int32 page_size = 2;
}

message ListAdjustmentConfigsResponse {
	message AdjustmentConfig {
		int64 id = 1;
		string item = 2; // Adjustment item name
		string description = 3; // Description of the adjustment item
	}
	
	repeated AdjustmentConfig configs = 1;
	
	// Pagination information
	int32 total_count = 2;
	int32 page = 3;
	int32 page_size = 4;
}

message UpdateAdjustmentConfigRequest {
	int64 id = 1; // Configuration ID to update
	string item = 2; // Updated item name
	string description = 3; // Updated description
	optional bool enabled = 4; // Updated enabled status
}

message UpdateAdjustmentConfigResponse {
}

message DeleteAdjustmentConfigRequest {
	int64 id = 1; // Configuration ID to delete
}

message DeleteAdjustmentConfigResponse {
}

message ListAdjustmentsRequest {
	api.common.OperatorContextFilters operator_context_filters = 1;
	optional int64 invoice_id = 2;
	
	// Pagination
	optional int32 page = 3;
	optional int32 page_size = 4;
	optional string period_key = 5;
}

message ListAdjustmentsResponse {
	message AdjustmentItem {
		string item = 1;
		int64 operator_id = 2;
		string operator_name = 3;
		string currency = 4;
		string amount = 5;
		string description = 6;
		int64 id = 7;
		int64 created_at = 8;
		string created_by = 9;
		string adjustment_type = 10;
		string applied_date = 11;
		string period_key = 12;
		api.common.OperatorContext target_operator_context = 13;
		int64 created_by_uid = 14;
	}

	repeated AdjustmentItem items = 1;

	// Summary
	string subtotal = 2; // Total adjustment amount
	
	// Pagination information
	int32 total_count = 3;
	int32 page = 4;
	int32 page_size = 5;
}

message CreateAdjustmentConfigRequest {
	string item = 1; // Adjustment item name
	string description = 2; // Description of the adjustment item
}

message CreateAdjustmentConfigResponse {
}

message DeleteAdjustmentRequest {
	int64 id = 1; // Adjustment ID to delete
}

message DeleteAdjustmentResponse {
}

message UpdateAdjustmentRequest {
	int64 id = 1;
	string item = 2;
	api.common.OperatorContext target_operator_context = 3;
	string applied_date = 4;
	string currency = 5;
	string amount = 6;
	string description = 7;
	string period_key = 8;
	string adjustment_type = 9;
}

message UpdateAdjustmentResponse {
}

message SendInvoicesRequest {
	string period_key = 1;
}

message SendInvoicesResponse {
}

message PayInvoiceRequest {
	int64 invoice_id = 1;
}

message PayInvoiceResponse {
	int64 invoice_id = 1;
	string amount_paid = 2;
	string payment_date = 3;
}

message GetInvoiceSummaryRequest {
	string period_key = 1;
}

message GetInvoiceSummaryResponse {
	string total_income = 1;
	string total_outcome = 2;
	string billing_period = 3;
}

message GetBalanceSummaryRequest {
	api.common.OperatorContext target_operator_context = 1;
}

message GetBalanceSummaryResponse {
	// Company Balance card
	string company_balance = 1;
	string est_settlement_cost = 2;
	string est_revenue_share = 3;
	string available_for_bills = 4;
	string usage_rate = 5;

	// Custody Balance card
	string custody_balance = 6;
	string internal_deposits = 7;
	string user_deposits = 8;
	string total_deposits = 9;
	string player_withdrawals = 10;
	string custody_company_withdrawals = 11;
	string transfer_amount = 12;
	string locked_outstanding_invoices = 13;
	string locked_late_payment_fee = 14;
	string max_withdrawable = 15;
	string pending_invoices = 16;
	bool withdraw_disabled = 17;
	// Custody card: est costs from co-operation operators
	string custody_est_costs = 18;
	// Pending player withdrawals (frozen but not yet settled)
	string pending_player_withdrawals = 19;
	// Pending company withdrawals on sub-operators (frozen but not yet settled)
	string custody_pending_company_withdrawals = 20;
	// Pending balance freeze (frozen but not yet settled)
	string pending_balance_freeze = 21;
	// Settled balance freeze
	string settled_balance_freeze = 22;
	// Net swap fee loss
	string swap_fee = 23;
	// Pending amount from company's own wallet for payment withdrawals
	string company_pending_withdraw = 24;
	// Pending amount from company's own wallet for affiliate withdrawals
	string company_pending_affiliate_withdraw = 25;
	// Total manual credit to sub-operators in USD
	string manual_credit = 26;
	// Total manual debit from sub-operators in USD
	string manual_debit = 27;
	// Bankroll amount in USD (placeholder)
	string bankroll = 28;
	// Pending affiliate withdraw freeze on sub-operators
	string custody_pending_affiliate_withdraw = 29;
	// Settled affiliate withdrawals from sub-operators
	string custody_affiliate_withdraw = 30;
	// Settled affiliate withdrawals from company's own wallet
	string company_affiliate_withdraw = 31;
	// Settled company's own payment withdrawals
	string company_withdraw = 32;
}

message GetBalancesSummaryRequest {
	api.common.OperatorContextFilters operator_context_filters = 1;
	optional int32 page = 2;
	optional int32 page_size = 3;
}

message GetBalancesSummaryResponse {
	// Summary cards
	string company_deposits = 1;
	string custody_transfer_in = 2;
	string company_withdrawals = 3;
	string invoice_payments = 4;
	string est_costs = 5;

	// Per-company rows
	repeated BalancesSummaryRow rows = 6;
	int32 total_count = 7;
	int32 page = 8;
	int32 page_size = 9;
}

message BalancesSummaryRow {
	int64 retailer_operator_id = 1;
	string retailer_name = 2;
	int64 company_operator_id = 3;
	string company_name = 4;
	string operator_type = 5;
	string balance = 6;
	string deposits = 7;
	string transfer_in = 8;
	string withdrawals = 9;
	string invoice_payment = 10;
	string est_costs = 11;
	string est_rs_disburse = 12;
	string locked_for_pending_invoices = 13;
	int64 operator_id = 14;
	string operator_name = 15;
	// Wallet financial summary fields
	string player_withdrawals = 16;
	string custody_pending_company_withdrawals = 17;
	string pending_player_withdrawals = 18;
	string swap_fee = 19;
	string manual_credit = 20;
	string manual_debit = 21;
	string bankroll = 22;
	string company_pending_withdraw = 23;
	string company_pending_affiliate_withdraw = 24;
	string custody_pending_affiliate_withdraw = 25;
	string custody_affiliate_withdraw = 26;
	string company_affiliate_withdraw = 27;
	string company_withdraw = 28;
}

message ListBillingPeriodsRequest {
	optional int32 page = 1;
	optional int32 page_size = 2;
	optional string status = 3;
}

message ListBillingPeriodsResponse {
	message BillingPeriod {
		string start_time = 1;
