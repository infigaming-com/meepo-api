		// Revenue breakdown
		string game_provider_rs = 13; // Game Provider Revenue Share
		string third_party_fees = 14; // Other 3rd-Party Fees
		string adjustments = 15; // Adjustments
		string net_profit = 16; // Net Profit
		
		// Revenue share details
		string rs_rate = 17; // Revenue Share Rate (e.g., "80%")
		string revenue_share_system = 18; // Revenue Share System
		string revenue_share_operator = 19; // Revenue Share Operator
		string est_costs = 20; // Est. Costs
		int64 id = 21;
	}
	
	repeated RevenueShareItem items = 1;

	// Pagination information
	int32 total_count = 2;
	int32 page = 3;
	int32 page_size = 4;
}

message ListBalancesSummaryRequest {
	api.common.OperatorContextFilters operator_context_filters = 1;
	optional int32 page = 2;
	optional int32 page_size = 3;
}

message ListBalancesSummaryResponse {
	message BalanceSummary {
		int64 retailer_operator_id = 4;
		string retailer_operator_name = 5;
		int64 company_operator_id = 6;
		string company_operator_name = 7;
		string deposits = 8;
		string withdrawals = 9;
		string balance = 10;
		string ngr = 11;
		string game_provider_rs = 12;
		string third_party_fees = 13;
		string adjustments = 14;
		string est_net_profit = 15;
		string revenue_share_system = 16;
		string revenue_share_operator = 17;
		string est_net_costs = 18;
		string company_balance = 19;
		string player_balance = 20;
	}

	repeated BalanceSummary balances = 1;
	int32 total_count = 2;
	int32 page = 3;
	int32 page_size = 4;
}

message GetTaxReportConfigRequest {
	string type = 1;
}

message GetTaxReportConfigResponse {
	// config is a json string
	// example:
	// {
	//	"report_type": {
	//		"horse_racing_tax_return": true,
	//		"sports_tax_return": true,
	//		"other_contingencies_tax_return": false
	//	}
	//	"timezone": "UTC+0",
	//	"report_generation_time": {
	//		"monthly": "2nd of each month",
	//		"quarterly": "2nd of each quarter", 
	//		"yearly": "2nd of each year"
	//	},
	//	"tax_currency": "ZAR",
	//	"user_registration_countries": ["US", "ZA", "TR", "VN"],
	//	"user_currencies": ["USD", "EUR", "INR", "ZAR", "USDT"],
	//  "vat_payable": 6.5,
	//  "tax_for_sportsbook": 6.5,
	//  "tax_for_other_contingencies": 6.5,
	//  "tax_for_horse_racing": 6.5,
	//	}
	string config = 1;
}

message UpdateTaxReportConfigRequest {
	// type: south_afirca
	string type = 1;
	// config is a json string
