		int64 id = 1;
		string operator_type = 2;
		string min_profit = 3;
		string max_profit = 4;
		string base_rate = 5;
		string promote = 6;
		string final_rate = 7;
		string description = 8;
		bool enabled = 9;
	}
	repeated RevenueShareRateConfig configs = 1;
}

message ListPaymentChannelFeesRequest {
	api.common.OperatorContextFilters operator_context_filters = 1;
	optional string period_key = 2;
	optional int64 invoice_id = 3;
	optional int32 page = 4;
	optional int32 page_size = 5;
}

message ListPaymentChannelFeesResponse {
