syntax = "proto3";

package api.backoffice.service.v1;

import "google/api/annotations.proto";
import "common/common.proto";
import "push/service/v1/push_otp.proto";

option go_package = "github.com/infigaming-com/meepo-api/backoffice/service/v1;v1";
option java_multiple_files = true;
option java_package = "api.backoffice.service.v1";

// BackofficeOTP service — OTP (One-Time Password) delivery configuration management.
//
// ## Architecture
// Provider  — "Which third-party service sends the OTP?" (credentials configured once)
// Binding   — "Which operator+country uses which provider?" (routing configuration)
// Template  — "What message content is sent?" (bound to a provider, per business scenario)
//
// ## Setup workflow
//
// Step 1: CreateOTPProvider — register a provider with credentials (once per account)
// Step 2: CreateOTPProviderBinding — bind provider to operator+country with priority
// Step 3: CreateOTPTemplate — create message templates per business scenario
// Step 4: (Automatic) SendOTP routes based on bindings
// Step 5: ListOTPSendLogs for auditing
//
// ## Permission model
// - Provider: owned by creator (owner_operator_id). Owner + ancestors can manage.
// - Binding: scoped to operator_id. Callers with authority over that operator can manage.
// - Lower-level operators can override upper-level by creating their own bindings.
service BackofficeOTP {
  // ====== Provider Management ======

  // CreateOTPProvider registers a third-party OTP delivery provider.
  // Provider stores credentials and config. Use bindings to assign it to operator+country.
  rpc CreateOTPProvider(CreateOTPProviderRequest) returns (api.push.service.v1.CreateOTPProviderResponse) {
    option (google.api.http) = {
      post: "/v1/backoffice/otp/provider/create"
      body: "*"
    };
  }

  // UpdateOTPProvider partially updates an existing OTP provider.
  // Only fields present in the request are updated.
  rpc UpdateOTPProvider(UpdateOTPProviderRequest) returns (api.push.service.v1.UpdateOTPProviderResponse) {
    option (google.api.http) = {
      post: "/v1/backoffice/otp/provider/update"
      body: "*"
    };
  }

  // DeleteOTPProvider permanently removes an OTP provider.
  // WARNING: Deleting a provider with active bindings will break OTP routing.
  rpc DeleteOTPProvider(DeleteOTPProviderRequest) returns (api.push.service.v1.DeleteOTPProviderResponse) {
    option (google.api.http) = {
      post: "/v1/backoffice/otp/provider/delete"
      body: "*"
    };
  }

  // GetOTPProvider retrieves a single OTP provider by ID.
  rpc GetOTPProvider(GetOTPProviderRequest) returns (api.push.service.v1.GetOTPProviderResponse) {
    option (google.api.http) = {
      post: "/v1/backoffice/otp/provider/get"
      body: "*"
    };
  }

  // ListOTPProviders lists OTP providers visible to the caller.
  rpc ListOTPProviders(ListOTPProvidersRequest) returns (api.push.service.v1.ListOTPProvidersResponse) {
    option (google.api.http) = {
      post: "/v1/backoffice/otp/provider/list"
      body: "*"
    };
  }

  // ====== Provider Binding Management ======

  // CreateOTPProviderBinding binds a provider to an operator+country for routing.
  rpc CreateOTPProviderBinding(CreateOTPProviderBindingRequest) returns (api.push.service.v1.CreateOTPProviderBindingResponse) {
    option (google.api.http) = {
      post: "/v1/backoffice/otp/provider-binding/create"
      body: "*"
    };
  }

  // UpdateOTPProviderBinding partially updates an existing binding.
  rpc UpdateOTPProviderBinding(UpdateOTPProviderBindingRequest) returns (api.push.service.v1.UpdateOTPProviderBindingResponse) {
    option (google.api.http) = {
      post: "/v1/backoffice/otp/provider-binding/update"
      body: "*"
    };
  }

  // DeleteOTPProviderBinding removes a provider binding.
  rpc DeleteOTPProviderBinding(DeleteOTPProviderBindingRequest) returns (api.push.service.v1.DeleteOTPProviderBindingResponse) {
    option (google.api.http) = {
      post: "/v1/backoffice/otp/provider-binding/delete"
      body: "*"
    };
  }

  // ListOTPProviderBindings lists provider bindings for the target operator.
  rpc ListOTPProviderBindings(ListOTPProviderBindingsRequest) returns (api.push.service.v1.ListOTPProviderBindingsResponse) {
    option (google.api.http) = {
      post: "/v1/backoffice/otp/provider-binding/list"
      body: "*"
    };
  }

  // ====== Template Management ======

  rpc CreateOTPTemplate(CreateOTPTemplateRequest) returns (api.push.service.v1.CreateOTPTemplateResponse) {
    option (google.api.http) = {
      post: "/v1/backoffice/otp/template/create"
      body: "*"
    };
  }

  rpc UpdateOTPTemplate(UpdateOTPTemplateRequest) returns (api.push.service.v1.UpdateOTPTemplateResponse) {
    option (google.api.http) = {
      post: "/v1/backoffice/otp/template/update"
      body: "*"
    };
  }

  rpc DeleteOTPTemplate(DeleteOTPTemplateRequest) returns (api.push.service.v1.DeleteOTPTemplateResponse) {
    option (google.api.http) = {
      post: "/v1/backoffice/otp/template/delete"
      body: "*"
    };
  }

  rpc GetOTPTemplate(GetOTPTemplateRequest) returns (api.push.service.v1.GetOTPTemplateResponse) {
    option (google.api.http) = {
      post: "/v1/backoffice/otp/template/get"
      body: "*"
    };
  }

  rpc ListOTPTemplates(ListOTPTemplatesRequest) returns (api.push.service.v1.ListOTPTemplatesResponse) {
    option (google.api.http) = {
      post: "/v1/backoffice/otp/template/list"
      body: "*"
    };
  }

  rpc SyncOTPTemplateStatus(SyncOTPTemplateStatusRequest) returns (api.push.service.v1.SyncOTPTemplateStatusResponse) {
    option (google.api.http) = {
      post: "/v1/backoffice/otp/template/sync-status"
      body: "*"
    };
  }

  // ====== Send Logs ======

  rpc ListOTPSendLogs(ListOTPSendLogsRequest) returns (api.push.service.v1.ListOTPSendLogsResponse) {
    option (google.api.http) = {
      post: "/v1/backoffice/otp/send-logs/list"
      body: "*"
    };
  }
}

// ============ Provider Management ============

// Register a third-party OTP delivery provider.
// Credentials are configured once; use bindings to assign to operator+country.
message CreateOTPProviderRequest {
  api.common.OperatorContext target_operator_context = 1;
  api.push.service.v1.OTPProviderType provider_type = 2;
  string name = 3;
  string credentials_json = 4;
  string config = 5;
  api.push.service.v1.OTPSendChannelStrategy send_channel_strategy = 6;
  repeated string supported_countries = 7;  // e.g. ["BR", "JP"], empty = all
}

// Partially update an existing OTP provider.
message UpdateOTPProviderRequest {
  api.common.OperatorContext target_operator_context = 1;
  int64 id = 2;
  optional string name = 3;
  optional string credentials_json = 4;
  optional string config = 5;
  optional api.push.service.v1.OTPSendChannelStrategy send_channel_strategy = 6;
  repeated string supported_countries = 7;
  optional bool clear_supported_countries = 8;  // true = clear (support all)
}

// Delete an OTP provider by ID.
message DeleteOTPProviderRequest {
  api.common.OperatorContext target_operator_context = 1;
  int64 id = 2;
}

// Get a single OTP provider by ID.
message GetOTPProviderRequest {
  api.common.OperatorContext target_operator_context = 1;
  int64 id = 2;
}

// List OTP providers visible to the caller.
message ListOTPProvidersRequest {
  api.common.OperatorContext target_operator_context = 1;
  optional api.push.service.v1.OTPProviderType provider_type = 2;
  optional string country = 3;  // Filter by supported country
  int32 page = 4;
  int32 page_size = 5;
}

// ============ Provider Binding Management ============

// Bind a provider to an operator+country for routing.
message CreateOTPProviderBindingRequest {
  api.common.OperatorContext target_operator_context = 1;
  int64 provider_id = 2;
  string country = 3;            // ISO 3166-1 alpha-2 or "global"
  bool enabled = 4;
  int32 priority = 5;
  repeated string phone_prefixes = 6;  // e.g. ["+5511", "+5521"], empty = no restriction
}

// Partially update a provider binding.
message UpdateOTPProviderBindingRequest {
  api.common.OperatorContext target_operator_context = 1;
  int64 id = 2;
  optional bool enabled = 3;
  optional int32 priority = 4;
  repeated string phone_prefixes = 5;
  optional bool clear_phone_prefixes = 6;  // true = clear prefix restriction
}

// Delete a provider binding.
message DeleteOTPProviderBindingRequest {
  api.common.OperatorContext target_operator_context = 1;
  int64 id = 2;
}

// List provider bindings for the target operator.
message ListOTPProviderBindingsRequest {
  api.common.OperatorContext target_operator_context = 1;
  optional string country = 2;
  optional int64 provider_id = 3;
  optional bool enabled = 4;
  int32 page = 5;
  int32 page_size = 6;
}

// ============ Template Management ============

message CreateOTPTemplateRequest {
  api.common.OperatorContext target_operator_context = 1;
  string country = 2;
  int64 provider_id = 3;
  string name = 4;
  api.push.service.v1.OTPTemplateType template_type = 5;
  string external_template_id = 6;
  string language = 7;
  string brand_name = 8;
  int32 code_length = 9;
  int32 code_ttl_seconds = 10;
  string extra_params = 11;
  bool enabled = 12;
}

message UpdateOTPTemplateRequest {
  api.common.OperatorContext target_operator_context = 1;
  int64 id = 2;
  optional string name = 3;
  optional string external_template_id = 4;
  optional string language = 5;
  optional string brand_name = 6;
  optional int32 code_length = 7;
  optional int32 code_ttl_seconds = 8;
  optional string extra_params = 9;
  optional bool enabled = 10;
}

message DeleteOTPTemplateRequest {
  api.common.OperatorContext target_operator_context = 1;
  int64 id = 2;
}

message GetOTPTemplateRequest {
  api.common.OperatorContext target_operator_context = 1;
  int64 id = 2;
}

message ListOTPTemplatesRequest {
  api.common.OperatorContext target_operator_context = 1;
  optional string country = 2;
  optional int64 provider_id = 3;
  optional api.push.service.v1.OTPTemplateType template_type = 4;
  optional bool enabled = 5;
  int32 page = 6;
  int32 page_size = 7;
}

message SyncOTPTemplateStatusRequest {
  api.common.OperatorContext target_operator_context = 1;
  int64 id = 2;
}

// ============ Send Logs ============

message ListOTPSendLogsRequest {
  api.common.OperatorContext target_operator_context = 1;
  optional int64 user_id = 2;
  optional string channel_used = 3;
  optional string status = 4;
  int64 start_time = 5;
  int64 end_time = 6;
  int32 page = 7;
  int32 page_size = 8;
}
