syntax = "proto3";

package api.backoffice.service.v1;

import "google/api/annotations.proto";
import "common/common.proto";
import "push/service/v1/push_otp.proto";

option go_package = "github.com/infigaming-com/meepo-api/backoffice/service/v1;v1";
option java_multiple_files = true;
option java_package = "api.backoffice.service.v1";

// BackofficeOTP service — OTP (One-Time Password) delivery configuration management.
//
// ## What is this service for?
// Meepo is a multi-tenant SaaS gaming platform. When end-users perform sensitive operations
// (registration, login, password reset, withdrawal), the platform sends OTP verification codes.
// OTP can be delivered via SMS, WhatsApp, Voice, or Email.
//
// This service allows backoffice administrators to configure HOW OTPs are delivered
// for each operator (tenant), per country. The configuration consists of three layers:
//
//   Provider  — "Which third-party service sends the OTP?" (e.g., EngageLab).
//               Stores API credentials and channel strategy. Created once, reusable.
//   Binding   — "Which operator+country uses which provider?"
//               Maps a provider to routing. Supports priority ordering and phone prefix filtering.
//   Template  — "What message content is sent?" (bound to a provider, per business scenario)
//
// ## Complete setup workflow
//
// Step 1: CreateOTPProvider
//   Register a third-party OTP delivery service with its credentials.
//   Example: EngageLab with dev_key/dev_secret, WhatsApp-first strategy.
//   → Credentials are configured once and can be reused across countries.
//
// Step 2: CreateOTPProviderBinding
//   Bind the provider to an operator+country for routing.
//   Example: Bind EngageLab to operator 1001, country "BR" with priority 0.
//   → Same provider can be bound to "JP", "global", etc. without re-entering credentials.
//   → Multiple providers per country are supported via priority ordering.
//
// Step 3: CreateOTPTemplate
//   Create message templates bound to the provider, one per business scenario.
//   Example: "login_otp" template using EngageLab template ID "T001" in Portuguese.
//
// Step 4: SyncOTPTemplateStatus
//   Some providers (EngageLab WhatsApp) require template approval. Call this to pull the
//   latest review status from the provider. Only approved templates can be used for sending.
//
// Step 5: (Automatic) SendOTP is called by internal services (e.g., user-service)
//   The push-service automatically routes to the correct provider (via binding) + template
//   based on the operator hierarchy, country, and business scenario.
//
// Step 6: ListOTPSendLogs
//   Query delivery history for auditing, debugging, or statistics.
//
// ## Routing chain (when SendOTP is called for a phone number)
//
// Provider binding resolution (first match wins):
//   For each level: operator → company → retailer → system (skip if ID=0):
//     1. (level_id, user's country, enabled=true) ORDER BY priority ASC
//     2. (level_id, "global",       enabled=true) ORDER BY priority ASC
//   Within each binding, phone_prefixes are checked (empty = match all).
//
// Template resolution (first match wins):
//   For each level: operator → company → retailer → system (skip if ID=0):
//     1. (level_id, country, template_type, language)
//     2. (level_id, country, template_type, "en")
//     3. (level_id, "global", template_type, language)
//     4. (level_id, "global", template_type, "en")
//
// ## Permission model
// All requests include target_operator_context. The backoffice validates that the
// authenticated admin has permission to operate on the target operator (hierarchy check).
// If target_operator_context is omitted, it defaults to the admin's own operator.
//
// - Provider: owned by creator (owner_operator_id). Owner + ancestors can manage.
// - Binding: scoped to target operator_id. Callers with authority over that operator can manage.
// - Lower-level operators can override upper-level config by creating their own bindings
//   with enabled=false to disable, or with their own provider to replace.
service BackofficeOTP {
  // ====== Provider Management ======

  // CreateOTPProvider registers a third-party OTP delivery provider.
  //
  // ## What is an OTP Provider?
  // A Provider is a connection to a third-party service (e.g., EngageLab) that can
  // deliver OTP codes via SMS, WhatsApp, or Voice. Each record stores:
  //   - The provider's API credentials (encrypted at rest, never returned in responses)
  //   - Which delivery channels to use and in what order (send_channel_strategy)
  //   - Which countries are supported (for binding validation)
  //
  // Credentials are configured once. Use CreateOTPProviderBinding to assign the provider
  // to specific operator+country combinations for routing.
  //
  // ## Example request body (HTTP POST /v1/backoffice/otp/provider/create)
  //
  // ```json
  // {
  //   "target_operator_context": { "operator_id": 1001 },
  //   "provider_type": "OTP_PROVIDER_TYPE_ENGAGELAB",
  //   "name": "EngageLab Main Account",
  //   "credentials_json": "{\"dev_key\":\"your_key\",\"dev_secret\":\"your_secret\"}",
  //   "config": "{}",
  //   "send_channel_strategy": "OTP_SEND_CHANNEL_STRATEGY_WHATSAPP_SMS",
  //   "supported_countries": ["BR", "JP"]
  // }
  // ```
  //
  // ## Response
  // Returns the created provider info (with has_credentials=true instead of actual credentials).
  //
  // ## Errors
  // - OTP_PROVIDER_ALREADY_EXISTS: duplicate provider
  // - SEND_OTP_NO_PROVIDER: credentials_json is missing or invalid
  rpc CreateOTPProvider(CreateOTPProviderRequest) returns (api.push.service.v1.CreateOTPProviderResponse) {
    option (google.api.http) = {
      post: "/v1/backoffice/otp/provider/create"
      body: "*"
    };
  }

  // UpdateOTPProvider partially updates an existing OTP provider.
  //
  // Only fields present in the request are updated; omitted fields remain unchanged.
  // After update, the provider routing cache is invalidated so changes take effect immediately.
  //
  // Common use cases:
  //   - Rotate credentials: set credentials_json with new keys
  //   - Change channel strategy: e.g., switch from WhatsApp-first to SMS-only
  //   - Update supported countries: set supported_countries or clear_supported_countries
  //
  // ## Errors
  // - OTP_PROVIDER_NOT_FOUND: no provider with the given ID
  rpc UpdateOTPProvider(UpdateOTPProviderRequest) returns (api.push.service.v1.UpdateOTPProviderResponse) {
    option (google.api.http) = {
      post: "/v1/backoffice/otp/provider/update"
      body: "*"
    };
  }

  // DeleteOTPProvider permanently removes an OTP provider.
  //
  // WARNING: Deleting a provider that still has bindings or templates bound to it will cause
  // those records to become orphaned — routing will skip them because the provider
  // credentials are gone. Best practice: delete bindings and templates first.
  //
  // ## Errors
  // - OTP_PROVIDER_NOT_FOUND: no provider with the given ID
  rpc DeleteOTPProvider(DeleteOTPProviderRequest) returns (api.push.service.v1.DeleteOTPProviderResponse) {
    option (google.api.http) = {
      post: "/v1/backoffice/otp/provider/delete"
      body: "*"
    };
  }

  // GetOTPProvider retrieves a single OTP provider by ID.
  //
  // Returns all provider fields except credentials (has_credentials=true/false is returned instead).
  //
  // ## Errors
  // - OTP_PROVIDER_NOT_FOUND: no provider with the given ID
  rpc GetOTPProvider(GetOTPProviderRequest) returns (api.push.service.v1.GetOTPProviderResponse) {
    option (google.api.http) = {
      post: "/v1/backoffice/otp/provider/get"
      body: "*"
    };
  }

  // ListOTPProviders lists OTP providers visible to the caller.
  //
  // Supports filtering by provider_type and supported country.
  // Results are scoped to the operator specified in target_operator_context.
  // Returns paginated results with total count.
  rpc ListOTPProviders(ListOTPProvidersRequest) returns (api.push.service.v1.ListOTPProvidersResponse) {
    option (google.api.http) = {
      post: "/v1/backoffice/otp/provider/list"
      body: "*"
    };
  }

  // ====== Provider Binding Management ======

  // CreateOTPProviderBinding binds a provider to an operator+country for routing.
  //
  // ## What is a Provider Binding?
  // A Binding maps a Provider to a specific (operator_id, country) combination.
  // It controls whether the provider is used (enabled), its priority relative to
  // other bindings for the same country, and optional phone number prefix filtering.
  //
  // ## Example: one provider, multiple countries
  // ```
  // 1. CreateOTPProvider → provider_id=100 (credentials entered once)
  // 2. CreateOTPProviderBinding { provider_id: 100, country: "BR", priority: 0 }
  // 3. CreateOTPProviderBinding { provider_id: 100, country: "JP", priority: 0 }
  // ```
  //
  // ## Example: same country, multiple providers with phone prefix routing
  // ```
  // Binding 1: provider=100, country="BR", priority=0, phone_prefixes=["+5511","+5521"]
  // Binding 2: provider=200, country="BR", priority=1, phone_prefixes=[]
  // → +5511xxx → matches Binding 1
  // → +5531xxx → skips Binding 1, matches Binding 2 (catch-all)
  // ```
  //
  // ## Example: lower-level operator overrides upper-level
  // ```
  // System binding: operator_id=0, provider=100, country="BR"
  // Operator 5001 creates: operator_id=5001, provider=200, country="BR"
  // → Operator 5001's users use provider 200 (operator level checked first)
  // ```
  //
  // ## Errors
  // - OTP_PROVIDER_NOT_FOUND: provider_id does not exist
  // - OTP_PROVIDER_BINDING_ALREADY_EXISTS: duplicate (operator_id, provider_id, country)
  // - OTP_PROVIDER_BINDING_INVALID_COUNTRY: country not in provider's supported_countries
  rpc CreateOTPProviderBinding(CreateOTPProviderBindingRequest) returns (api.push.service.v1.CreateOTPProviderBindingResponse) {
    option (google.api.http) = {
      post: "/v1/backoffice/otp/provider-binding/create"
      body: "*"
    };
  }

  // UpdateOTPProviderBinding partially updates an existing binding.
  //
  // Only fields present in the request are updated; omitted fields remain unchanged.
  // After update, the binding routing cache is invalidated so changes take effect immediately.
  //
  // Common use cases:
  //   - Disable a binding temporarily: set enabled=false
  //   - Change routing priority: set priority to new value
  //   - Add/change phone prefix filter: set phone_prefixes
  //   - Remove phone prefix filter: set clear_phone_prefixes=true
  //
  // ## Errors
  // - OTP_PROVIDER_BINDING_NOT_FOUND: no binding with the given ID
  rpc UpdateOTPProviderBinding(UpdateOTPProviderBindingRequest) returns (api.push.service.v1.UpdateOTPProviderBindingResponse) {
    option (google.api.http) = {
      post: "/v1/backoffice/otp/provider-binding/update"
      body: "*"
    };
  }

  // DeleteOTPProviderBinding permanently removes a provider binding.
  //
  // After deletion, routing will fall back to the next matching binding or the next
  // level in the operator hierarchy (company → retailer → system → "global").
  //
  // ## Errors
  // - OTP_PROVIDER_BINDING_NOT_FOUND: no binding with the given ID
  rpc DeleteOTPProviderBinding(DeleteOTPProviderBindingRequest) returns (api.push.service.v1.DeleteOTPProviderBindingResponse) {
    option (google.api.http) = {
      post: "/v1/backoffice/otp/provider-binding/delete"
      body: "*"
    };
  }

  // ListOTPProviderBindings lists provider bindings for the target operator.
  //
  // Supports filtering by country, provider_id, and enabled status.
  // Results are scoped to the operator specified in target_operator_context.
  // Returns paginated results with inline provider info for each binding.
  rpc ListOTPProviderBindings(ListOTPProviderBindingsRequest) returns (api.push.service.v1.ListOTPProviderBindingsResponse) {
    option (google.api.http) = {
      post: "/v1/backoffice/otp/provider-binding/list"
      body: "*"
    };
  }

  // ListOTPBindingCountries returns the distinct countries configured for an operator
  // via provider bindings.
  //
  // ## Use cases
  //   - Build a country selector UI showing which countries have OTP configured
  //   - Check OTP coverage: which countries are ready vs. missing
  //   - Dashboard statistics: how many countries are configured
  //
  // ## Example request (HTTP POST /v1/backoffice/otp/provider-binding/countries)
  // ```json
  // {
  //   "target_operator_context": { "operator_id": 1001 },
  //   "enabled": true
  // }
  // ```
  //
  // ## Example response
  // ```json
  // {
  //   "countries": ["BR", "JP", "global"],
  //   "total": 3
  // }
  // ```
  rpc ListOTPBindingCountries(ListOTPBindingCountriesRequest) returns (api.push.service.v1.ListOTPBindingCountriesResponse) {
    option (google.api.http) = {
      post: "/v1/backoffice/otp/provider-binding/countries"
      body: "*"
    };
  }

  // CheckOTPBindingCountry checks whether an operator has at least one enabled
  // provider binding for a specific country.
  //
  // ## Use cases
  //   - Pre-flight check before sending OTP: verify the country is configured
  //   - UI indicator: show green/red status per country
  //   - Onboarding validation: ensure OTP is set up before going live
  //
  // ## Example request (HTTP POST /v1/backoffice/otp/provider-binding/check-country)
  // ```json
  // {
  //   "target_operator_context": { "operator_id": 1001 },
  //   "country": "BR"
  // }
  // ```
  //
  // ## Example response
  // ```json
  // { "configured": true }
  // ```
  rpc CheckOTPBindingCountry(CheckOTPBindingCountryRequest) returns (api.push.service.v1.CheckOTPBindingCountryResponse) {
    option (google.api.http) = {
      post: "/v1/backoffice/otp/provider-binding/check-country"
      body: "*"
    };
  }

  // ====== Template Management ======

  // CreateOTPTemplate creates a message template bound to a specific OTP provider.
  //
  // ## What is an OTP Template?
  // A Template defines the message content sent to the end-user. It is bound to a
  // specific OTP Provider (created via CreateOTPProvider). Each template is scoped
  // to a business scenario (template_type) such as login, registration, or withdrawal.
  //
  // ## What is external_template_id?
  // This is the template ID assigned by the third-party provider (e.g., EngageLab).
  // You must first create the template on the provider's platform, then copy the ID here.
  //
  // ### How to get it (EngageLab):
  //   1. Log in to EngageLab console → OTP → Template Management
  //   2. Create a new template (choose SMS or WhatsApp channel)
  //   3. After creation (and approval for WhatsApp), copy the template ID
  //   4. Use that ID as external_template_id when calling this API
  //
  // ## Template Variables by Provider
  //
  // ### EngageLab (OTP_PROVIDER_TYPE_ENGAGELAB)
  //
  // Supported channels: SMS, WhatsApp, Voice.
  // Templates are created on the EngageLab Console (OTP → Template Management).
  // WhatsApp templates require approval before use — call SyncOTPTemplateStatus to check.
  //
  // | Variable | Source | Description |
  // |----------|--------|-------------|
  // | `code` | auto | OTP verification code, auto-injected by EngageLab. |
  // | `brand_name` | `brand_name` field | Brand name displayed in the message. |
  // | custom keys | `extra_params` JSON | Any additional key-value pairs (e.g. `{"app_name":"Meepo"}`). |
  //
  // ## Example request body (HTTP POST /v1/backoffice/otp/template/create)
  //
  // ```json
  // {
  //   "target_operator_context": { "operator_id": 1001 },
  //   "country": "BR",
  //   "provider_id": 166153951194906625,
  //   "name": "Brazil Login OTP",
  //   "template_type": "OTP_TEMPLATE_TYPE_LOGIN_OTP",
  //   "external_template_id": "T001",
  //   "language": "pt",
  //   "brand_name": "BetBrazil",
  //   "code_length": 6,
  //   "code_ttl_seconds": 300,
  //   "extra_params": "{}",
  //   "enabled": true
  // }
  // ```
  //
  // ## Constraints
  // - UNIQUE(operator_id, country, template_type, language): one template per scenario+language
  // - provider_id must reference an existing OTP provider
  //
  // ## Errors
  // - OTP_TEMPLATE_ALREADY_EXISTS: UNIQUE constraint violated
  rpc CreateOTPTemplate(CreateOTPTemplateRequest) returns (api.push.service.v1.CreateOTPTemplateResponse) {
    option (google.api.http) = {
      post: "/v1/backoffice/otp/template/create"
      body: "*"
    };
  }

  // UpdateOTPTemplate partially updates an existing OTP template.
  //
  // Only fields present in the request are updated; omitted fields remain unchanged.
  // After update, the template routing cache is invalidated so changes take effect immediately.
  //
  // Common use cases:
  //   - Switch to a new external template: set external_template_id
  //   - Update the brand name displayed in OTP messages: set brand_name
  //   - Disable a template temporarily: set enabled=false
  //
  // ## Errors
  // - OTP_TEMPLATE_NOT_FOUND: no template with the given ID
  rpc UpdateOTPTemplate(UpdateOTPTemplateRequest) returns (api.push.service.v1.UpdateOTPTemplateResponse) {
    option (google.api.http) = {
      post: "/v1/backoffice/otp/template/update"
      body: "*"
    };
  }

  // DeleteOTPTemplate permanently removes an OTP template.
  //
  // If the deleted template was the only match for a given operator+country+type+language,
  // the system will fall back to the next level in the routing chain.
  // If no template matches at all, SendOTP will return an OTP_TEMPLATE_NOT_FOUND error.
  //
  // ## Errors
  // - OTP_TEMPLATE_NOT_FOUND: no template with the given ID
  rpc DeleteOTPTemplate(DeleteOTPTemplateRequest) returns (api.push.service.v1.DeleteOTPTemplateResponse) {
    option (google.api.http) = {
      post: "/v1/backoffice/otp/template/delete"
      body: "*"
    };
  }

  // GetOTPTemplate retrieves a single OTP template by ID.
  //
  // Returns all template fields including review_status (for providers that require approval).
  //
  // ## Errors
  // - OTP_TEMPLATE_NOT_FOUND: no template with the given ID
  rpc GetOTPTemplate(GetOTPTemplateRequest) returns (api.push.service.v1.GetOTPTemplateResponse) {
    option (google.api.http) = {
      post: "/v1/backoffice/otp/template/get"
      body: "*"
    };
  }

  // ListOTPTemplates lists OTP templates with optional filters and pagination.
  //
  // Supports filtering by country, provider_id, template_type, and enabled status.
  // Results are scoped to the operator specified in target_operator_context.
  // Returns paginated results with total count.
  rpc ListOTPTemplates(ListOTPTemplatesRequest) returns (api.push.service.v1.ListOTPTemplatesResponse) {
    option (google.api.http) = {
      post: "/v1/backoffice/otp/template/list"
      body: "*"
    };
  }

  // SyncOTPTemplateStatus pulls the latest review status from the external provider.
  //
  // Some providers (e.g., EngageLab WhatsApp) require templates to be reviewed and approved
  // before they can be used. This RPC calls the provider's API to check the current status
  // and updates the local record's review_status field.
  //
  // ## Review status values (provider-specific)
  // EngageLab: 0=pending, 1=approved, 2=rejected
  //
  // ## When to call?
  // After creating a new WhatsApp template on the provider's platform, call this periodically
  // until the status changes to "approved". SMS templates typically don't require review.
  //
  // ## Errors
  // - OTP_TEMPLATE_NOT_FOUND: no template with the given ID
  // - SEND_OTP_FAILED: failed to query the provider's API (credentials invalid, network error, etc.)
  rpc SyncOTPTemplateStatus(SyncOTPTemplateStatusRequest) returns (api.push.service.v1.SyncOTPTemplateStatusResponse) {
    option (google.api.http) = {
      post: "/v1/backoffice/otp/template/sync-status"
      body: "*"
    };
  }

  // ====== Send Logs ======

  // ListOTPSendLogs queries OTP delivery history for auditing, debugging, or statistics.
  //
  // Each log records: who sent what, to whom, via which provider/template/channel,
  // and whether it succeeded or failed. Logs are immutable (append-only).
  //
  // ## Filters
  //   - user_id: filter by the end-user who triggered the OTP
  //   - channel_used: filter by delivery channel ("sms", "whatsapp", "voice", "email")
  //   - status: filter by delivery status ("sent", "failed")
  //   - start_time / end_time: time range filter (Unix milliseconds)
  //
  // ## Use cases
  //   - Debug a user's OTP delivery failure: filter by user_id + status="failed"
  //   - Audit all WhatsApp OTPs in the last 24h: filter by channel_used + time range
  //   - Monitor delivery success rate: aggregate by status over a time range
  rpc ListOTPSendLogs(ListOTPSendLogsRequest) returns (api.push.service.v1.ListOTPSendLogsResponse) {
    option (google.api.http) = {
      post: "/v1/backoffice/otp/send-logs/list"
      body: "*"
    };
  }
}

// ============ Provider Management ============

// Register a third-party OTP delivery provider.
// Credentials are configured once; use CreateOTPProviderBinding to assign to operator+country.
// credentials_json is required and must be valid JSON for the chosen provider_type.
message CreateOTPProviderRequest {
  // Target operator context for permission check.
  // The provider's owner_operator_id will be set to the target operator's ID.
  api.common.OperatorContext target_operator_context = 1;
  // Third-party provider type: OTP_PROVIDER_TYPE_ENGAGELAB (SMS, WhatsApp, Voice)
  api.push.service.v1.OTPProviderType provider_type = 2;
  // Human-readable display name (e.g., "EngageLab Main Account")
  string name = 3;
  // Plain JSON with provider-specific credentials (encrypted before storage).
  // EngageLab example: {"dev_key":"your_key","dev_secret":"your_secret"}
  string credentials_json = 4;
  // JSON string of non-sensitive config (base_url, timeouts, etc.). Optional.
  string config = 5;
  // Channel delivery order:
  // OTP_SEND_CHANNEL_STRATEGY_SMS (SMS only),
  // OTP_SEND_CHANNEL_STRATEGY_WHATSAPP_SMS (WhatsApp first, fallback to SMS),
  // OTP_SEND_CHANNEL_STRATEGY_WHATSAPP_SMS_VOICE (WhatsApp → SMS → Voice)
  api.push.service.v1.OTPSendChannelStrategy send_channel_strategy = 6;
  // Countries this provider supports (e.g., ["BR", "JP"]). Empty = all countries.
  // When creating a binding, the binding's country must be in this list (or list is empty).
  repeated string supported_countries = 7;
}

// Partially update an existing OTP provider.
// Only provided (non-nil) fields are updated; omitted fields remain unchanged.
message UpdateOTPProviderRequest {
  // Target operator context for permission check.
  api.common.OperatorContext target_operator_context = 1;
  // Provider ID to update
  int64 id = 2;
  // New display name (optional)
  optional string name = 3;
  // New credentials, will be re-encrypted before storage (optional)
  optional string credentials_json = 4;
  // New non-sensitive config JSON (optional)
  optional string config = 5;
  // New channel delivery strategy (optional)
  optional api.push.service.v1.OTPSendChannelStrategy send_channel_strategy = 6;
  // New supported countries list. Ignored if empty and clear_supported_countries is false.
  repeated string supported_countries = 7;
  // Set to true to clear supported_countries (provider will support all countries).
  // Takes precedence over supported_countries field.
  optional bool clear_supported_countries = 8;
}

// Permanently delete an OTP provider by ID.
// Associated bindings and templates are NOT automatically deleted — clean them up first.
message DeleteOTPProviderRequest {
  // Target operator context for permission check.
  api.common.OperatorContext target_operator_context = 1;
  // Provider ID to delete
  int64 id = 2;
}

// Get a single OTP provider by ID.
// Credentials are never returned; use has_credentials in the response to check if they are set.
message GetOTPProviderRequest {
  // Target operator context for permission check.
  api.common.OperatorContext target_operator_context = 1;
  // Provider ID to retrieve
  int64 id = 2;
}

// List OTP providers with optional filters and pagination.
// Results are scoped to the operator in target_operator_context.
message ListOTPProvidersRequest {
  // Target operator context for ownership scoping.
  api.common.OperatorContext target_operator_context = 1;
  // Filter by provider type (optional)
  optional api.push.service.v1.OTPProviderType provider_type = 2;
  // Filter by supported country: returns providers whose supported_countries includes
  // this country OR whose supported_countries is empty (supports all). Optional.
  optional string country = 3;
  // Page number (1-based, default 1)
  int32 page = 4;
  // Items per page (default 20, max 100)
  int32 page_size = 5;
}

// ============ Provider Binding Management ============

// Bind a provider to an operator+country for routing.
// UNIQUE(operator_id, provider_id, country): one binding per provider per operator+country.
message CreateOTPProviderBindingRequest {
  // Target operator context for permission check.
  // The binding's operator_id will be set to the target operator's ID.
  api.common.OperatorContext target_operator_context = 1;
  // Provider to bind (must exist)
  int64 provider_id = 2;
  // ISO 3166-1 alpha-2 (e.g., "BR"), or "global" for default fallback
  string country = 3;
  // Whether this binding is active for routing
  bool enabled = 4;
  // Routing priority within same (operator_id, country). Lower = higher priority (e.g., 0 > 1 > 2).
  int32 priority = 5;
  // Phone number prefix filter. e.g., ["+5511", "+5521"]. Empty = matches all numbers.
  // Enables number-segment routing: different providers for different area codes.
  repeated string phone_prefixes = 6;
}

// Partially update a provider binding.
// Only provided (non-nil) fields are updated; omitted fields remain unchanged.
message UpdateOTPProviderBindingRequest {
  // Target operator context for permission check.
  api.common.OperatorContext target_operator_context = 1;
  // Binding ID to update
  int64 id = 2;
  // Enable/disable for routing (optional)
  optional bool enabled = 3;
  // New routing priority (optional)
  optional int32 priority = 4;
  // New phone prefix filter. Ignored if empty and clear_phone_prefixes is false.
  repeated string phone_prefixes = 5;
  // Set to true to clear phone_prefixes (match all numbers).
  // Takes precedence over phone_prefixes field.
  optional bool clear_phone_prefixes = 6;
}

// Permanently delete a provider binding.
message DeleteOTPProviderBindingRequest {
  // Target operator context for permission check.
  api.common.OperatorContext target_operator_context = 1;
  // Binding ID to delete
  int64 id = 2;
}

// List provider bindings with optional filters and pagination.
// Results are scoped to the operator in target_operator_context.
// Each binding includes inline provider info for display convenience.
message ListOTPProviderBindingsRequest {
  // Target operator context for ownership scoping.
  api.common.OperatorContext target_operator_context = 1;
  // Filter by country code (e.g., "BR") or "global" (optional)
  optional string country = 2;
  // Filter by associated provider ID (optional)
  optional int64 provider_id = 3;
  // Filter by enabled status (optional)
  optional bool enabled = 4;
  // Page number (1-based, default 1)
  int32 page = 5;
  // Items per page (default 20, max 100)
  int32 page_size = 6;
}

// Get distinct countries configured for an operator via provider bindings.
message ListOTPBindingCountriesRequest {
  // Target operator context for ownership scoping.
  api.common.OperatorContext target_operator_context = 1;
  // If set, only count bindings with this enabled status
  optional bool enabled = 2;
}

// Check whether an operator has at least one enabled binding for a specific country.
message CheckOTPBindingCountryRequest {
  // Target operator context for ownership scoping.
  api.common.OperatorContext target_operator_context = 1;
  // ISO 3166-1 alpha-2 country code or "global"
  string country = 2;
}

// ============ Template Management ============

// Create a message template bound to a specific OTP provider.
// UNIQUE(operator_id, country, template_type, language): one template per scenario per language.
// provider_id must reference an existing OTP provider (created via CreateOTPProvider).
// external_template_id is required for SMS/WhatsApp providers.
message CreateOTPTemplateRequest {
  // Target operator context for permission check.
  api.common.OperatorContext target_operator_context = 1;
  // ISO 3166-1 alpha-2 country code (e.g., "BR"), or "global" for default fallback
  string country = 2;
  // ID of the OTP provider this template belongs to
  int64 provider_id = 3;
  // Human-readable display name (e.g., "Brazil Login OTP - Portuguese")
  string name = 4;
  // Business scenario this template serves:
  // OTP_TEMPLATE_TYPE_EMAIL_VERIFICATION, OTP_TEMPLATE_TYPE_LOGIN_OTP,
  // OTP_TEMPLATE_TYPE_PASSWORD_RESET, OTP_TEMPLATE_TYPE_WITHDRAWAL_CONFIRM
  api.push.service.v1.OTPTemplateType template_type = 5;
  // Template ID from the third-party provider's platform.
  // For EngageLab: find it in Console → OTP → Template Management.
  string external_template_id = 6;
  // BCP-47 language code (e.g., "en", "pt", "zh")
  string language = 7;
  // Brand name injected into OTP messages (e.g., "BetBrazil"). Passed as template variable.
  string brand_name = 8;
  // OTP code length, informational only (default 6). Actual code is generated by user-service.
  int32 code_length = 9;
  // OTP code TTL in seconds, informational only (default 900). Actual TTL enforced by user-service.
  int32 code_ttl_seconds = 10;
  // JSON string of additional template variables (e.g., '{"app_name":"Meepo"}')
  string extra_params = 11;
  // Whether this template is active for routing. Disabled templates are skipped during resolution.
  bool enabled = 12;
}

// Partially update an existing OTP template.
// Only provided (non-nil) fields are updated; omitted fields remain unchanged.
message UpdateOTPTemplateRequest {
  // Target operator context for permission check.
  api.common.OperatorContext target_operator_context = 1;
  // Template ID to update
  int64 id = 2;
  // New display name (optional)
  optional string name = 3;
  // New external template ID (optional)
  optional string external_template_id = 4;
  // New language code (optional). Changes routing key — ensure no UNIQUE conflict.
  optional string language = 5;
  // New brand name for message content (optional)
  optional string brand_name = 6;
  // New code length, informational (optional)
  optional int32 code_length = 7;
  // New code TTL in seconds, informational (optional)
  optional int32 code_ttl_seconds = 8;
  // New extra template variables JSON string (optional)
  optional string extra_params = 9;
  // Enable/disable for routing (optional)
  optional bool enabled = 10;
}

// Permanently delete an OTP template by ID.
message DeleteOTPTemplateRequest {
  // Target operator context for permission check.
  api.common.OperatorContext target_operator_context = 1;
  // Template ID to delete
  int64 id = 2;
}

// Get a single OTP template by ID.
message GetOTPTemplateRequest {
  // Target operator context for permission check.
  api.common.OperatorContext target_operator_context = 1;
  // Template ID to retrieve
  int64 id = 2;
}

// List OTP templates with optional filters and pagination.
// Results are scoped to the operator in target_operator_context.
message ListOTPTemplatesRequest {
  // Target operator context for ownership scoping.
  api.common.OperatorContext target_operator_context = 1;
  // Filter by country code (e.g., "BR") or "global" (optional)
  optional string country = 2;
  // Filter by associated provider ID (optional)
  optional int64 provider_id = 3;
  // Filter by business scenario (optional)
  optional api.push.service.v1.OTPTemplateType template_type = 4;
  // Filter by enabled status (optional)
  optional bool enabled = 5;
  // Page number (1-based, default 1)
  int32 page = 6;
  // Items per page (default 20, max 100)
  int32 page_size = 7;
}

// Pull the review status for a template from the external provider.
message SyncOTPTemplateStatusRequest {
  // Target operator context for permission check.
  api.common.OperatorContext target_operator_context = 1;
  // Template ID to sync status for
  int64 id = 2;
}

// ============ Send Logs ============

// Query OTP delivery history with filters and pagination.
message ListOTPSendLogsRequest {
  // Target operator context for ownership scoping.
  api.common.OperatorContext target_operator_context = 1;
  // Filter by end-user ID who triggered the OTP (optional)
  optional int64 user_id = 2;
  // Filter by delivery channel: "sms", "whatsapp", "voice", "email" (optional)
  optional string channel_used = 3;
  // Filter by delivery status: "sent", "failed" (optional)
  optional string status = 4;
  // Start of time range (Unix milliseconds, inclusive)
  int64 start_time = 5;
  // End of time range (Unix milliseconds, inclusive)
  int64 end_time = 6;
  // Page number (1-based, default 1)
  int32 page = 7;
  // Items per page (default 20, max 100)
  int32 page_size = 8;
}
