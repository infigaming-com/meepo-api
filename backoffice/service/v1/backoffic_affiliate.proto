// -------------- Global Postback --------------

message CreateGlobalPostbackRequest {
	api.common.OperatorContext target_operator_context = 1;
	// Max 60 characters
	string postback_name = 2;
	// "active" or "inactive"
	string status = 3;
	// "register", "deposit", "first_deposit", "withdrawal", "game_start", "game_bet"
	string action_type = 4;
	// URL template with macros, max 2000 chars, must start with http(s)://
	string postback_url = 5;
	// "GET" or "POST"
	string request_method = 6;
	// POST body template with macros (only when method=POST, not URL-encoded)
	string post_body = 7;
	// "aff", "ref", "direct_reg" (empty = all)
	repeated string traffic_sources = 8;
	// Affiliate IDs to filter (empty = all). Only when traffic_sources contains "aff"
	repeated int64 affiliate_whitelist = 9;
	// Referrer user IDs to filter (empty = all). Only when traffic_sources contains "ref"
	repeated int64 referral_whitelist = 10;
}

message UpdateGlobalPostbackRequest {
	int64 global_postback_id = 1;
	api.common.OperatorContext target_operator_context = 2;
	// Max 60 characters
	string postback_name = 3;
	// "active" or "inactive"
	string status = 4;
	// "register", "deposit", "first_deposit", "withdrawal", "game_start", "game_bet"
	string action_type = 5;
	// URL template with macros, max 2000 chars
	string postback_url = 6;
	// "GET" or "POST"
	string request_method = 7;
	// POST body template with macros (only when method=POST)
	string post_body = 8;
	// "aff", "ref", "direct_reg" (empty = all)
	repeated string traffic_sources = 9;
	// Affiliate IDs to filter (empty = all)
	repeated int64 affiliate_whitelist = 10;
	// Referrer user IDs to filter (empty = all)
	repeated int64 referral_whitelist = 11;
}

message DeleteGlobalPostbackRequest {
	int64 global_postback_id = 1;
	api.common.OperatorContext target_operator_context = 2;
}

message GetGlobalPostbackRequest {
	int64 global_postback_id = 1;
	api.common.OperatorContext target_operator_context = 2;
}

message ListGlobalPostbacksRequest {
	api.common.OperatorContext target_operator_context = 1;
	// "active" or "inactive" (empty = all)
	optional string status = 2;
	optional int32 page = 3;
	optional int32 page_size = 4;
}

message ListGlobalPostbackLogsRequest {
	api.common.OperatorContext target_operator_context = 1;
	// Unix milliseconds
	optional int64 start_time = 2;
	// Unix milliseconds
	optional int64 end_time = 3;
	optional int32 page = 4;
	optional int32 page_size = 5;
	// "register", "deposit", "first_deposit", "withdrawal", "game_start", "game_bet"
	optional string action_type = 6;
	optional bool success = 7;
}

message SimulateGlobalPostbackRequest {
	// URL template (e.g. "https://example.com/cb?uid={user_id}")
	string postback_url = 1;
	// "GET" or "POST"
	string request_method = 2;
	// POST body template (only when method=POST)
	string post_body = 3;
	// Macro values without braces (e.g. {"user_id": "123"})
	map<string, string> macro_values = 4;
}