syntax = "proto3";

package api.backoffice.service.v1;

import "google/api/annotations.proto";
import "affiliate/service/v1/commission_plan.proto";
import "affiliate/service/v1/affiliate.proto";
import "affiliate/service/v1/referral_plan.proto";
import "common/common.proto";

option go_package = "github.com/infigaming-com/meepo-api/backoffice/service/v1;v1";
option java_multiple_files = true;
option java_package = "api.backoffice.service.v1";

import "google/protobuf/timestamp.proto";

service BackofficeAffiliate {
	
	// -------------- Commission Plan --------------

	// Create a new affiliate commission plan
	rpc CreateCommissionPlan(CreateCommissionPlanRequest) returns (api.affiliate.service.v1.CreateCommissionPlanResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/affiliate/commission/plan/create"
			body: "*"
		};
	}
    // Update an existing commission plan
    rpc UpdateCommissionPlan(UpdateCommissionPlanRequest) returns (api.affiliate.service.v1.UpdateCommissionPlanResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/affiliate/commission/plan/update"
			body: "*"
		};
	}
	// Get a commission plan by ID
	rpc GetCommissionPlan(GetCommissionPlanRequest) returns (api.affiliate.service.v1.GetCommissionPlanResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/affiliate/commission/plan/get"
			body: "*"
		};
	}
	// List commission plans with pagination and filters
	rpc ListCommissionPlans(ListCommissionPlansRequest) returns (api.affiliate.service.v1.ListCommissionPlansResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/affiliate/commission/plan/list"
			body: "*"
		};
	}
	// Delete a commission plan
	rpc DeleteCommissionPlan(DeleteCommissionPlanRequest) returns (api.affiliate.service.v1.DeleteCommissionPlanResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/affiliate/commission/plan/delete"
			body: "*"
		};
	}
	// List all commission plans across the operator hierarchy
	rpc ListAllCommissionPlans(ListAllCommissionPlansRequest) returns (api.affiliate.service.v1.ListAllCommissionPlansResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/affiliate/commission/plan/list/all"
			body: "*"
		};
	}
	// List commission plans assigned to a specific affiliate
	rpc ListAffiliateCommissionPlans(ListAffiliateCommissionPlansRequest) returns (api.affiliate.service.v1.ListAffiliateCommissionPlansResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/affiliate/commission/plan/list/affiliate"
			body: "*"
		};
	}

	// -------------- Affiliate --------------

	// Create a new affiliate account
	rpc CreateAffiliate(CreateAffiliateRequest) returns (api.affiliate.service.v1.CreateAffiliateResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/affiliate/create"
			body: "*"
		};
	}
	// Update an existing affiliate's details
	rpc UpdateAffiliate(UpdateAffiliateRequest) returns (api.affiliate.service.v1.UpdateAffiliateResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/affiliate/update"
			body: "*"
		};
	}
	// List affiliates with pagination and filters
	rpc ListAffiliates(ListAffiliatesRequest) returns (api.affiliate.service.v1.ListAffiliatesResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/affiliate/list"
			body: "*"
		};
	}
	// Delete an affiliate (soft delete)
	rpc DeleteAffiliate(DeleteAffiliateRequest) returns (api.affiliate.service.v1.DeleteAffiliateResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/affiliate/delete"
			body: "*"
		};
	}
	// Get detailed information about a specific affiliate
	rpc GetAffiliateDetails(GetAffiliateDetailsRequest) returns (api.affiliate.service.v1.GetAffiliateDetailsResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/affiliate/get/details"
			body: "*"
		};
	}
	// Reset an affiliate's password
	rpc ResetAffiliatePassword(ResetAffiliatePasswordRequest) returns (api.affiliate.service.v1.ResetAffiliatePasswordResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/affiliate/reset-password"
			body: "*"
		};
	}
	// Send account credentials email to an affiliate
	rpc SendAffiliateAccountEmail(SendAffiliateAccountEmailRequest) returns (SendAffiliateAccountEmailResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/affiliate/send-account-email"
			body: "*"
		};
	}

	// -------------- Campaign --------------

	// Create a new affiliate campaign
	rpc CreateCampaign(CreateCampaignRequest) returns (api.affiliate.service.v1.CreateCampaignResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/affiliate/campaign/create"
			body: "*"
		};
	}
	// Update an existing affiliate campaign
	rpc UpdateCampaign(UpdateCampaignRequest) returns (api.affiliate.service.v1.UpdateCampaignResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/affiliate/campaign/update"
			body: "*"
		};
	}
	// List affiliate campaigns with pagination and filters
	rpc ListCampaigns(ListCampaignsRequest) returns (api.affiliate.service.v1.ListCampaignsResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/affiliate/campaign/list"
			body: "*"
		};
	}
	// List campaigns belonging to a specific affiliate
	rpc ListAffiliateCampaigns(ListAffiliateCampaignsRequest) returns (api.affiliate.service.v1.ListCampaignsResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/affiliate/campaign/list/by_affiliate"
			body: "*"
		};
	}
	// Delete an affiliate campaign
	rpc DeleteCampaign(DeleteCampaignRequest) returns (api.affiliate.service.v1.DeleteCampaignResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/affiliate/campaign/delete"
			body: "*"
		};
	}

	// -------------- Postback --------------

	// Create a new affiliate postback
	rpc CreatePostback(CreatePostbackRequest) returns (api.affiliate.service.v1.CreatePostbackResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/affiliate/postback/create"
			body: "*"
		};
	}

	// Update an existing affiliate postback
	rpc UpdatePostback(UpdatePostbackRequest) returns (api.affiliate.service.v1.UpdatePostbackResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/affiliate/postback/update"
			body: "*"
		};
	}

	// Delete an affiliate postback
	rpc DeletePostback(DeletePostbackRequest) returns (api.affiliate.service.v1.DeletePostbackResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/affiliate/postback/delete"
			body: "*"
		};
	}

	// List affiliate postbacks with pagination and status filter
	rpc ListPostbacks(ListPostbacksRequest) returns (api.affiliate.service.v1.ListPostbacksResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/affiliate/postback/list"
			body: "*"
		};
	}

	// List affiliate postback execution logs
	rpc ListPostbackLogs(ListPostbackLogsRequest) returns (api.affiliate.service.v1.ListPostbackLogsResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/affiliate/postback/log/list"
			body: "*"
		};
	}

	// -------------- Affiliate Domain --------------

	// List affiliate tracking domains for a target operator
	rpc ListAffiliateDomains(ListAffiliateDomainsRequest) returns (api.affiliate.service.v1.ListAffiliateDomainsResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/affiliate/domain/list"
			body: "*"
		};
	}

	// Create or update an affiliate tracking domain
	rpc SetAffiliateDomain(SetAffiliateDomainRequest) returns (api.affiliate.service.v1.SetAffiliateDomainResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/affiliate/domain/set"
			body: "*"
		};
	}

	// -------------- Event --------------

	// List affiliate events (registrations, deposits, etc.) with filters
	rpc ListEvents(ListEventsRequest) returns (api.affiliate.service.v1.ListEventsResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/affiliate/event/list"
			body: "*"
		};
	}

	// -------------- Commission --------------

	// List affiliate commissions with pagination and filters
	rpc ListCommissions(ListCommissionsRequest) returns (api.affiliate.service.v1.ListCommissionsResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/affiliate/commission/list"
			body: "*"
		};
	}

	// -------------- User --------------

	// List users acquired through affiliates
	rpc ListAffiliateUsers(ListAffiliateUsersRequest) returns (api.affiliate.service.v1.ListUsersResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/affiliate/user/list"
			body: "*"
		};
	}

	// Export affiliate users to CSV, Excel, or PDF
	rpc ExportAffiliateUsers(ExportAffiliateUsersRequest) returns (api.affiliate.service.v1.ExportUsersResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/affiliate/user/export"
			body: "*"
		};
	}

	// -------------- Affiliate Bill --------------

	// List affiliate billing records
	rpc ListAffiliateBills(ListAffiliateBillsRequest) returns (api.affiliate.service.v1.ListAffiliateBillsResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/affiliate/bill/list"
			body: "*"
		};
	}

	// -------------- Settings --------------

	// Get affiliate operator-level settings
	rpc GetAffiliateOperatorSettings(GetAffiliateOperatorSettingsRequest) returns (api.affiliate.service.v1.GetOperatorSettingsResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/affiliate/operator/settings/get"
			body: "*"
		};
	}
	
	// Update affiliate operator-level settings
	rpc UpdateAffiliateOperatorSettings(UpdateAffiliateOperatorSettingsRequest) returns (api.affiliate.service.v1.UpdateOperatorSettingsResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/affiliate/operator/settings/update"
			body: "*"
		};
	}

	// -------------- Referral Plan --------------

	// Create or update a referral plan for a target operator
	rpc SetReferralPlan(SetReferralPlanRequest) returns (api.affiliate.service.v1.SetReferralPlanResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/referral/plan/set"
			body: "*"
		};
	}

	// Get referral plan for a target operator and currency
	rpc GetReferralPlan(GetReferralPlanRequest) returns (api.affiliate.service.v1.GetReferralPlanResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/referral/plan/get"
			body: "*"
		};
	}

	// -------------- Landing Template --------------

	// Create a new landing page template
	rpc CreateLandingTemplate(CreateLandingTemplateRequest) returns (api.affiliate.service.v1.CreateLandingTemplateResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/affiliate/landing-template/create"
			body: "*"
		};
	}

	// Update an existing landing page template
	rpc UpdateLandingTemplate(UpdateLandingTemplateRequest) returns (api.affiliate.service.v1.UpdateLandingTemplateResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/affiliate/landing-template/update"
			body: "*"
		};
	}

	// Delete a landing page template
	rpc DeleteLandingTemplate(DeleteLandingTemplateRequest) returns (api.affiliate.service.v1.DeleteLandingTemplateResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/affiliate/landing-template/delete"
			body: "*"
		};
	}

	// List landing page templates for a target operator
	rpc ListLandingTemplates(ListLandingTemplatesRequest) returns (api.affiliate.service.v1.ListLandingTemplatesResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/affiliate/landing-template/list"
			body: "*"
		};
	}

	// List landing page templates associated with a specific campaign
	rpc ListLandingTemplatesByCampaign(ListLandingTemplatesByCampaignRequest) returns (api.affiliate.service.v1.ListLandingTemplatesByCampaignResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/affiliate/landing-template/list/by-campaign"
			body: "*"
		};
	}

	// -------------- Dashboard --------------

	// Get aggregate affiliate dashboard metrics for a time range
	rpc GetAffiliateDashboard(GetAffiliateDashboardRequest) returns (api.affiliate.service.v1.GetAffiliateDashboardResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/affiliate/dashboard/get"
			body: "*"
		};
	}

	// Get affiliate trend data grouped by day, week, or month
	rpc GetAffiliateTrend(GetAffiliateTrendRequest) returns (api.affiliate.service.v1.GetAffiliateTrendResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/affiliate/dashboard/trend/get"
			body: "*"
		};
	}

	// -------------- Sub-Account Management --------------

	// Create a sub-account for an affiliate
	rpc CreateAffiliateSubAccount(CreateAffiliateSubAccountRequest) returns (api.affiliate.service.v1.CreateAffiliateSubAccountResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/affiliate/sub-account/create"
			body: "*"
		};
	}

	// List sub-accounts of an affiliate
	rpc ListAffiliateSubAccounts(ListAffiliateSubAccountsRequest) returns (api.affiliate.service.v1.ListAffiliateSubAccountsResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/affiliate/sub-account/list"
			body: "*"
		};
	}

	// Update an affiliate sub-account (enable/disable, reset password, 2FA)
	rpc UpdateAffiliateSubAccount(UpdateAffiliateSubAccountRequest) returns (UpdateAffiliateSubAccountResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/affiliate/sub-account/update"
			body: "*"
		};
	}

	// -------------- Global Postback --------------

	// Create a new operator-level global postback configuration
	rpc CreateGlobalPostback(CreateGlobalPostbackRequest) returns (api.affiliate.service.v1.CreateGlobalPostbackResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/affiliate/global-postback/create"
			body: "*"
		};
	}

	// Update an existing global postback configuration
	rpc UpdateGlobalPostback(UpdateGlobalPostbackRequest) returns (api.affiliate.service.v1.UpdateGlobalPostbackResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/affiliate/global-postback/update"
			body: "*"
		};
	}

	// Soft delete a global postback (sets hidden=true)
	rpc DeleteGlobalPostback(DeleteGlobalPostbackRequest) returns (api.affiliate.service.v1.DeleteGlobalPostbackResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/affiliate/global-postback/delete"
			body: "*"
		};
	}

	// Get a single global postback by ID, including resolved whitelist names
	rpc GetGlobalPostback(GetGlobalPostbackRequest) returns (api.affiliate.service.v1.GetGlobalPostbackResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/affiliate/global-postback/get"
			body: "*"
		};
	}

	// List global postbacks for a target operator with pagination and status counts
	rpc ListGlobalPostbacks(ListGlobalPostbacksRequest) returns (api.affiliate.service.v1.ListGlobalPostbacksResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/affiliate/global-postback/list"
			body: "*"
		};
	}

	// List global postback execution logs with optional filters (time range, action_type, success)
	rpc ListGlobalPostbackLogs(ListGlobalPostbackLogsRequest) returns (api.affiliate.service.v1.ListGlobalPostbackLogsResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/affiliate/global-postback/log/list"
			body: "*"
		};
	}

	// Simulate a global postback by sending a test HTTP request. Does not require a saved postback; URL and macros are passed directly.
	rpc SimulateGlobalPostback(SimulateGlobalPostbackRequest) returns (api.affiliate.service.v1.SimulateGlobalPostbackResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/affiliate/global-postback/simulate"
			body: "*"
		};
	}

}

// -------------- Commission Plan --------------

message CreateCommissionPlanRequest {
	string title = 1;
    string status = 2;
    string base_currency = 3;
    api.affiliate.service.v1.CommissionPlanConfig plan_config = 4;
}

message UpdateCommissionPlanRequest {
    string title = 1;
    string status = 2;
    string base_currency = 3;
    api.affiliate.service.v1.CommissionPlanConfig plan_config = 4;
	int64 commission_plan_id = 5;
}

message GetCommissionPlanRequest {
	int64 commission_plan_id = 1;
}

message ListCommissionPlansRequest {
	repeated string countries = 1;
	optional int64 affiliate_id = 2;
	optional int32 page = 3;
	optional int32 page_size = 4;
	optional string status = 5;
}

message DeleteCommissionPlanRequest {
	int64 commission_plan_id = 1;
	// Not supported yet
	optional int64 alternative_commission_plan_id = 2;
}

message ListAllCommissionPlansRequest {
	api.common.OperatorContext target_operator_context = 1;
	// Not supported yet
	repeated string countries = 2;
	optional string status = 3;
}

message ListAffiliateCommissionPlansRequest {
	optional int32 page = 1;
	optional int32 page_size = 2;
}

// -------------- Affiliate --------------

message CreateAffiliateRequest {
	api.affiliate.service.v1.AffiliateInfo affiliate = 1;
	api.common.OperatorContext target_operator_context = 2;
}

message UpdateAffiliateRequest {
	api.affiliate.service.v1.AffiliateInfo affiliate = 1;
	int64 affiliate_id = 2;
}

message ListAffiliatesRequest {
	repeated string countries = 1;
    // Not implemented
    repeated string traffic_source_ids = 2;
    // Not implemented
    repeated string teammate_ids = 3;
    // "pending", "active", or "inactive"
    string status = 4;
    optional int32 page = 5;
    optional int32 page_size = 6;
	api.common.OperatorContext target_operator_context = 7;
	// If nil, pagination is true
	optional bool pagination = 8;
}

message DeleteAffiliateRequest {
	int64 affiliate_id = 1;
}

message GetAffiliateDetailsRequest {
	int64 affiliate_id = 1;
}

message ResetAffiliatePasswordRequest {
	int64 affiliate_id = 1;
	string new_password = 2;
}

message SendAffiliateAccountEmailRequest {
	int64 affiliate_id = 1;
	string password = 2;
	api.common.OperatorContext target_operator_context = 3;
	// If provided, used as the backoffice login URL in the email.
	// If empty, falls back to operator's backoffice_subdomain from operator details.
	optional string backoffice_url = 4;
}

message SendAffiliateAccountEmailResponse {}

// -------------- Campaign --------------

message CreateCampaignRequest {
    message Campaign {
        string domain = 1;
        string campaign_name = 2;
        // "facebook", "tiktok", "kwai", "appsflyer", "adjust", "agency", or "google_ads"
        string channel_type = 3;
        api.affiliate.service.v1.ChannelConfig channel_config = 4;
    }
    Campaign campaign = 1;
    optional int64 target_affiliate_id = 2;
}

message UpdateCampaignRequest {
	int64 campaign_id = 1;
	optional api.affiliate.service.v1.Campaign campaign = 2;
	optional bool enabled = 3;
	optional int64 target_affiliate_id = 4;
	optional api.affiliate.service.v1.LandingPageSettings landing_page_settings = 5;
}

message ListCampaignsRequest {
    optional string campaign_name = 1;
    optional int64 campaign_id = 2;
	optional int64 affiliate_id = 3;
    optional bool enabled = 4;
    optional int32 page = 5;
    optional int32 page_size = 6;
	api.common.OperatorContextFilters operator_context_filters = 7;
	optional int64 target_affiliate_id = 8;
	// Target operator context for filtering campaigns under a specific operator
	optional api.common.OperatorContext target_operator_context = 9;
	// Filter by multiple affiliate IDs (mutually exclusive with affiliate_id)
	repeated int64 affiliate_ids = 10;
	// If false, returns all results without pagination; nil defaults to true
	optional bool pagination = 11;
}

message ListAffiliateCampaignsRequest {
    optional string campaign_name = 1;
    optional int64 campaign_id = 2;
	optional int64 affiliate_id = 3;
    optional bool enabled = 4;
    optional int32 page = 5;
    optional int32 page_size = 6;
}

message DeleteCampaignRequest {
	int64 campaign_id = 1;
	optional int64 target_affiliate_id = 2;
}

// -------------- Postback --------------

message CreatePostbackRequest {
    string postback_name = 1;
    // "active" or "inactive"
    string status = 2;
    repeated int64 campaign_ids = 3;
    // "register", "deposit", "first_deposit", "withdrawal", "game_start", or "game_bet"
    string action_type = 4;
    string postback_url = 5;
    // "GET" or "POST"
    string request_method = 6;
    optional int64 target_affiliate_id = 7;
}

message UpdatePostbackRequest {
    int64 postback_id = 1;
    string postback_name = 2;
    // "active" or "inactive"
    string status = 3;
    repeated int64 campaign_ids = 4;
    // "register", "deposit", "first_deposit", "withdrawal", "game_start", or "game_bet"
    string action_type = 5;
    string postback_url = 6;
    // "GET" or "POST"
    string request_method = 7;
    optional int64 target_affiliate_id = 8;
}

message DeletePostbackRequest {
    int64 postback_id = 1;
    optional int64 target_affiliate_id = 2;
}

message ListPostbacksRequest {
    optional int64 affiliate_id = 1;
	// "active" or "inactive"
	optional string status = 2;
    optional int32 page = 3;
    optional int32 page_size = 4;
    api.common.OperatorContextFilters operator_context_filters = 5;
    optional int64 target_affiliate_id = 6;
}

message ListPostbackLogsRequest {
    optional int64 affiliate_id = 1;
    google.protobuf.Timestamp start_time = 2;
    google.protobuf.Timestamp end_time = 3;
    optional int32 page = 4;
    optional int32 page_size = 5;
    api.common.OperatorContextFilters operator_context_filters = 6;
}

// -------------- Affiliate Domain --------------

message ListAffiliateDomainsRequest {
	api.common.OperatorContext target_operator_context = 1;
	optional int32 page = 2;
	optional int32 page_size = 3;
	optional int64 target_affiliate_id = 4;
}

message SetAffiliateDomainRequest {
	string domain = 1;
	optional bool available_to_all = 2;
	repeated int64 affiliate_ids = 3;
	api.common.OperatorContext target_operator_context = 4;
}

// -------------- Event --------------

message ListEventsRequest {
	optional int64 affiliate_id = 1;
	repeated string event_types = 2;
	repeated string countries = 3;
	repeated string currencies = 4;
	google.protobuf.Timestamp start_time = 5;
	google.protobuf.Timestamp end_time = 6;
	optional int32 page = 7;
	optional int32 page_size = 8;
	api.common.OperatorContextFilters operator_context_filters = 9;
	optional int64 event_id = 10;
}

// -------------- Commission --------------

message ListCommissionsRequest {
	// OR logic: filter by commission plan IDs, match if ID is any of these values
	repeated int64 commission_plan_ids = 1;
	optional int64 user_id = 2;
	optional int64 affiliate_id = 3;
	// "cpa", "revshare", "cpl", "cpc", "flat_fee" (multiple allowed)
	repeated string commission_subtypes = 4;
	repeated string countries = 5;
	optional int64 commission_id = 6;
	optional int64 bill_id = 7;
	google.protobuf.Timestamp start_time = 8;
	google.protobuf.Timestamp end_time = 9;
	// "pending", "approved", or "rejected"
	optional string status = 10;
	optional int32 page = 11;
	optional int32 page_size = 12;
	api.common.OperatorContextFilters operator_context_filters = 13;
}

// -------------- User --------------

message ListAffiliateUsersRequest {
	repeated string countries = 1;
	google.protobuf.Timestamp ftd_start_time = 2;
	google.protobuf.Timestamp ftd_end_time = 3;
	optional int64 affiliate_id = 4;
	google.protobuf.Timestamp registration_start_time = 5;
	google.protobuf.Timestamp registration_end_time = 6;
	optional int32 page = 7;
	optional int32 page_size = 8;
