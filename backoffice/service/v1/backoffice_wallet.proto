syntax = "proto3";

package api.backoffice.service.v1;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "common/common.proto";
import "wallet/service/v1/wallet.proto";
import "wallet/service/v1/promocode.proto";

option go_package = "github.com/infigaming-com/meepo-api/backoffice/service/v1;v1";
option java_multiple_files = true;
option java_package = "api.backoffice.service.v1";

service BackofficeWallet {
	// Get wallet balances for a user
	rpc GetWallets(GetWalletsRequest) returns (wallet.service.v1.GetWalletsResponse) {
        option (google.api.http) = {
            post: "/v1/backoffice/wallet/get"
            body: "*"
        };
    }
	// Get wallet credit/debit transaction history for a user
	rpc GetWalletCredits(GetWalletCreditsRequest) returns (GetWalletCreditsResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/wallet/credits/get"
			body: "*"
		};
	}
	// ListWalletBalanceTransactions provides balance transactions for a specific user in User transactions page.
	rpc ListWalletBalanceTransactions(ListWalletBalanceTransactionsRequest) returns (ListWalletBalanceTransactionsResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/wallet/balance-transactions/list"
			body: "*"
		};
	}
    // Get credit transaction details by credit ID
    rpc GetWalletCreditTransactions(GetWalletCreditTransactionsRequest) returns (GetWalletCreditTransactionsResponse) {
        option (google.api.http) = {
            post: "/v1/backoffice/wallet/credit-transactions/get"
            body: "*"
        };
    }
    // Update wallet settings (e.g. enable/disable a currency for a user)
    rpc UpdateWallet(UpdateWalletRequest) returns (UpdateWalletResponse) {
        option (google.api.http) = {
            post: "/v1/backoffice/wallet/update"
            body: "*"
        };
    }

	// Add a new currency to the wallet configuration
	rpc AddWalletCurrency(AddWalletCurrencyRequest) returns (AddWalletCurrencyResponse) {
		option (google.api.http) = {
            post: "/v1/backoffice/wallet/currencies/add"
            body: "*"
        };
	};

	// ListWalletCurrencies call ListCurrencies in wallet service with aggregated and parent fields
	rpc ListWalletCurrencies(ListWalletCurrenciesRequest) returns (wallet.service.v1.ListCurrenciesResponse) {
        option (google.api.http) = {
            post: "/v1/backoffice/wallet/currencies/list"
            body: "*"
        };
    }
	// Update wallet currency settings (visibility, icon, decimal places, etc.)
	rpc UpdateWalletCurrency(UpdateWalletCurrencyRequest) returns (wallet.service.v1.UpdateOperatorCurrencyResponse) {
        option (google.api.http) = {
            post: "/v1/backoffice/wallet/currencies/update"
            body: "*"
        };
    }
	// ListOperatorBalances lists all operator balances which belong to the backoffice operator
	rpc ListOperatorBalances(ListOperatorBalancesRequest) returns (wallet.service.v1.ListBottomOperatorBalancesResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/wallet/operator/balances/list"
			body: "*"
		};
	}

	// ListCompanyBalances lists all company operator balances, system-level only
	rpc ListCompanyBalances(ListCompanyBalancesRequest) returns (wallet.service.v1.ListCompanyOperatorBalancesResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/wallet/company/balances/list"
			body: "*"
		};
	}

	// Get exchange rates for specified currencies
	rpc GetExchangeRates(GetExchangeRatesRequest) returns (GetExchangeRatesResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/wallet/exchange-rates/get"
			body: "*"
		};
	}
	// OperatorTransfer transfers cash from one operator to its company operator, only allow USD, USDT, USDC, 1:1 exchange
	rpc OperatorTransfer(OperatorTransferRequest) returns (OperatorTransferResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/wallet/operator/transfer"
			body: "*"
		};
	}
	// OperatorSwap swaps cash between two balances of the same company's operator
	rpc OperatorSwap(OperatorSwapRequest) returns (OperatorSwapResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/wallet/operator/swap"
			body: "*"
		};
	}
	// OperatorFreeze freezes cash of an operator
	rpc OperatorBalanceFreeze(OperatorBalanceFreezeRequest) returns (OperatorBalanceFreezeResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/wallet/operator/balance-freeze"
			body: "*"
		};
	}
	// OperatorRollback rolls back frozen cash of an operator
	rpc OperatorBalanceRollback(OperatorBalanceRollbackRequest) returns (OperatorBalanceRollbackResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/wallet/operator/balance-rollback"
			body: "*"
		};
	}
	// OperatorSettle settles frozen cash of an operator
	rpc OperatorBalanceSettle(OperatorBalanceSettleRequest) returns (OperatorBalanceSettleResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/wallet/operator/balance-settle"
			body: "*"
		};
	}
	// OperatorBalanceAdjust manually adjusts an operator or company balance (system-level only)
	rpc OperatorBalanceAdjust(OperatorBalanceAdjustRequest) returns (OperatorBalanceAdjustResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/wallet/operator/balance-adjust"
			body: "*"
		};
	}
	// ListOperatorBalanceTransactions lists the balance transactions of an operator
	rpc ListOperatorBalanceTransactions(ListOperatorBalanceTransactionsRequest) returns (ListOperatorBalanceTransactionsResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/wallet/operator/transactions/list"
			body: "*"
		};
	}
	// UpdateOperatorBalance updates an operator balance， now only support update the enabled status
	rpc UpdateOperatorBalance(UpdateOperatorBalanceRequest) returns (UpdateOperatorBalanceResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/wallet/operator/balance/update"
			body: "*"
		};
	}
	// GetOperatorBalance gets the balances of an operator
	rpc GetOperatorBalance(GetOperatorBalanceRequest) returns (wallet.service.v1.GetOperatorBalanceResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/wallet/operator/balance/get"
			body: "*"
		};
	}
	// SetDepositRewardSequences sets the deposit reward sequences of a operator currency config
	rpc SetDepositRewardSequences(SetDepositRewardSequencesRequest) returns (wallet.service.v1.SetDepositRewardSequencesResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/wallet/deposit-reward/sequences/set"
			body: "*"
		};
	}
	// DeleteDepositRewardSequences deletes a deposit reward sequence of a operator currency config
	rpc DeleteDepositRewardSequences(DeleteDepositRewardSequencesRequest) returns (wallet.service.v1.DeleteDepositRewardSequencesResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/wallet/deposit-reward/sequences/delete"
			body: "*"
		};
	}
	// GetDepositRewardConfig returns the default and custom deposit reward config based on currency and operator context
	rpc GetDepositRewardConfig(GetDepositRewardConfigRequest) returns (wallet.service.v1.GetDepositRewardConfigResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/wallet/deposit-reward/config/get"
			body: "*"
		};
	}

	// Set app download reward config for a target operator
	rpc SetAppDownloadRewardConfig(SetAppDownloadRewardConfigRequest) returns (wallet.service.v1.SetAppDownloadRewardConfigResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/wallet/app-download-reward/config/set"
			body: "*"
		};
	}
	// Get app download reward config for a target operator
	rpc GetAppDownloadRewardConfig(GetAppDownloadRewardConfigRequest) returns (wallet.service.v1.GetAppDownloadRewardConfigResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/wallet/app-download-reward/config/get"
			body: "*"
		};
	}

	// CreatePromoCodeCampaign creates a new promo code campaign
	rpc CreatePromoCodeCampaign(CreatePromoCodeCampaignRequest) returns (wallet.service.v1.CreatePromoCodeCampaignResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/wallet/promo-code/campaign/create"
			body: "*"
		};
	}

	// UpdatePromoCodeCampaign updates an existing promo code campaign (cannot update status or code_type)
	rpc UpdatePromoCodeCampaign(UpdatePromoCodeCampaignRequest) returns (wallet.service.v1.UpdatePromoCodeCampaignResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/wallet/promo-code/campaign/update"
			body: "*"
		};
	}

	// UpdatePromoCodeCampaignStatus updates the status of a promo code campaign
	rpc UpdatePromoCodeCampaignStatus(UpdatePromoCodeCampaignStatusRequest) returns (wallet.service.v1.UpdatePromoCodeCampaignStatusResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/wallet/promo-code/campaign/status/update"
			body: "*"
		};
	}

	// ListPromoCodeCampaigns lists all promo code campaigns
	rpc ListPromoCodeCampaigns(ListPromoCodeCampaignsRequest) returns (wallet.service.v1.ListPromoCodeCampaignsResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/wallet/promo-code/campaigns/list"
			body: "*"
		};
	}

	// ListPromoCodeCampaignDetails lists codes (for one_time) or usages (for universal) by campaign
	rpc ListPromoCodeCampaignDetails(ListPromoCodeCampaignDetailsRequest) returns (wallet.service.v1.ListPromoCodeCampaignDetailsResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/wallet/promo-code/campaign/details"
			body: "*"
		};
	}

	// GenerateOneTimePromoCodes generates codes for a one_time campaign
	rpc GenerateOneTimePromoCodes(GenerateOneTimePromoCodesRequest) returns (wallet.service.v1.GenerateOneTimePromoCodesResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/wallet/promo-code/one-time/codes/generate"
			body: "*"
		};
	}

	// GenerateUniversalPromoCodes generates codes for a universal campaign
	rpc GenerateUniversalPromoCodes(GenerateUniversalPromoCodesRequest) returns (wallet.service.v1.GenerateUniversalPromoCodesResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/wallet/promo-code/universal/codes/generate"
			body: "*"
		};
	}

	// ListUniversalCodeUsages lists the usages of a universal campaign
	rpc ListUniversalCodeUsages(ListUniversalCodeUsagesRequest) returns (wallet.service.v1.ListUniversalCodeUsagesResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/wallet/promo-code/universal/usages/list"
			body: "*"
		};
	}

	// ExportPromoCodeCampaign exports promo code campaign details (one_time codes or universal usages)
	rpc ExportPromoCodeCampaign(ExportPromoCodeCampaignRequest) returns (wallet.service.v1.ExportPromoCodeCampaignResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/wallet/promo-code/campaign/export"
			body: "*"
		};
	}

	// GetGamificationCurrencyConfig returns the currency config and the deduction order config based on currency and operator context
	rpc GetGamificationCurrencyConfig(GetGamificationCurrencyConfigRequest) returns (wallet.service.v1.GetGamificationCurrencyConfigResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/wallet/gamification/get"
			body: "*"
		};
	}

	// UpdateOperatorCurrencyConfig updates the config of a operator and its currency
	rpc UpdateOperatorCurrencyConfig(UpdateOperatorCurrencyConfigRequest) returns (wallet.service.v1.UpdateOperatorCurrencyConfigResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/wallet/currency/config/update"
			body: "*"
		};
	}

	// UpdateWalletConfig updates the wallet config based on operator context
	rpc UpdateWalletConfig(UpdateWalletConfigRequest) returns (wallet.service.v1.UpdateWalletConfigResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/wallet/config/update"
			body: "*"
		};
	}

	// DeleteWalletResponsibleGamblingConfig deletes gambling config for a user's currency
	rpc DeleteWalletResponsibleGamblingConfig(DeleteWalletResponsibleGamblingConfigRequest) returns (wallet.service.v1.DeleteResponsibleGamblingConfigResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/wallet/responsible-gambling/config/delete"
			body: "*"
		};
	}

	// ListWalletResponsibleGamblingConfigs lists gambling configs for a user with all currencies
	rpc ListWalletResponsibleGamblingConfigs(ListWalletResponsibleGamblingConfigsRequest) returns (wallet.service.v1.ListResponsibleGamblingConfigsResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/wallet/responsible-gambling/configs/list"
			body: "*"
		};
	}

	// ListCustomerRecords lists customer records for all users (with payment_deposit, payment_withdraw_freeze, game_bet, game_win and manual credit(this is not supported yet))
	rpc ListCustomerRecords(ListCustomerRecordsRequest) returns (wallet.service.v1.ListCustomerRecordsResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/wallet/customer-records/list"
			body: "*"
		};
	}

	// ExportCustomerRecords creates a task to exports customer records for all users (with payment_deposit, payment_withdraw_freeze, game_bet, game_win and manual credit(this is not supported yet))
	rpc ExportCustomerRecords(ExportCustomerRecordsRequest) returns (wallet.service.v1.ExportCustomerRecordsResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/wallet/customer-records/export"
			body: "*"
		};
	}

	// SetFICAThresholdConfig sets the FICA threshold config for an operator and its specific currency
	rpc SetFICAThresholdConfig(SetFICAThresholdConfigRequest) returns (wallet.service.v1.SetFICAThresholdConfigResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/wallet/fica/config/set"
			body: "*"
		};
	}

	// GetFICAThresholdConfig gets the FICA threshold config for an operator of all currencies
	rpc GetFICAThresholdConfig(GetFICAThresholdConfigRequest) returns (wallet.service.v1.GetFICAThresholdConfigResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/wallet/fica/config/get"
			body: "*"
		};
	}

	// ListFICAThresholdTransactions lists the threshold transactions (with payment_deposit, payment_withdraw_freeze, game_bet, game_win, deposit_reward) for a currency
	rpc ListFICAThresholdTransactions(ListFICAThresholdTransactionsRequest) returns (wallet.service.v1.ListFICAThresholdTransactionsResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/wallet/fica/transactions/list"
			body: "*"
		};
	}

	// ExportFICAThresholdTransactions creates a task to exports FICA threshold transactions for all users (with payment_deposit, payment_withdraw_freeze, game_bet, game_win, deposit_reward)
	rpc ExportFICAThresholdTransactions(ExportFICAThresholdTransactionsRequest) returns (wallet.service.v1.ExportFICAThresholdTransactionsResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/wallet/fica/transactions/export"
			body: "*"
		};
	}

	// ManualCredit
	rpc ManualCredit(ManualCreditRequest) returns (wallet.service.v1.CreditResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/wallet/manual/credit"
			body: "*"
		};
	}

	// ManualDebit
	rpc ManualDebit(ManualDebitRequest) returns (wallet.service.v1.DebitResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/wallet/manual/debit"
			body: "*"
		};
	}

	// ListManualJournalEntries lists manual journal entries for all users
	rpc ListManualJournalEntries(ListManualJournalEntriesRequest) returns (wallet.service.v1.ListManualJournalEntriesResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/wallet/manual/journal-entries/list"
			body: "*"
		};
	}

	// ExportManualJournalEntries creates a task to exports manual journal entries for all users
	rpc ExportManualJournalEntries(ExportManualJournalEntriesRequest) returns (wallet.service.v1.ExportManualJournalEntriesResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/wallet/manual/journal-entries/export"
			body: "*"
		};
	}

	// ManualAdjustCreditTurnoverField adjusts a credit's turnover or threshold value
	rpc ManualAdjustCreditTurnoverField(ManualAdjustCreditTurnoverFieldRequest) returns (wallet.service.v1.ManualAdjustCreditTurnoverFieldResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/wallet/credit/manual_adjust"
			body: "*"
		};
	}

	// ListOperatorWithdrawableAmounts lists withdrawable amounts for operators filtered by hierarchy
	rpc ListOperatorWithdrawableAmounts(ListOperatorWithdrawableAmountsRequest) returns (wallet.service.v1.ListOperatorWithdrawableAmountsResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/wallet/operator/withdrawable-amounts/list"
			body: "*"
		};
	}

	// GetOperatorWithdrawableAmount returns the computed withdrawable amount for a single target operator
	rpc GetOperatorWithdrawableAmount(BOGetOperatorWithdrawableAmountRequest) returns (wallet.service.v1.GetOperatorWithdrawableAmountResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/wallet/operator/withdrawable-amount"
			body: "*"
		};
	}

	// List user's free spin and free bet rewards with filters, pagination, and summary
	rpc ListUserFreeRewards(BOListUserFreeRewardsRequest) returns (wallet.service.v1.ListUserFreeRewardsBOResponse) {
		option (google.api.http) = {
			post: "/v1/backoffice/wallet/free-rewards/list"
			body: "*"
		};
	}
}

message GetWalletsRequest {
	int64 user_id = 1;
	repeated string currencies = 2;
}

message GetWalletCreditsRequest {
	int64 user_id = 1;
	// "credit" or "debit"
	optional string transaction_type = 2;
	optional string currency = 3;
	optional google.protobuf.Timestamp start_time = 4;
	optional google.protobuf.Timestamp end_time = 5;
	optional int32 page = 6;
	optional int32 page_size = 7;
}

message GetWalletCreditsResponse {
	message Credit {
		google.protobuf.Timestamp created_at = 1;
		int64 credit_id = 2 [json_name="transactionId"];
		string type = 3;
		int32 vip_level = 4;
		string before_blanace = 5;
		string after_balance = 6;
		string currency = 7;
	}
	repeated Credit credits = 1;
	int32 page = 2;
	int32 page_size = 3;
	int32 total = 4;
}

message ListWalletBalanceTransactionsRequest {
	int64 user_id = 1;
	// Transaction types for different operations
	// Expected values:
	// Credit operations:
	//   - "payment_deposit"    - Payment deposit transaction
	//   - "game_win"          - Game win transaction
	//
	// Debit operations:
	//   - "payment_withdraw"   - Payment withdraw transaction
	//   - "game_bet"          - Game bet transaction
	//   - "payment_withdraw_freeze" - Payment withdraw freeze transaction
	//
	// Settlement operations:
	//   - "payment_withdraw_settle" - Payment withdraw settlement
	//
	// Rollback operations:
	//   - "game_bet_rollback"            - Game bet transaction rollback
	//   - "game_win_rollback"            - Game win transaction rollback
	//   - "payment_withdraw_rollback" - Payment withdraw transaction rollback
	optional string transaction_type = 2 [deprecated = true];
	repeated string transaction_types = 10;
	optional string currency = 3;
	optional google.protobuf.Timestamp start_time = 4;
	optional google.protobuf.Timestamp end_time = 5;
	optional int32 page = 6;
	optional int32 page_size = 7;
	// source_credit_id: filter to get balance transactions that created this credit
	// Only returns source transaction types: payment_deposit, deposit_reward, promo_code_reward, free_spin_win, free_bet_win
	optional int64 source_credit_id = 8;
	// balance_transaction_ids: filter by specific balance transaction IDs
	repeated int64 balance_transaction_ids = 9;
}

message ListWalletBalanceTransactionsResponse {
	message BalanceTransaction {
		google.protobuf.Timestamp created_at = 1;
		int64 transaction_id = 2;
		// Transaction types for different operations
		// Expected values:
		// Credit operations:
		//   - "payment_deposit"    - Payment deposit transaction
		//   - "game_win"          - Game win transaction
		//
		// Debit operations:
		//   - "payment_withdraw"   - Payment withdraw transaction
		//   - "game_bet"          - Game bet transaction
		//   - "payment_withdraw_freeze" - Payment withdraw freeze transaction
		//
		// Settlement operations:
		//   - "payment_withdraw_settle" - Payment withdraw settlement
		//
		// Rollback operations:
		//   - "game_bet_rollback"            - Game bet transaction rollback
		//   - "game_win_rollback"            - Game win transaction rollback
		//   - "payment_withdraw_rollback" - Payment withdraw transaction rollback
		string transaction_type = 3;
		int32 vip_level = 4;
		string before_cash_balance = 5;
		string after_cash_balance = 6;
		string cash_amount_changed = 7;
		string before_operator_bonus_balance = 8;
		string after_operator_bonus_balance = 9;
		string operator_bonus_amount_changed = 10;
		string currency = 11;
		int64 related_transaction_id = 12;
		int64 external_transaction_id = 13;
		string status = 14;
	}
	repeated BalanceTransaction balance_transactions = 1;
	int32 total = 2;
	int32 page = 3;
	int32 page_size = 4;
}

message GetWalletCreditTransactionsRequest {
	int64 credit_id = 1 [json_name="transactionId"];
}

message GetWalletCreditTransactionsResponse {
	message CreditTransaction {
		google.protobuf.Timestamp created_at = 1;
		string type = 2;
	}
	repeated CreditTransaction credit_transactions = 1;
	int32 page = 2;
	int32 page_size = 3;
	int32 total = 4;
}

message UpdateWalletRequest {
	int64 user_id = 1;
	string currency = 2;
	optional bool enabled = 3;
}

message UpdateWalletResponse {}

message WalletCurrency {
	string currency = 1;
	bool enabled = 2;
	bool hidden = 3;
	string type = 4;
	string symbol = 5;
	string icon = 6;
	int32 decimal_places = 7;
}

message AddWalletCurrencyRequest {
	string currency = 1;
	bool enabled = 2;
	bool hidden = 3;
	string type = 4;
	string symbol = 5;
	string icon = 6;
	int32 decimal_places = 7;
	int32 currency_decimal_places = 8;
}

message AddWalletCurrencyResponse {}

message ListWalletCurrenciesRequest {
	repeated string currencies = 1;
	optional bool enabled = 2;
	optional bool hidden = 3;
	optional bool aggregated_enabled = 4;
	optional bool aggregated_hidden = 5;
	optional bool parent_enabled = 6;
	optional bool parent_hidden = 7;
	api.common.OperatorContext target_operator_context = 8;
}

message UpdateWalletCurrencyRequest {
	string currency = 1;
	optional bool enabled = 2;
	optional bool hidden = 3;
	optional string type = 4;
	optional string symbol = 5;
	optional string icon = 6;
	optional int32 decimal_places = 7;
	optional int32 currency_decimal_places = 8;
	// Placeholder for future use
	optional string thousands_separator = 9;
	// Placeholder for future use
	optional string decimal_separator = 10;
	api.common.OperatorContext target_operator_context = 11;
}

message ListOperatorBalancesRequest {
	api.common.OperatorContextFilters operator_context_filters = 1;
	repeated string currencies = 2;
	// Default 1
	optional int32 page = 3;
	// Default 20
	optional int32 page_size = 4;
}

message ListCompanyBalancesRequest {
	api.common.OperatorContextFilters operator_context_filters = 1;
	repeated string currencies = 2;
	// Default 1
	optional int32 page = 3;
	// Default 20
	optional int32 page_size = 4;
	// if nil, pagination is true
	optional bool pagination = 5;
}

message GetExchangeRatesRequest {
	repeated string currencies = 1;
}

message GetExchangeRatesResponse {
	// key is currency code, value is USD-based exchange rate
	map<string, string> exchange_rates = 1;
	// key is currency code, value is resolved swap fee percentage (e.g. "0.01" = 1%)
	map<string, string> swap_fees = 2;
}

message OperatorTransferRequest {
	api.common.OperatorContext operator_context = 1;
	string currency = 2;
	string cash_amount = 3;
}

message OperatorTransferResponse {
	string operator_cash = 1;
	string operator_balance_currency = 2;
	string target_operator_cash = 3;
	string target_operator_balance_currency = 4;
}

message OperatorSwapRequest {
	api.common.OperatorContext source_operator_context = 1;
	api.common.OperatorContext target_operator_context = 2;
	string currency = 3;
	string target_currency = 4;
	// Cash amount in the operator's balance currency
	string cash_amount = 5;
}

message OperatorSwapResponse {
