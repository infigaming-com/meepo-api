// ============================================
// Promo Code Campaign
// ============================================

// Create Campaign (status defaults to active)
message CreatePromoCodeCampaignRequest {
	api.common.OperatorContext target_operator_context = 1;
	string name = 2;
	string code_type = 3;
	int32 max_usage_limit = 4;
	google.protobuf.Timestamp start_time = 5;
	google.protobuf.Timestamp end_time = 6;
	wallet.service.v1.PromoCodeConditions reward_conditions = 7;
	wallet.service.v1.PromoCodeRewardConfigs reward_configs = 8;
}

// Update Campaign (cannot update status or code_type)
message UpdatePromoCodeCampaignRequest {
	api.common.OperatorContext target_operator_context = 1;
	int64 campaign_id = 2;
	string name = 3;
	reserved 4; // was max_usage_limit - immutable after creation
	google.protobuf.Timestamp start_time = 5;
	google.protobuf.Timestamp end_time = 6;
	wallet.service.v1.PromoCodeConditions reward_conditions = 7;
	wallet.service.v1.PromoCodeRewardConfigs reward_configs = 8;
}

// Update Campaign Status
message UpdatePromoCodeCampaignStatusRequest {
	api.common.OperatorContext target_operator_context = 1;
	int64 campaign_id = 2;
	// "active", "paused", or "disabled"
	string status = 3;
}

// List Campaigns
message ListPromoCodeCampaignsRequest {
	api.common.OperatorContext target_operator_context = 1;
	// "active", "paused", or "disabled"
	optional string status = 2;
	// "one_time" or "universal"
	optional string code_type = 3;
	optional google.protobuf.Timestamp start_time = 4;
	optional google.protobuf.Timestamp end_time = 5;
	optional int32 page = 6;
	optional int32 page_size = 7;
}

// List Campaign Details - codes (for one_time) or usages (for universal)
message ListPromoCodeCampaignDetailsRequest {
	int64 campaign_id = 1;
	optional int64 user_id = 2;
	optional string status = 3;
	optional string code = 4;
	optional int32 page = 5;
	optional int32 page_size = 6;
}

// Generate Codes for Campaign (one_time only)
message GenerateOneTimePromoCodesRequest {
	int64 campaign_id = 1;
	int32 code_length = 2;
	string code_format = 3;
	int32 count = 4;
}

// Generate Codes for Campaign (universal only)
message GenerateUniversalPromoCodesRequest {
	int64 campaign_id = 1;
	repeated string codes = 2;
}

// List Universal Code Usages
message ListUniversalCodeUsagesRequest {
	int64 campaign_id = 1;
}

// Export Promo Code Campaign
message ExportPromoCodeCampaignRequest {
	int64 campaign_id = 1;
	// "csv", "excel", or "pdf"
	string format = 2;
	// e.g. "UTC+0", "UTC+8"
	string time_zone = 3;
	optional int64 user_id = 4;
	// "used" or "unused" (one_time only)
	optional string status = 5;
	optional string code = 6;
}

// ManualAdjustCreditTurnoverField adjusts a credit's turnover or threshold value
message ManualAdjustCreditTurnoverFieldRequest {
	int64 target_user_id = 1;
	string currency = 2;
	int64 credit_id = 3;
	// transaction_type: "adjust_cash_turnover", "adjust_cash_turnover_threshold", "adjust_operator_bonus_turnover", "adjust_operator_bonus_turnover_threshold"
	string transaction_type = 4;
	// direction: "add", "subtract"
	string direction = 5;
	// Adjustment value (positive number)
	string value = 6;
}

// ============================================
// App Download Reward Config
// ============================================

// Backoffice request to set the app download reward config for a target operator.
// Initiator operator context is injected from the backoffice auth middleware.
message SetAppDownloadRewardConfigRequest {
	// The target operator whose config is being set.
	api.common.OperatorContext target_operator_context = 1;
	// Operator-level toggle. When true, the operator inherits the parent's config list.
	optional bool follow_parent = 2;
	// Full list of country entries. Replaces all existing entries for this operator.
	repeated wallet.service.v1.AppDownloadRewardConfigItem configs = 3;
}

// Backoffice request to get the app download reward config for a target operator.
message GetAppDownloadRewardConfigRequest {
	// The target operator whose config is being queried.
	api.common.OperatorContext target_operator_context = 1;
}

// ============================================
// Operator Withdrawable Amount
// ============================================

message ListOperatorWithdrawableAmountsRequest {
	api.common.OperatorContextFilters operator_context_filters = 1;
	// Default 1
	optional int32 page = 2;
	// Default 20
	optional int32 page_size = 3;
	// if nil, pagination is true
	optional bool pagination = 4;
	// optional: query a specific operator's data; if omitted, uses the initiator's own context
	api.common.OperatorContext target_operator_context = 5;
}

message BOGetOperatorWithdrawableAmountRequest {
	// Target operator to query; initiator's permission is validated against this
	api.common.OperatorContext target_operator_context = 1;
}

// ============================================
// User Free Rewards
// ============================================

message BOListUserFreeRewardsRequest {
	int64 user_id = 1;
	// Filter by reward type: "free_spin", "free_bet"
	repeated string types = 2;
	// Filter by derived status: "active", "used", "expired", "revoked"
	repeated string statuses = 3;
	// Filter by source: "deposit_reward", "promo_code", "app_download_reward"
	repeated string source_types = 4;
	// If true, only return rewards expiring within 7 days
	optional bool expiring_soon = 5;
	// Default 1
	optional int32 page = 6;
	// Default 20
	optional int32 page_size = 7;
}
