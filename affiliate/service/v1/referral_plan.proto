syntax = "proto3";

package api.affiliate.service.v1;

import "common/common.proto";

option go_package = "github.com/infigaming-com/meepo-api/affiliate/service/v1;v1";
option java_multiple_files = true;
option java_package = "api.affiliate.service.v1";

import "google/protobuf/timestamp.proto";

// SetReferralPlan creates or updates a referral plan
message SetReferralPlanRequest {
    api.common.OperatorContext initiator_operator_context = 1;
    api.common.OperatorContext target_operator_context = 2;
    int64 initiator_user_id = 3;
    string currency = 4;
    // Whether target operator follows parent's (or system's) referral plan
    optional bool follow_parent = 5;
    // Target operator's referral plan enabled state
    optional bool enabled = 6;
    // Target operator's referral plan max tier
    optional int32 max_tier = 7;
    // Target operator's referral plan config
    optional ReferralPlanConfig plan_config = 8;
    // Percentage string, e.g. "35" for 35%
    optional string payment_channel_rate = 9;
    // Percentage string, e.g. "35" for 35%
    optional string third_party_game_rate = 10;
}

message SetReferralPlanResponse {}

// GetReferralPlan retrieves a referral plan by currency and operator contexts
// Returns both the default (inherited) and custom configurations
message GetReferralPlanRequest {
    api.common.OperatorContext initiator_operator_context = 1;
    api.common.OperatorContext target_operator_context = 2;
    string currency = 3;
}

message GetReferralPlanResponse {
    // Custom operator context - the operator who has custom config
    api.common.OperatorContext custom_operator_context = 1;
    string currency = 2;
    // Inherited operator context - the operator from whom config is inherited
    api.common.OperatorContext inherited_operator_context = 3;
    string inherited_from_operator_name = 4;
	bool follow_parent = 5;
    // Default referral plan (inherited from parent/system)
    optional ReferralPlan default_referral_plan = 6;
    // Custom referral plan (current operator's own config)
    optional ReferralPlan custom_referral_plan = 7;
}

message GetUserReferralPlanRequest {
    string currency = 1;
}

message GetUserReferralPlanResponse {
    // Referral plan owner operator context
    api.common.OperatorContext referral_plan_owner_operator_context = 1;
    string currency = 2;
    // Referral plan used by the user, nil if no referral plan is set
    optional ReferralPlan user_referral_plan = 3;
}

message GetUserReferralStatsRequest {
    string currency = 1;
}

message GetUserReferralStatsResponse {
    message ReferralRewards {
        // Amount for this currency
        string available_referral_reward_amount = 1;
        string available_commission_reward_amount = 2;
        string total_received_referral_reward_amount = 3;
        string total_received_commission_reward_amount = 4;
        string total_received_invitee_reward_amount = 5;
        // Breakdown of available rewards by commission type
        string available_deposit_cashback_reward_amount = 6;
        string available_wagering_commission_reward_amount = 7;
        string available_loss_revenue_share_reward_amount = 8;
        // Breakdown of total received rewards by commission type
        string total_received_deposit_cashback_reward_amount = 9;
        string total_received_wagering_commission_reward_amount = 10;
        string total_received_loss_revenue_share_reward_amount = 11;
    }
    message ReferralProgress {
        // Map of tier number (1-10) to conversion count
        map<int32, int32> conversion_count = 1;
        // Map of tier number (1-10) to deposit amount
        map<int32, string> deposit_amount = 2;
        // Map of tier number (1-10) to wagering amount (game bet and game bet rollback)
        map<int32, string> wagering_amount = 3;
    }
    // Referral codes created by the user
    repeated ReferralCode referral_codes = 1;
    // Referral rewards for the user
    ReferralRewards referral_rewards = 2;
    ReferralProgress referral_progress = 3;
}

message ReferralCode {
    int64 user_id = 1;
    string user_name = 2;
    string referral_code = 3;
    string created_at = 4;
    // Number of users who registered with this referral code
    int64 referral_user_count = 5;
    // Earnings in USD from this referral code
    string earning_amount_usd = 6;
    // Earnings in reporting currency from this referral code
    string earning_amount_reporting_currency = 7;
}

message CreateUserReferralCodeRequest {
    // nil means backend will randomly generate a new code
    optional string referral_code = 1;
}

message CreateUserReferralCodeResponse {
    string referral_code = 1;
}

message ListUserReferralRewardsRequest {
    string currency = 1;
    // "conversion_reward", "deposit_cashback_reward", "wagering_commission_reward", or "loss_revenue_share_reward"
    string reward_type = 2;
    optional string referral_code = 3;
    optional int64 user_id = 4;
    optional int32 tier = 5;
    optional google.protobuf.Timestamp conversion_start_time = 6;
    optional google.protobuf.Timestamp conversion_end_time = 7;
    optional int32 page = 8;
    optional int32 page_size = 9;
}

message ListUserReferralRewardsResponse {
    message ReferralReward {
        string user_name = 1;
        int64 user_id = 2;
        string referral_code = 3;
        int32 tier = 4;
        string unpaid_reward_amount = 5;
        string unclaimed_reward_amount = 6;
        string claimed_reward_amount = 7;
        google.protobuf.Timestamp conversion_time = 8;
    }
    repeated ReferralReward referral_rewards = 1;
    int32 total = 2;
    int32 page = 3;
    int32 page_size = 4;
}

message GetUserReferralRewardsRequest {
    string currency = 1;
}

message GetUserReferralRewardsResponse {
    string amount = 1;
    repeated int64 commission_ids = 2;
}

message ClaimUserReferralRewardsRequest {
    string currency = 1;
    repeated int64 commission_ids = 2;
}

message ClaimUserReferralRewardsResponse {
}

message GetUserLossRevenueShareStatsRequest {
    string currency = 1;
    optional string referral_code = 3;
    optional int64 user_id = 4;
    // Filter referred stats by tier; other fields remain the same
    optional int32 tier = 5;
    optional google.protobuf.Timestamp conversion_start_time = 6;
    optional google.protobuf.Timestamp conversion_end_time = 7;
    optional int32 page = 8;
    optional int32 page_size = 9;
}

message GetUserLossRevenueShareStatsResponse {
    message ReferredStat {
        int64 user_id = 1;
        string user_name = 2;
        string referral_code = 3;
        int32 tier = 4;
        string ngr_amount_in_period = 5;
        string ggr_amount_in_period = 6;
        string bonus2cash_amount_in_period = 7;
        string admin_fee_amount_in_period = 8;
        google.protobuf.Timestamp conversion_time = 9;
    }
    // Currently only calculated for user's tier 1
    string unpaid_reward_amount = 1;
    string unclaimed_reward_amount = 2;
    string claimed_reward_amount = 3;
    // Map of tier number (1-10) to GGR amount in the period
    map<int32, string> ggr_amount_in_period = 4;
    // Map of tier number (1-10) to NGR amount in the period
    map<int32, string> ngr_amount_in_period = 5;
    // Map of tier number (1-10) to bonus2cash amount in the period
    map<int32, string> bonus2cash_amount_in_period = 6;
    repeated ReferredStat referred_stats = 7;
    // Number of users in the team
    int32 team_size = 8;
    // Total count for referred stats pagination
    int32 total = 9;
    // Page number for referred stats
    int32 page = 10;
    // Page size for referred stats
    int32 page_size = 11;
    // Map of tier number (1-10) to admin fee amount = (NGR/GGR) * admin_rate / 100
    map<int32, string> admin_fee_amount_in_period = 12;
}

// ------------------------------------------------------------------------------------------------
// Data structures
// ------------------------------------------------------------------------------------------------

// Complete referral plan configuration
message ReferralPlan {
    bool enabled = 1;
    int32 max_tier = 2;
    ReferralPlanConfig plan_config = 3;
    // Percentage string, e.g. "35" for 35%
    string payment_channel_rate = 4;
    // Percentage string, e.g. "35" for 35%
    string third_party_game_rate = 5;
}

// Referral plan configuration
message ReferralPlanConfig {
    optional ConversionConditions conversion_conditions = 1;
    optional ConversionReward conversion_reward = 2;
    optional InviteeReward invitee_reward = 3;
    optional DepositCashback deposit_cashback = 4;
    optional WageringCommission wagering_commission = 5;
    optional LossRevenueShare loss_revenue_share = 6;
}

// ------------------------------------------------------------------------------------------------
// Conversion conditions and rewards
// ------------------------------------------------------------------------------------------------

message ConversionConditions {
    bool enabled = 1;
    optional string min_ftd_amount = 2;
    optional int32 min_deposits_count = 3;
    optional string min_deposits_amount = 4;
    optional int32 min_bets_count = 5;
    optional string min_bets_amount = 6;
    optional int32 time_limit_after_registration_days = 7;
    optional int32 time_limit_after_ftd_days = 8;
    optional string allowed_player_statuses = 9;
}

message ConversionReward {
    bool enabled = 1;
    // Map of tier number (1-10) to tier rewards
    map<int32, ConversionTierRewards> tier_rewards = 2;
}

message ConversionTierRewards {
    repeated ConversionTierReward rewards = 1;
}

message ConversionTierReward {
    string from = 1;
    // nil indicates no upper limit
    optional string to = 2;
    string reward_amount = 3;
}

// ------------------------------------------------------------------------------------------------
// Invitee rewards
// ------------------------------------------------------------------------------------------------

message InviteeReward {
    bool enabled = 1;
    string reward_amount = 2;
}

// ------------------------------------------------------------------------------------------------
// Deposit cashback
// ------------------------------------------------------------------------------------------------

message DepositCashback {
    bool enabled = 1;
    // Map of tier number (1-10) to tier reward config
    map<int32, DepositCashbackTierRewardConfig> tier_reward_configs = 2;
}

message DepositCashbackTierRewardConfig {
    string daily_limit_amount = 1;
    repeated DepositCashbackTierReward tier_rewards = 2;
}

message DepositCashbackTierReward {
    string from = 1;
    // nil indicates no upper limit
    optional string to = 2;
    string cashback_percentage = 3;
}

// ------------------------------------------------------------------------------------------------
// Wagering commission
// ------------------------------------------------------------------------------------------------

message WageringCommission {
    bool enabled = 1;
    // Percentage string, e.g. "35" for 35%
    string max_game_house_edge = 2;
    // Map of tier number (1-10) to tier rewards
    map<int32, WageringCommissionTierRewards> tier_rewards = 3;
    // "real_time", "daily", "weekly", or "monthly"
    string period = 4;
}

message WageringCommissionTierRewards {
    repeated WageringCommissionTierReward rewards = 1;
}

message WageringCommissionTierReward {
    string from = 1;
    // nil indicates no upper limit
    optional string to = 2;
    // Percentage string, e.g. "35" for 35%
    string rate = 3;
}

// ------------------------------------------------------------------------------------------------
// Loss revenue share
// ------------------------------------------------------------------------------------------------

message LossRevenueShare {
    bool enabled = 1;
    // "ggr" or "ngr"
    string based_on = 2;
    // "discard" or "carry_to_next_period"
    string negative_carryover = 3;
    // Map of tier number (1-10) to tier rewards
    map<int32, LossRevenueShareTierRewards> tier_rewards = 4;
    // "weekly" or "monthly"
    string period = 5;
}

message LossRevenueShareTierRewards {
    repeated LossRevenueShareTierReward rewards = 1;
}

message LossRevenueShareTierReward {
    string from = 1;
    // nil indicates no upper limit
    optional string to = 2;
    // Percentage string, e.g. "35" for 35%
    string rate = 3;
}

// --- Multi-currency reward APIs ---

message GetUserReferralRewardsAllCurrenciesRequest {
    // Target currency for exchange rate conversion display
    string target_currency = 1;
}

message GetUserReferralRewardsAllCurrenciesResponse {
    message CurrencyReward {
        // Source currency
        string currency = 1;
        // Total claimable amount in source currency
        string amount = 2;
        // Amount converted to target_currency
        string converted_amount = 3;
        // Exchange rate: 1 source = X target
        string exchange_rate = 4;
        // Number of claimable commissions
        int32 commission_count = 5;
        // Breakdown by reward type:
        // conversion_reward subtotal
        string referral_amount = 6;
        // deposit_cashback + wagering_commission subtotal
        string commission_amount = 7;
        // loss_rev_share subtotal (only included when >= 0)
        string loss_rev_share_amount = 8;
        // true if loss_rev_share sum < 0 and excluded
        bool loss_rev_share_excluded = 9;
    }
    repeated CurrencyReward currency_rewards = 1;
    // Total of all currencies converted to target
    string total_converted_amount = 2;
    string target_currency = 3;
    // Snapshot timestamp in milliseconds, pass to Claim
    int64 snapshot_time = 4;
}

message ClaimUserReferralRewardsAllCurrenciesRequest {
    // Currency to receive the converted total
    string target_currency = 1;
    // Snapshot timestamp from Get, ensures claim scope matches preview
    int64 snapshot_time = 2;
}

message ClaimUserReferralRewardsAllCurrenciesResponse {
    message ClaimedCurrencyDetail {
        string source_currency = 1;
        // Amount in source currency
        string source_amount = 2;
        // Amount converted to target currency
        string converted_amount = 3;
        // Exchange rate used
        string exchange_rate = 4;
        int32 commission_count = 5;
    }
    repeated ClaimedCurrencyDetail claimed_details = 1;
    // Total credited to wallet in target currency
    string total_credited_amount = 2;
    string target_currency = 3;
}
