syntax = "proto3";

package api.affiliate.service.v1;

import "google/api/annotations.proto";
import "affiliate/service/v1/commission_plan.proto";
import "affiliate/service/v1/commission_report.proto";
import "affiliate/service/v1/referral_plan.proto";
import "common/common.proto";

option go_package = "github.com/infigaming-com/meepo-api/affiliate/service/v1;v1";
option java_multiple_files = true;
option java_package = "api.affiliate.service.v1";

import "google/protobuf/timestamp.proto";

service Affiliate {

    // -------------- Commission Plan --------------

    rpc CreateCommissionPlan(CreateCommissionPlanRequest) returns (CreateCommissionPlanResponse) {}

    rpc UpdateCommissionPlan(UpdateCommissionPlanRequest) returns (UpdateCommissionPlanResponse) {}

    rpc GetCommissionPlan(GetCommissionPlanRequest) returns (GetCommissionPlanResponse) {}

    rpc ListCommissionPlans(ListCommissionPlansRequest) returns (ListCommissionPlansResponse) {}

    rpc DeleteCommissionPlan(DeleteCommissionPlanRequest) returns (DeleteCommissionPlanResponse) {}

    rpc ListAllCommissionPlans(ListAllCommissionPlansRequest) returns (ListAllCommissionPlansResponse) {}

    rpc ListAffiliateCommissionPlans(ListAffiliateCommissionPlansRequest) returns (ListAffiliateCommissionPlansResponse) {}

    // -------------- Affiliate --------------

    rpc CreateAffiliate(CreateAffiliateRequest) returns (CreateAffiliateResponse) {}

    rpc UpdateAffiliate(UpdateAffiliateRequest) returns (UpdateAffiliateResponse) {}

    rpc ListAffiliates(ListAffiliatesRequest) returns (ListAffiliatesResponse) {}
    
    rpc DeleteAffiliate(DeleteAffiliateRequest) returns (DeleteAffiliateResponse) {}

    rpc GetAffiliateDetails(GetAffiliateDetailsRequest) returns (GetAffiliateDetailsResponse) {}

    rpc ResetAffiliatePassword(ResetAffiliatePasswordRequest) returns (ResetAffiliatePasswordResponse) {}

    // -------------- Campaign --------------

    rpc CreateCampaign(CreateCampaignRequest) returns (CreateCampaignResponse) {}

    rpc UpdateCampaign(UpdateCampaignRequest) returns (UpdateCampaignResponse) {}

    rpc ListCampaigns(ListCampaignsRequest) returns (ListCampaignsResponse) {}

    rpc DeleteCampaign(DeleteCampaignRequest) returns (DeleteCampaignResponse) {}

    // -------------- Postback --------------

    rpc CreatePostback(CreatePostbackRequest) returns (CreatePostbackResponse) {}

    rpc UpdatePostback(UpdatePostbackRequest) returns (UpdatePostbackResponse) {}

    rpc DeletePostback(DeletePostbackRequest) returns (DeletePostbackResponse) {}

    rpc ListPostbacks(ListPostbacksRequest) returns (ListPostbacksResponse) {}

    rpc ListPostbackLogs(ListPostbackLogsRequest) returns (ListPostbackLogsResponse) {}

     // -------------- Affiliate Domain --------------

     rpc ListAffiliateDomains(ListAffiliateDomainsRequest) returns (ListAffiliateDomainsResponse) {}

     rpc SetAffiliateDomain(SetAffiliateDomainRequest) returns (SetAffiliateDomainResponse) {}

    // -------------- Event --------------

    rpc ListEvents(ListEventsRequest) returns (ListEventsResponse) {}

    // -------------- Commission --------------

    rpc ListCommissions(ListCommissionsRequest) returns (ListCommissionsResponse) {}

    // -------------- User --------------

    rpc ListUsers(ListUsersRequest) returns (ListUsersResponse) {}

    rpc ExportUsers(ExportUsersRequest) returns (ExportUsersResponse) {}

    // -------------- Affiliate Bill --------------

    rpc ListAffiliateBills(ListAffiliateBillsRequest) returns (ListAffiliateBillsResponse) {}

    // -------------- Referral Plan --------------

    rpc SetReferralPlan(SetReferralPlanRequest) returns (SetReferralPlanResponse) {}

    rpc GetReferralPlan(GetReferralPlanRequest) returns (GetReferralPlanResponse) {}

    rpc GetUserReferralPlan(GetUserReferralPlanRequest) returns (GetUserReferralPlanResponse) {
        option (google.api.http) = {
            post: "/v1/affiliate/user/referral/plan/get"
            body: "*"
        };
    }

    rpc GetUserReferralStats(GetUserReferralStatsRequest) returns (GetUserReferralStatsResponse) {
        option (google.api.http) = {
            post: "/v1/affiliate/user/referral/stats/get"
            body: "*"
        };
    }

    rpc CreateUserReferralCode(CreateUserReferralCodeRequest) returns (CreateUserReferralCodeResponse) {
        option (google.api.http) = {
            post: "/v1/affiliate/user/referral/code/create"
            body: "*"
        };
    }

    rpc ListUserReferralRewards(ListUserReferralRewardsRequest) returns (ListUserReferralRewardsResponse) {
        option (google.api.http) = {
            post: "/v1/affiliate/user/referral/rewards/list"
            body: "*"
        };
    }

    rpc GetUserReferralRewards(GetUserReferralRewardsRequest) returns (GetUserReferralRewardsResponse) {
        option (google.api.http) = {
            post: "/v1/affiliate/user/referral/rewards/get"
            body: "*"
        };
    }

    rpc ClaimUserReferralRewards(ClaimUserReferralRewardsRequest) returns (ClaimUserReferralRewardsResponse) {
        option (google.api.http) = {
            post: "/v1/affiliate/user/referral/rewards/claim"
            body: "*"
        };
    }

    rpc GetUserReferralRewardsAllCurrencies(GetUserReferralRewardsAllCurrenciesRequest) returns (GetUserReferralRewardsAllCurrenciesResponse) {
        option (google.api.http) = {
            post: "/v1/affiliate/user/referral/rewards/all-currencies/get"
            body: "*"
        };
    }

    rpc ClaimUserReferralRewardsAllCurrencies(ClaimUserReferralRewardsAllCurrenciesRequest) returns (ClaimUserReferralRewardsAllCurrenciesResponse) {
        option (google.api.http) = {
            post: "/v1/affiliate/user/referral/rewards/all-currencies/claim"
            body: "*"
        };
    }

    rpc GetUserLossRevenueShareStats(GetUserLossRevenueShareStatsRequest) returns (GetUserLossRevenueShareStatsResponse) {
        option (google.api.http) = {
            post: "/v1/affiliate/user/loss/revenue/share/stats/get"
            body: "*"
        };
    }

    // -------------- Landing Template --------------

    rpc CreateLandingTemplate(CreateLandingTemplateRequest) returns (CreateLandingTemplateResponse) {}

    rpc UpdateLandingTemplate(UpdateLandingTemplateRequest) returns (UpdateLandingTemplateResponse) {}

    rpc DeleteLandingTemplate(DeleteLandingTemplateRequest) returns (DeleteLandingTemplateResponse) {}

    rpc ListLandingTemplates(ListLandingTemplatesRequest) returns (ListLandingTemplatesResponse) {}

    rpc ListLandingTemplatesByCampaign(ListLandingTemplatesByCampaignRequest) returns (ListLandingTemplatesByCampaignResponse) {}

    // GetLandingTemplateConfig is a public/frontend endpoint (no auth required)
    rpc GetLandingTemplateConfig(GetLandingTemplateConfigRequest) returns (GetLandingTemplateConfigResponse) {
        option (google.api.http) = {
            post: "/v1/affiliate/landing-template/config/get"
            body: "*"
        };
    }

    // -------------- Promo Code Condition --------------

    // GetUserPromoConditionInfo returns user's referral/affiliate info for promo code condition validation
    // This is an internal API for wallet-service to validate promo code conditions
    rpc GetUserPromoConditionInfo(GetUserPromoConditionInfoRequest) returns (GetUserPromoConditionInfoResponse) {}


    // -------------- Settings --------------

    rpc GetOperatorSettings(GetOperatorSettingsRequest) returns (GetOperatorSettingsResponse) {}

    rpc UpdateOperatorSettings(UpdateOperatorSettingsRequest) returns (UpdateOperatorSettingsResponse) {}

    // -------------- Dashboard --------------

    // GetAffiliateDashboard returns aggregated dashboard metrics with comparison to previous period
    rpc GetAffiliateDashboard(GetAffiliateDashboardRequest) returns (GetAffiliateDashboardResponse) {}

    // GetAffiliateTrend returns time series data for trend visualization
    rpc GetAffiliateTrend(GetAffiliateTrendRequest) returns (GetAffiliateTrendResponse) {}

    // -------------- Referral Report --------------

    // ListReferralVTGReport returns VTG report - New subordinates performance
    rpc ListReferralVTGReport(ListReferralVTGReportRequest) returns (ListReferralVTGReportResponse) {}

    // ListReferralSnapshotReport returns Snapshot report - Cumulative + Period activity
    rpc ListReferralSnapshotReport(ListReferralSnapshotReportRequest) returns (ListReferralSnapshotReportResponse) {}

    // ListReferralContributionReport returns Contribution report - Subordinate detail view
    rpc ListReferralContributionReport(ListReferralContributionReportRequest) returns (ListReferralContributionReportResponse) {}

    // ListReferralLifetimeReport returns Lifetime report - All-time commission totals
    rpc ListReferralLifetimeReport(ListReferralLifetimeReportRequest) returns (ListReferralLifetimeReportResponse) {}

    // -------------- Affiliate Report --------------

    // ListAffiliateVTGReport returns VTG report - New users (registered in period) performance
    rpc ListAffiliateVTGReport(ListAffiliateVTGReportRequest) returns (ListAffiliateVTGReportResponse) {}

    // ListAffiliateSnapshotReport returns Snapshot report - All users' activity in period
    rpc ListAffiliateSnapshotReport(ListAffiliateSnapshotReportRequest) returns (ListAffiliateSnapshotReportResponse) {}

    // -------------- Affiliate Sub-Account Management --------------

    rpc CreateAffiliateSubAccount(CreateAffiliateSubAccountRequest) returns (CreateAffiliateSubAccountResponse) {}

    rpc ListAffiliateSubAccounts(ListAffiliateSubAccountsRequest) returns (ListAffiliateSubAccountsResponse) {}

    // -------------- Global Postback --------------

    rpc CreateGlobalPostback(CreateGlobalPostbackRequest) returns (CreateGlobalPostbackResponse) {}

    rpc UpdateGlobalPostback(UpdateGlobalPostbackRequest) returns (UpdateGlobalPostbackResponse) {}

    rpc DeleteGlobalPostback(DeleteGlobalPostbackRequest) returns (DeleteGlobalPostbackResponse) {}

    rpc GetGlobalPostback(GetGlobalPostbackRequest) returns (GetGlobalPostbackResponse) {}

    rpc ListGlobalPostbacks(ListGlobalPostbacksRequest) returns (ListGlobalPostbacksResponse) {}

    rpc ListGlobalPostbackLogs(ListGlobalPostbackLogsRequest) returns (ListGlobalPostbackLogsResponse) {}

    rpc SimulateGlobalPostback(SimulateGlobalPostbackRequest) returns (SimulateGlobalPostbackResponse) {}

}

message ContactType {
    string label = 1;
    string contact_value = 2;
}

message AffiliateInfo {
    string company_name = 1;
    string status = 2;
    repeated int64 commission_plan_ids = 3;
    string invoice_period = 4;
    string photo_url = 5;
    string email = 6;
    string password = 7;
    bool two_fa_enabled = 8;
    string firstname = 9;
    string lastname = 10;
    string phone = 11;
    repeated ContactType contact_types = 12;
    // country code
    string country = 13;
    string region = 14;
    string city = 15;
    string post_code = 16;
    string street = 17;
    // not implemented
    repeated int64 traffic_source_ids = 18;
    // not implemented
    repeated int64 teammate_ids = 19;
    string internal_info = 20;
}

message CreateAffiliateRequest {
    AffiliateInfo affiliate = 1;
    api.common.OperatorContext target_operator_context = 2;
    api.common.OperatorContext initiator_operator_context = 3;
    int64 initiator_user_id = 4;
}

message CreateAffiliateResponse {
    int64 affiliate_id = 1;
}

message UpdateAffiliateRequest {
    AffiliateInfo affiliate = 1;
    int64 affiliate_id = 2;
    api.common.OperatorContext initiator_operator_context = 3;
    int64 initiator_user_id = 4;
}

message UpdateAffiliateResponse {
}

message ListAffiliatesRequest {
    repeated string countries = 1;
    // not implemented
    repeated string traffic_source_ids = 2;
    // not implemented
    repeated string teammate_ids = 3;
    // "pending", "active", or "inactive"
    string status = 4;
    optional int32 page = 5;
    optional int32 page_size = 6;
    api.common.OperatorContext target_operator_context = 7;
    api.common.OperatorContext initiator_operator_context = 8;
    // if nil, pagination is true
    optional bool pagination = 9;
}

message ListAffiliatesResponse {
    message Affiliate {
        int64 affiliate_id = 1;
        string photo_url = 2;
        string company_name = 3;
        string first_name = 4;
        string last_name = 5;
        string retailer_operator_name = 6;
        string company_operator_name = 7;
        string operator_name = 8;
        // not implemented
        repeated string traffic_source_names = 9;
        string status = 10;
        repeated string commission_plan_names = 11;
        // not implemented
        repeated string teammate_names = 12;
        string last_login_ip = 13;
        string balance_usd = 14;
        string balance_reporting_currency = 15;
        string commisions_usd = 16;
        string commisions_reporting_currency = 17;
    }
    repeated Affiliate affiliates = 1;
    int32 total = 2;
    int32 active_count = 3;
    int32 inactive_count = 4;
    int32 pending_count = 5;
    int32 page = 6;
    int32 page_size = 7;
}

message DeleteAffiliateRequest {
    int64 affiliate_id = 1;
    api.common.OperatorContext initiator_operator_context = 2;
    int64 initiator_user_id = 3;
}

message DeleteAffiliateResponse {
}

message GetAffiliateDetailsRequest {
    int64 affiliate_id = 1;
    api.common.OperatorContext initiator_operator_context = 2;
}

message GetAffiliateDetailsResponse {
    message AffiliateDetails {
        message Referrer {
            int64 affiliate_id = 1;
            string affiliate_firstname = 2;
            string affiliate_lastname = 3;
            string affiliate_company_name = 4;
            // percentage
            string sub_affiliate_commission_rate = 5;
        }
        message CommissionPlan {
            int64 commission_plan_id = 1;
            string commission_plan_name = 2;
        }
        int64 affiliate_id = 1;
        string company_name = 2;
        string status = 3;
        repeated CommissionPlan commission_plans = 4;
        string invoice_period = 5;
        string photo_url = 6;
        // online status, not implemented
        bool active = 7;
        string last_login_ip = 8;
        google.protobuf.Timestamp last_login_at = 9;
        string firstname = 10;
        string lastname = 11;
        string phone = 12;
        repeated ContactType contact_types = 13;
        // country code
        string country = 14;
        string region = 15;
        string city = 16;
        string post_code = 17;
        string street = 18;
        // not implemented
        repeated int64 traffic_source_ids = 19;
        // not implemented
        repeated int64 teammate_ids = 20;
        string internal_info = 21;
        // referred by who, not implemented
        optional Referrer referrer = 22;
        string pending_balance_usd = 23;
        // pending bill amount
        string pending_balance_reporting_currency = 24;
        string email = 25;
        bool two_fa_enabled = 26;
    }
    AffiliateDetails affiliate_details = 1;
}

message ResetAffiliatePasswordRequest {
    int64 affiliate_id = 1;
    string new_password = 2;
    api.common.OperatorContext initiator_operator_context = 3;
    int64 initiator_user_id = 4;
}

message ResetAffiliatePasswordResponse {}

// -------------- Campaign --------------

message Campaign {
    string domain = 1;
    string campaign_name = 2;
    // "facebook", "tiktok", "kwai", "appsflyer", "adjust", "agency", or "google_ads"
    string channel_type = 3;
    ChannelConfig channel_config = 4;
    Params params = 5;
    EventMappings event_mappings = 6;
}

message Params {
    message Parameter {
        string name = 1;
        string value = 2;
    }
    repeated Parameter predefined_parameters = 1;
    repeated Parameter custom_parameters = 2;
}

message ChannelConfig {
    message FacebookChannelConfig {
        string pixel_id = 1;
        string access_token = 2;
    }
    message TiktokChannelConfig {
        string pixel_id = 1;
        string access_token = 2;
    }
    message KwaiChannelConfig {
        string pixel_id = 1;
        string access_token = 2;
        bool track_flag = 3;
    }
    message AppsflyerChannelConfig {
        string app_platform = 1;
        string bundle_id = 2;
        string dev_key = 3;
    }
    message AdjustChannelConfig {
        string app_platform = 1;
        string app_token = 2;
        string bundle_id = 3;
    }
    message AgencyChannelConfig {
    }
    message GoogleAdsChannelConfig {
        string customer_id = 1;
        string conversion_action = 2;
    }
    optional FacebookChannelConfig facebook_channel_config = 1;
    optional TiktokChannelConfig tiktok_channel_config = 2;
    optional KwaiChannelConfig kwai_channel_config = 3;
    optional AppsflyerChannelConfig appsflyer_channel_config = 4;
    optional AdjustChannelConfig adjust_channel_config = 5;
    optional AgencyChannelConfig agency_channel_config = 6;
    optional GoogleAdsChannelConfig google_ads_channel_config = 7;
}

message CustomParams {
    message CustomParam {
        string name = 1;
        string value = 2;
    }
    repeated CustomParam custom_params = 1;
}

message EventMappings {
    message EventMapping {
        optional string channel_event = 1;
        optional string custom_name = 2;
    }
    EventMapping register = 1;
    EventMapping first_deposit = 2;
    EventMapping second_deposit = 3;
    EventMapping third_deposit = 4;
    EventMapping withdrawal = 5;
    EventMapping game_start = 6;
    EventMapping game_bet = 7;
}

message CreateCampaignRequest {
    message Campaign {
        string domain = 1;
        string campaign_name = 2;
        // "facebook", "tiktok", "kwai", "appsflyer", "adjust", "agency", or "google_ads"
        string channel_type = 3;
        ChannelConfig channel_config = 4;
    }
    Campaign campaign = 1;
    api.common.OperatorContext initiator_operator_context = 2;
    int64 initiator_user_id = 3;
    int64 initiator_role_id = 4;
    optional int64 target_affiliate_id = 5;
}

message CreateCampaignResponse {
    int64 campaign_id = 1;
}

message UpdateCampaignRequest {
    int64 campaign_id = 1;
    optional Campaign campaign = 2;
    optional bool enabled = 3;
    int64 initiator_user_id = 4;
    int64 initiator_role_id = 5;
    optional int64 target_affiliate_id = 6;
    optional LandingPageSettings landing_page_settings = 7;
}

message UpdateCampaignResponse {
}

message ListCampaignsRequest {
    optional string campaign_name = 1;
    optional int64 campaign_id = 2;
    optional int64 affiliate_id = 3;
    optional bool enabled = 4;
    optional int32 page = 5;
    optional int32 page_size = 6;
    optional int64 initiator_user_id = 7;
    api.common.OperatorContext initiator_operator_context = 8;
    api.common.OperatorContextFilters operator_context_filters = 9;
    int64 initiator_role_id = 10;
    optional int64 target_affiliate_id = 11;
}

message ListCampaignsResponse {
    message CampaignInfo {
        int64 campaign_id = 1;
        string affiliate_company_name = 2;
        int64 affiliate_id = 3;
        string system_operator_name = 4;
        string retailer_operator_name = 5;
        string company_operator_name = 6;
        string operator_name = 7;
        string campaign_name = 8;
        // "configured", "not_configured", or "not_required"
        string event_mappings_status = 9;
        int32 event_mappings_count = 10;
        bool enabled = 11;
        Campaign campaign = 12;
        optional LandingPageSettings landing_page_settings = 13;
        optional string landing_template_name = 14;
    }
    repeated CampaignInfo campaigns = 1;
    int32 total = 2;
    int32 total_enabled = 3;
    int32 total_disabled = 4;
    int32 page = 5;
    int32 page_size = 6;
}

message DeleteCampaignRequest {
    int64 campaign_id = 1;
    int64 initiator_user_id = 2;
    int64 initiator_role_id = 3;
    optional int64 target_affiliate_id = 4;
}

message DeleteCampaignResponse {
}

// -------------- Landing Template Types --------------

message ClickAction {
    // "OPEN_REGISTRATION", "GO_TO_MAIN_SITE", or "CUSTOM_URL"
    string action_type = 1;
    // required when action_type is CUSTOM_URL
    optional string custom_url = 2;
}

message LandingPageSettings {
    bool enabled = 1;
    int64 landing_template_id = 2;
}

message LandingTemplate {
    int64 id = 1;
    string template_name = 2;
    string mobile_image = 3;
    ClickAction mobile_click_action = 4;
    string pc_image = 5;
    ClickAction pc_click_action = 6;
    int64 operator_id = 7;
    int64 company_operator_id = 8;
    int64 retailer_operator_id = 9;
    int64 system_operator_id = 10;
    int64 real_operator_id = 11;
    string operator_type = 12;
    int64 created_by = 13;
    int64 created_at = 14;
    int64 updated_at = 15;
}

// -------------- Landing Template CRUD Messages --------------

message CreateLandingTemplateRequest {
    int64 user_id = 1;
    api.common.OperatorContext operator_context = 2;
    string template_name = 3;
    string mobile_image = 4;
    ClickAction mobile_click_action = 5;
    string pc_image = 6;
    ClickAction pc_click_action = 7;
}

message CreateLandingTemplateResponse {}

message UpdateLandingTemplateRequest {
    int64 landing_template_id = 1;
    int64 user_id = 2;
    api.common.OperatorContext operator_context = 3;
    string template_name = 4;
    string mobile_image = 5;
    ClickAction mobile_click_action = 6;
    string pc_image = 7;
    ClickAction pc_click_action = 8;
}

message UpdateLandingTemplateResponse {}

message DeleteLandingTemplateRequest {
    int64 landing_template_id = 1;
    api.common.OperatorContext operator_context = 2;
}

message DeleteLandingTemplateResponse {}

message ListLandingTemplatesRequest {
    api.common.OperatorContext initiator_operator_context = 1;
    api.common.OperatorContext target_operator_context = 2;
    optional int32 page = 3;
    optional int32 page_size = 4;
}

message ListLandingTemplatesResponse {
    repeated LandingTemplate landing_templates = 1;
    int32 total = 2;
    int32 page = 3;
    int32 page_size = 4;
}

message ListLandingTemplatesByCampaignRequest {
    int64 campaign_id = 1;
    api.common.OperatorContext initiator_operator_context = 2;
}

message ListLandingTemplatesByCampaignResponse {
    repeated LandingTemplate landing_templates = 1;
}

// -------------- Landing Template Frontend (Public) Messages --------------

message GetLandingTemplateConfigRequest {
    optional int64 campaign_id = 1;
    optional int64 landing_template_id = 2;
}

message GetLandingTemplateConfigResponse {
    LandingTemplate landing_template = 1;
    optional LandingPageSettings landing_page_settings = 2;
}

// -------------- Events --------------

message ListEventsRequest {
    optional int64 affiliate_id = 1;
    repeated string event_types = 2;
    repeated string countries = 3;
    repeated string currencies = 4;
    google.protobuf.Timestamp start_time = 5;
    google.protobuf.Timestamp end_time = 6;
    optional int32 page = 7;
    optional int32 page_size = 8;
    int64 initiator_user_id = 9;
    int64 initiator_role_id = 10;
    api.common.OperatorContext initiator_operator_context = 11;
    api.common.OperatorContextFilters operator_context_filters = 12;
    optional int64 event_id = 13;
}

message ListEventsResponse {
    message Event {
        message CommissionPlan {
            int64 commission_plan_id = 1;
            string commission_plan_name = 2;
        }
        string country = 1;
        string campaign_name = 2;
        int64 campaign_id = 3;
        google.protobuf.Timestamp created_at = 4;
        string event_type = 5;	// "register", "first_deposit", "first_qualification_deposit", "deposit", "withdrawal", "game_start", "game_bet", "game_win", "click_deposit"
        repeated CommissionPlan commission_plans = 6;
        string currency = 7;
        string amount = 8;
        string amount_usd = 9;
        string amount_reporting_currency = 10;
        int64 user_id = 11;
        int64 event_id = 12;
        int64 affiliate_id = 13;
        string affiliate_name = 14;
        string retailer_operator_name = 15;
        string company_operator_name = 16;
        string operator_name = 17;
    }
    repeated Event events = 1; 
    int32 total = 2;
    int32 page = 3;
    int32 page_size = 4;
}

// -------------- Postback --------------

message CreatePostbackRequest {
    string postback_name = 1;
    // "active" or "inactive"
    string status = 2;
    repeated int64 campaign_ids = 3;
    // "register", "deposit", "first_deposit", "withdrawal", "game_start", or "game_bet"
    string action_type = 4;
    string postback_url = 5;
    // "GET" or "POST"
    string request_method = 6;
    int64 initiator_user_id = 7;
    int32 initiator_user_role_id = 8;
    api.common.OperatorContext initiator_operator_context = 9;
    optional int64 target_affiliate_id = 10;
}

message CreatePostbackResponse {
    int64 postback_id = 1;
}

message UpdatePostbackRequest {
    int64 postback_id = 1;
    string postback_name = 2;
    // "active" or "inactive"
    string status = 3;
    repeated int64 campaign_ids = 4;
    // "register", "deposit", "first_deposit", "withdrawal", "game_start", or "game_bet"
    string action_type = 5;
    string postback_url = 6;
    // "GET" or "POST"
    string request_method = 7;
    int64 initiator_user_id = 8;
    int32 initiator_user_role_id = 9;
    api.common.OperatorContext initiator_operator_context = 10;
    optional int64 target_affiliate_id = 11;
}

message UpdatePostbackResponse {
}

message DeletePostbackRequest {
    int64 postback_id = 1;
    int64 initiator_user_id = 2;
    int32 initiator_user_role_id = 3;
    api.common.OperatorContext initiator_operator_context = 4;
    optional int64 target_affiliate_id = 5;
}

message DeletePostbackResponse {
}

message ListPostbacksRequest {
    optional int64 affiliate_id = 1;
    // "active" or "inactive"
    optional string status = 2;
    optional int32 page = 3;
    optional int32 page_size = 4;
    int64 initiator_user_id = 5;
    int32 initiator_user_role_id = 6;
    api.common.OperatorContext initiator_operator_context = 7;
    api.common.OperatorContextFilters operator_context_filters = 8;
    optional int64 target_affiliate_id = 9;
}

message ListPostbacksResponse {
    message Postback {
        message Campaign {
            int64 campaign_id = 1;
            string campaign_name = 2;
        }
        int64 postback_id = 1;
        string postback_name = 2;
        // "active" or "inactive"
        string status = 3;
        int64 affiliate_id = 4;
        string affiliate_name = 5;
        int64 retailer_operator_id = 6;
        string retailer_operator_name = 7;
        int64 company_operator_id = 8;
        string company_operator_name = 9;
        int64 operator_id = 10;
        string operator_name = 11;
        repeated Campaign campaigns = 12;
        // "register", "deposit", "first_deposit", "withdrawal", "game_start", or "game_bet"
